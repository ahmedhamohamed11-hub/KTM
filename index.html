    <style>
        :root {
            --bg-primary: #f5f6f8; --bg-secondary: #ffffff; --bg-tertiary: #eef1f5;
            --text-primary: #1a1d23; --text-secondary: #5a5f6b; --text-muted: #8b909c;
            --border: #e2e5ea; --accent: #2563eb; --accent-hover: #1d4ed8; --accent-light: #eff3ff;
            --success: #059669; --warning: #d97706; --danger: #dc2626; --info: #6366f1;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12); --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
            --transition: 0.2s ease; --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

        [data-theme="dark"] {

            --border: #2d3340; --accent: #3b82f6; --accent-hover: #60a5fa; --accent-light: #1e293b;

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family); background: var(--bg-primary); color: var(--text-primary); display: flex; min-height: 100vh; transition: background var(--transition), color var(--transition); }
        .sidebar { width: var(--sidebar-width); background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 16px; flex-shrink: 0; transition: left 0.3s; z-index: 100; }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 8px 12px; margin-bottom: 28px; font-size: 20px; font-weight: 700; color: var(--accent); }
        .sidebar-logo .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; }
        .nav-section { margin-bottom: 20px; }
        .nav-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 8px 12px; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-bottom: 2px; transition: all var(--transition); }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        .nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
        .nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: var(--header-height); background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0; }
        .search-box { flex: 1; max-width: 400px; display: flex; align-items: center; background: var(--bg-tertiary); border-radius: 24px; padding: 9px 16px; gap: 8px; }
        .search-box input { border: none; background: transparent; flex: 1; font-size: 14px; color: var(--text-primary); outline: none; font-family: var(--font-family); }
        .topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all var(--transition); }
        .icon-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .content-scroll { flex: 1; overflow-y: auto; padding: 24px; }
        .page-title { font-size: 26px; font-weight: 700; margin-bottom: 24px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }

        tr:hover td { background: var(--bg-tertiary); }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .status-neu { background: #eef2ff; color: #6366f1; } .status-offen { background: #fffbeb; color: #d97706; } .status-aktiv { background: #ecfdf5; color: #059669; } .status-fertig { background: #f3f4f6; color: #6b7280; }
        .btn { padding: 10px 18px; border-radius: 24px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-family); white-space: nowrap; }
        .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); } .btn-outline:hover { background: var(--bg-tertiary); }
        .btn-danger { background: var(--danger); color: #fff; } .btn-danger:hover { opacity: 0.9; }

        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg-secondary); color: var(--text-primary); font-family: var(--font-family); transition: all var(--transition); }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
        .modal { background: var(--bg-secondary); border-radius: var(--radius-lg); width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; padding: 28px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .modal h3 { font-size: 20px; margin-bottom: 20px; font-weight: 700; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 14px 20px; border-radius: var(--radius-md); color: #fff; font-weight: 600; box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px; min-width: 250px; }
        .toast-success { background: #059669; } .toast-error { background: #dc2626; } .toast-info { background: #6366f1; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .image-card { aspect-ratio: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; }
        .image-card .img-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: #fff; padding: 6px 10px; font-size: 11px; text-align: center; }
        @media (max-width: 900px) { .sidebar { position: fixed; left: -280px; height: 100vh; } .sidebar.open { left: 0; } }
        @media (max-width: 600px) { .modal { width: 95%; padding: 16px; } .topbar { padding: 0 12px; } .content-scroll { padding: 16px; } }
    </style>

<body data-theme="light">

    <div class="toast-container" id="toastContainer"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><div class="logo-icon">❄</div><span>KTM</span></div>
        <nav>
            <div class="nav-section">
                <div class="nav-section-label">Hauptmenü</div>
                <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</div>
                <div class="nav-item" data-page="customers"><span class="nav-icon">👥</span> Kunden <span class="nav-badge" id="customerCount">0</span></div>
                <div class="nav-item" data-page="projects"><span class="nav-icon">📋</span> Projekte <span class="nav-badge" id="projectCount">0</span></div>
            </div>
            <div class="nav-section">
                <div class="nav-section-label">Werkzeuge</div>

            </div>

                <div class="nav-section-label">System</div>

                <div class="nav-item" data-page="backup"><span class="nav-icon">💾</span> Backup</div>
                <div class="nav-item" id="syncBtn"><span class="nav-icon">🔄</span> Sync</div>
            </div>
        </nav>
        <div style="margin-top:auto;padding-top:16px;">
            <div class="nav-item" id="themeToggle"><span class="nav-icon">🌙</span> Dunkelmodus</div>
        </div>
    </aside>

    <div class="main-area">
        <div class="topbar" id="topbar">
            <button class="icon-btn" id="menuToggle" style="display:none;" title="Menü">☰</button>
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="globalSearch" placeholder="Suche nach Kunden, Projekten, Material...">
            </div>
            <div class="topbar-actions">
                <span id="syncStatus" style="font-size:12px;color:var(--text-muted);margin-right:8px;"></span>
                <button class="icon-btn" title="Backup" onclick="app.navigate('backup')">💾</button>
                <button class="icon-btn" title="Einstellungen" onclick="app.navigate('settings')">⚙️</button>
            </div>

        <div class="content-scroll" id="contentArea"></div>
    </div>

    <div id="modalContainer"></div>

    <script>
        // ==================== SUPABASE KONFIGURATION ====================
        const SUPABASE_URL = 'https://xnscmfplphinkqnuiknj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_crnUSmznTl6eWBIV0Y-6VA_gslGmklv';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==================== SYNCHRONISATION ====================
        const FIELD_MAP = { firstName:'first_name', lastName:'last_name', houseNumber:'house_number', customerId:'customer_id', projectId:'project_id', roomCount:'room_count', purchasePrice:'purchase_price', sellingPrice:'selling_price', totalPrice:'total_price', vatRate:'vat_rate', vatAmount:'vat_amount', coolingRecommendation:'cooling_recommendation', coolingDetails:'cooling_details', createdAt:'created_at', updatedAt:'updated_at' };
        const REVERSE_MAP = Object.fromEntries(Object.entries(FIELD_MAP).map(([k,v])=>[v,k]));
        function toSnake(o) { const r={}; for(const k in o) r[FIELD_MAP[k]||k]=o[k]; return r; }
        function toCamel(o) { const r={}; for(const k in o) r[REVERSE_MAP[k]||k]=o[k]; return r; }

        async function syncPush(table) {
            const all = await db.getAll(table);
            for (const rec of all) { if(rec._synced) continue;
                const p = toSnake({...rec}); delete p.id; delete p._synced;
                const { data, error } = await sb.from(table).insert(p).select();
                if (!error && data?.length) { await db.delete(table, rec.id); const nr = toCamel(data[0]); nr._synced = true; await db.add(table, nr); }
            }
        }
        async function syncPull(table) {
            const { data, error } = await sb.from(table).select('*'); if(error) return;
            const ids = new Set((await db.getAll(table)).map(r=>r.id));
            for (const row of data) { const rec = toCamel(row); rec._synced = true; if(ids.has(rec.id)) await db.put(table, rec); else await db.add(table, rec); }
        }
        async function fullSync() {
            if(!navigator.onLine) { showToast('Keine Internetverbindung – offline', 'info'); return; }
            document.getElementById('syncStatus').textContent = 'Sync...';
            try { for(const t of ['customers','projects','rooms','images','materials','offers','settings']) { await syncPush(t); await syncPull(t); }
                showToast('Synchronisation abgeschlossen ✅','success'); } catch(e) { showToast('Sync-Fehler','error'); console.error(e); }
            document.getElementById('syncStatus').textContent = navigator.onLine?'Online':'Offline';
            app.navigate(app.currentPage, app.currentProjectId);
        }
        window.addEventListener('online', () => { document.getElementById('syncStatus').textContent='Online'; fullSync(); });
        window.addEventListener('offline', () => { document.getElementById('syncStatus').textContent='Offline'; });
        setInterval(() => { if(navigator.onLine) fullSync(); }, 300000);

        // ==================== DATENBANK-SCHICHT (Original IndexedDB) ====================
        const DB_NAME = 'KTM_DB';
        const DB_VERSION = 1;

        class DatabaseManager {
            constructor() { this.db = null; }
            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('customers')) {
                            const custStore = db.createObjectStore('customers', { keyPath: 'id', autoIncrement: true });
                            custStore.createIndex('name', 'lastName', { unique: false });
                            custStore.createIndex('status', 'status', { unique: false });
                            custStore.createIndex('created', 'createdAt', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('projects')) {
                            const projStore = db.createObjectStore('projects', { keyPath: 'id', autoIncrement: true });
                            projStore.createIndex('customerId', 'customerId', { unique: false });
                            projStore.createIndex('status', 'status', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('rooms')) {
                            const roomStore = db.createObjectStore('rooms', { keyPath: 'id', autoIncrement: true });
                            roomStore.createIndex('projectId', 'projectId', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('images')) {
                            const imgStore = db.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
                            imgStore.createIndex('projectId', 'projectId', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('materials')) {
                            const matStore = db.createObjectStore('materials', { keyPath: 'id', autoIncrement: true });
                            matStore.createIndex('category', 'category', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('offers')) {
                            const offStore = db.createObjectStore('offers', { keyPath: 'id', autoIncrement: true });
                            offStore.createIndex('projectId', 'projectId', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('settings')) {
                            db.createObjectStore('settings', { keyPath: 'key' });
                        }
                    };
                    request.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
                    request.onerror = (e) => { console.error('DB-Fehler:', e.target.error); reject(e.target.error); };
                });
            }
            async add(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite'); const store = tx.objectStore(storeName);
                    data.createdAt = data.createdAt || new Date().toISOString(); data.updatedAt = new Date().toISOString();
                    if (data._synced === undefined) data._synced = false;
                    const request = store.add(data); request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
                });
            }
            async put(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite'); const store = tx.objectStore(storeName);
                    data.updatedAt = new Date().toISOString();
                    if (data._synced === undefined) data._synced = false;
                    const request = store.put(data); request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
                });
            }
            async get(storeName, id) { return new Promise((resolve, reject) => { const tx = this.db.transaction(storeName, 'readonly'); const store = tx.objectStore(storeName); const request = store.get(id); request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error); }); }
            async getAll(storeName) { return new Promise((resolve, reject) => { const tx = this.db.transaction(storeName, 'readonly'); const store = tx.objectStore(storeName); const request = store.getAll(); request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error); }); }
            async delete(storeName, id) { return new Promise((resolve, reject) => { const tx = this.db.transaction(storeName, 'readwrite'); const store = tx.objectStore(storeName); const request = store.delete(id); request.onsuccess = () => resolve(); request.onerror = () => reject(request.error); }); }
            async getByIndex(storeName, indexName, value) { return new Promise((resolve, reject) => { const tx = this.db.transaction(storeName, 'readonly'); const store = tx.objectStore(storeName); const index = store.index(indexName); const request = index.getAll(value); request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error); }); }
            async clear(storeName) { return new Promise((resolve, reject) => { const tx = this.db.transaction(storeName, 'readwrite'); const store = tx.objectStore(storeName); const request = store.clear(); request.onsuccess = () => resolve(); request.onerror = () => reject(request.error); }); }
            async getProjectWithDetails(projectId) { const project = await this.get('projects', projectId); if (!project) return null; const rooms = await this.getByIndex('rooms', 'projectId', projectId); const images = await this.getByIndex('images', 'projectId', projectId); const offers = await this.getByIndex('offers', 'projectId', projectId); return { ...project, rooms, images, offers }; }
            async exportAllData() { const data = { customers: await this.getAll('customers'), projects: await this.getAll('projects'), rooms: await this.getAll('rooms'), images: await this.getAll('images'), materials: await this.getAll('materials'), offers: await this.getAll('offers'), settings: await this.getAll('settings'), exportDate: new Date().toISOString(), version: '1.0' }; return data; }
            async importAllData(data) { await this.clear('customers'); await this.clear('projects'); await this.clear('rooms'); await this.clear('images'); await this.clear('materials'); await this.clear('offers'); await this.clear('settings'); for (const c of data.customers || []) await this.add('customers', c); for (const p of data.projects || []) await this.add('projects', p); for (const r of data.rooms || []) await this.add('rooms', r); for (const i of data.images || []) await this.add('images', i); for (const m of data.materials || []) await this.add('materials', m); for (const o of data.offers || []) await this.add('offers', o); for (const s of data.settings || []) await this.put('settings', s); }
        }

        const db = new DatabaseManager();

        // ==================== KÄLTELEISTUNGS-BERECHNUNG ====================
        function calculateCoolingCapacity(rooms) {
            if (!rooms || rooms.length === 0) return { totalKW: 0, recommendation: null, details: [] };
            let totalWatts = 0; const details = [];
            for (const room of rooms) { const area = (room.length || 0) * (room.width || 0); let wattsPerSqm = 80; if (room.name && (room.name.toLowerCase().includes('dach') || room.name.toLowerCase().includes('wintergarten'))) wattsPerSqm = 120; if (room.name && room.name.toLowerCase().includes('keller')) wattsPerSqm = 60; const roomWatts = area * wattsPerSqm; totalWatts += roomWatts; details.push({ roomName: room.name || 'Unbenannt', area: Math.round(area * 100) / 100, wattsPerSqm, estimatedKW: Math.round(roomWatts / 100) / 10 }); }
            const totalKW = Math.round(totalWatts / 100) / 10; const availableSizes = [2.0, 2.5, 3.5, 4.2, 5.0, 6.0, 7.1, 8.5, 10.0]; let recommendation = availableSizes[0]; for (const size of availableSizes) { if (size >= totalKW) { recommendation = size; break; } } if (totalKW > availableSizes[availableSizes.length - 1]) recommendation = availableSizes[availableSizes.length - 1];
            return { totalKW, recommendation, details };
        }

        // ==================== UI-HILFSFUNKTIONEN ====================
        function showToast(message, type = 'info') { const container = document.getElementById('toastContainer'); const toast = document.createElement('div'); toast.className = `toast toast-${type}`; const icons = { success: '✅', error: '❌', info: 'ℹ️' }; toast.innerHTML = `${icons[type] || ''} ${message}`; container.appendChild(toast); setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000); }
        function formatCurrency(amount) { return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(amount); }
        function formatDate(isoString) { if (!isoString) return '-'; return new Date(isoString).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
        function getStatusClass(status) { const map = { 'Neu': 'status-neu', 'Besichtigung offen': 'status-offen', 'Besichtigt': 'status-offen', 'Angebot offen': 'status-offen', 'Angebot gesendet': 'status-aktiv', 'Auftrag erhalten': 'status-aktiv', 'Material bestellt': 'status-aktiv', 'Montage geplant': 'status-aktiv', 'Montage läuft': 'status-aktiv', 'Fertig': 'status-fertig', 'Archiv': 'status-fertig' }; return map[status] || 'status-neu'; }
        function showModal(title, contentHtml, onSave, onCancel) { const container = document.getElementById('modalContainer'); const overlay = document.createElement('div'); overlay.className = 'modal-overlay'; overlay.innerHTML = `<div class="modal"><h3>${title}</h3><div class="modal-body">${contentHtml}</div><div class="modal-actions"><button class="btn btn-outline cancel-btn">Abbrechen</button>${onSave ? '<button class="btn btn-primary save-btn">Speichern</button>' : ''}</div></div>`; container.appendChild(overlay); overlay.querySelector('.cancel-btn')?.addEventListener('click', () => { overlay.remove(); if (onCancel) onCancel(); }); overlay.querySelector('.save-btn')?.addEventListener('click', () => { if (onSave) onSave(overlay); }); overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); if (onCancel) onCancel(); } }); return overlay; }
        function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

        // ==================== SEITEN-RENDERER ====================
        const contentArea = document.getElementById('contentArea');

        function renderDashboard() { (async () => { const customers = await db.getAll('customers'); const projects = await db.getAll('projects'); const offers = await db.getAll('offers'); const materials = await db.getAll('materials'); const offeneProjekte = projects.filter(p => !['Fertig', 'Archiv'].includes(p.status)).length; const gesendeteAngebote = offers.filter(o => o.status === 'gesendet').length; const fertigeProjekte = projects.filter(p => p.status === 'Fertig').length; document.getElementById('customerCount').textContent = customers.length; document.getElementById('projectCount').textContent = projects.length; contentArea.innerHTML = `<h1 class="page-title">Dashboard</h1><div class="stats-row"><div class="stat-card"><div class="stat-value">${customers.length}</div><div class="stat-label">Kunden</div></div><div class="stat-card"><div class="stat-value">${offeneProjekte}</div><div class="stat-label">Offene Projekte</div></div><div class="stat-card"><div class="stat-value">${gesendeteAngebote}</div><div class="stat-label">Gesendete Angebote</div></div><div class="stat-card"><div class="stat-value">${fertigeProjekte}</div><div class="stat-label">Abgeschlossene Projekte</div></div></div><div class="card-grid"><div class="nav-card" onclick="app.navigate('customers')"><div class="card-icon blue">👥</div><div><div class="card-title">Kundenverwaltung</div><div class="card-subtitle">${customers.length} Kunden</div></div></div><div class="nav-card" onclick="app.navigate('projects')"><div class="card-icon green">📋</div><div><div class="card-title">Projekte & Besichtigungen</div><div class="card-subtitle">${offeneProjekte} offen</div></div></div><div class="nav-card" onclick="app.navigate('materials')"><div class="card-icon amber">📦</div><div><div class="card-title">Materialdatenbank</div><div class="card-subtitle">${materials.length} Artikel</div></div></div><div class="nav-card" onclick="app.navigate('offers')"><div class="card-icon purple">📄</div><div><div class="card-title">Angebote</div><div class="card-subtitle">${offers.length} erstellt</div></div></div><div class="nav-card" onclick="app.navigate('settings')"><div class="card-icon red">⚙️</div><div><div class="card-title">Einstellungen</div><div class="card-subtitle">System anpassen</div></div></div></div><h3 style="margin-top:16px;margin-bottom:12px;">Letzte Projekte</h3><div class="table-container"><table><thead><tr><th>Projekt</th><th>Kunde</th><th>Status</th><th>Datum</th></tr></thead><tbody>${projects.slice(-5).reverse().map(p => { const cust = customers.find(c => c.id === p.customerId); return `<tr style="cursor:pointer" onclick="app.navigate('projects', ${p.id})"><td><strong>${escapeHtml(p.title || 'Unbenannt')}</strong></td><td>${escapeHtml(cust ? `${cust.firstName} ${cust.lastName}` : '-')}</td><td><span class="status-badge ${getStatusClass(p.status)}">${escapeHtml(p.status || 'Neu')}</span></td><td>${formatDate(p.createdAt)}</td></tr>`; }).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);">Keine Projekte vorhanden</td></tr>'}</tbody></table></div>`; })(); }

        function renderCustomers() { (async () => { const customers = await db.getAll('customers'); document.getElementById('customerCount').textContent = customers.length; contentArea.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;"><h1 class="page-title" style="margin-bottom:0;">Kunden</h1><button class="btn btn-primary" onclick="app.openCustomerModal()">+ Neuer Kunde</button></div><div class="table-container"><table><thead><tr><th>Name</th><th>Firma</th><th>Ort</th><th>Telefon</th><th>Status</th><th>Aktionen</th></tr></thead><tbody>${customers.map(c => `<tr><td><strong>${escapeHtml(c.firstName)} ${escapeHtml(c.lastName)}</strong></td><td>${escapeHtml(c.company || '-')}</td><td>${escapeHtml(c.city || '-')}</td><td>${escapeHtml(c.phone || '-')}</td><td><span class="status-badge ${getStatusClass(c.status || 'Neu')}">${escapeHtml(c.status || 'Neu')}</span></td><td><button class="btn btn-sm btn-outline" onclick="app.openCustomerModal(${c.id})">✏️</button> <button class="btn btn-sm btn-outline" onclick="app.duplicateCustomer(${c.id})">📋</button> <button class="btn btn-sm btn-danger" onclick="app.deleteCustomer(${c.id})">🗑</button></td></tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">Keine Kunden vorhanden</td></tr>'}</tbody></table></div>`; })(); }

        function renderProjects(selectedProjectId = null) { (async () => { const projects = await db.getAll('projects'); const customers = await db.getAll('customers'); document.getElementById('projectCount').textContent = projects.length; const statusOptions = ['Neu','Besichtigung offen','Besichtigt','Angebot offen','Angebot gesendet','Auftrag erhalten','Material bestellt','Montage geplant','Montage läuft','Fertig','Archiv']; let detailHtml = ''; if (selectedProjectId) { const project = await db.getProjectWithDetails(selectedProjectId); if (project) { const customer = customers.find(c => c.id === project.customerId); const cooling = calculateCoolingCapacity(project.rooms || []); detailHtml = `<div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;margin-top:16px;"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px;"><h3 style="margin:0;">📋 ${escapeHtml(project.title || 'Unbenannt')}</h3><div style="display:flex;gap:8px;"><button class="btn btn-sm btn-outline" onclick="app.openProjectModal(${project.id})">✏️ Bearbeiten</button><button class="btn btn-sm btn-primary" onclick="app.createOffer(${project.id})">📄 Angebot erstellen</button><button class="btn btn-sm btn-danger" onclick="app.deleteProject(${project.id})">🗑 Löschen</button></div></div><p><strong>Kunde:</strong> ${escapeHtml(customer ? `${customer.firstName} ${customer.lastName}` : 'Kein Kunde zugewiesen')}</p><p><strong>Status:</strong> <span class="status-badge ${getStatusClass(project.status)}">${escapeHtml(project.status || 'Neu')}</span></p><p><strong>Notizen:</strong> ${escapeHtml(project.notes || '-')}</p><h4 style="margin-top:20px;">🏠 Räume (${(project.rooms||[]).length})</h4><div class="table-container" style="margin-top:8px;"><table><thead><tr><th>Raum</th><th>Länge (m)</th><th>Breite (m)</th><th>Höhe (m)</th><th>Fläche (m²)</th><th>Volumen (m³)</th><th>Empf. kW</th><th></th></tr></thead><tbody>${(project.rooms||[]).map(r => { const area = ((r.length||0)*(r.width||0)).toFixed(1); const volume = (area*(r.height||2.5)).toFixed(1); const roomKW = ((area*80)/1000).toFixed(1); return `<tr><td><strong>${escapeHtml(r.name||'Unbenannt')}</strong></td><td>${r.length||0}</td><td>${r.width||0}</td><td>${r.height||2.5}</td><td>${area}</td><td>${volume}</td><td>${roomKW} kW</td><td><button class="btn btn-sm btn-outline" onclick="app.deleteRoom(${r.id},${project.id})">🗑</button></td></tr>`; }).join('') || '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);">Keine Räume</td></tr>'}</tbody></table></div><button class="btn btn-sm btn-primary" style="margin-top:8px;" onclick="app.openRoomModal(${project.id})">+ Raum hinzufügen</button>${cooling.details.length > 0 ? `<div style="background:var(--accent-light);border-radius:var(--radius-md);padding:16px;margin-top:16px;"><strong>❄ Kälteleistungs-Empfehlung:</strong> <span style="font-size:22px;font-weight:700;color:var(--accent);">${cooling.recommendation} kW</span><br><small>Gesamtlast: ${cooling.totalKW} kW | Faustformel: 80 W/m²</small></div>` : ''}<h4 style="margin-top:20px;">📸 Bilder (${(project.images||[]).length})</h4><div class="image-grid" style="margin-top:8px;">${(project.images||[]).map(img => `<div class="image-card" onclick="app.viewImage('${img.data}')"><img src="${img.data}" alt="${escapeHtml(img.category||'')}"><div class="img-overlay">${escapeHtml(img.category||'Sonstiges')} ${img.label ? '- '+escapeHtml(img.label) : ''}</div></div>`).join('')}</div><button class="btn btn-sm btn-primary" style="margin-top:8px;" onclick="app.openImageModal(${project.id})">+ Bild hinzufügen</button></div>`; } } contentArea.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;"><h1 class="page-title" style="margin-bottom:0;">Projekte</h1><button class="btn btn-primary" onclick="app.openProjectModal()">+ Neues Projekt</button></div><div class="table-container"><table><thead><tr><th>Titel</th><th>Kunde</th><th>Status</th><th>Räume</th><th>Datum</th><th>Aktionen</th></tr></thead><tbody>${projects.map(p => { const cust = customers.find(c => c.id === p.customerId); return `<tr style="cursor:pointer" onclick="app.navigate('projects', ${p.id})"><td><strong>${escapeHtml(p.title || 'Unbenannt')}</strong></td><td>${escapeHtml(cust ? `${cust.firstName} ${cust.lastName}` : '-')}</td><td><span class="status-badge ${getStatusClass(p.status)}">${escapeHtml(p.status || 'Neu')}</span></td><td>${(p.roomCount || 0)} Räume</td><td>${formatDate(p.createdAt)}</td><td><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();app.openProjectModal(${p.id})">✏️</button> <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();app.deleteProject(${p.id})">🗑</button></td></tr>`; }).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">Keine Projekte</td></tr>'}</tbody></table></div>${detailHtml}`; })(); }

        function renderMaterials() { (async () => { const materials = await db.getAll('materials'); contentArea.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;"><h1 class="page-title" style="margin-bottom:0;">Materialdatenbank</h1><div style="display:flex;gap:8px;"><button class="btn btn-outline" onclick="app.exportMaterialsExcel()">📥 Excel Export</button><button class="btn btn-outline" onclick="app.importMaterialsExcel()">📤 Excel Import</button><button class="btn btn-primary" onclick="app.openMaterialModal()">+ Neues Material</button></div></div><div class="table-container"><table><thead><tr><th>Artikelname</th><th>Kategorie</th><th>Einheit</th><th>Einkaufspreis</th><th>Verkaufspreis</th><th>Aktionen</th></tr></thead><tbody>${materials.map(m => `<tr><td><strong>${escapeHtml(m.name)}</strong></td><td>${escapeHtml(m.category || '-')}</td><td>${escapeHtml(m.unit || 'Stk')}</td><td>${formatCurrency(m.purchasePrice || 0)}</td><td>${formatCurrency(m.sellingPrice || 0)}</td><td><button class="btn btn-sm btn-outline" onclick="app.openMaterialModal(${m.id})">✏️</button> <button class="btn btn-sm btn-danger" onclick="app.deleteMaterial(${m.id})">🗑</button></td></tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">Keine Materialien</td></tr>'}</tbody></table></div>`; })(); }

        function renderOffers() { (async () => { const offers = await db.getAll('offers'); const projects = await db.getAll('projects'); const customers = await db.getAll('customers'); contentArea.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;"><h1 class="page-title" style="margin-bottom:0;">Angebote</h1><button class="btn btn-outline" onclick="app.exportOffersExcel()">📥 Excel Export</button></div><div class="table-container"><table><thead><tr><th>Angebot</th><th>Projekt</th><th>Kunde</th><th>Summe</th><th>Status</th><th>Datum</th><th>Aktionen</th></tr></thead><tbody>${offers.map(o => { const proj = projects.find(p => p.id === o.projectId); const cust = proj ? customers.find(c => c.id === proj.customerId) : null; return `<tr><td><strong>Angebot #${o.id}</strong></td><td>${escapeHtml(proj?.title || '-')}</td><td>${escapeHtml(cust ? `${cust.firstName} ${cust.lastName}` : '-')}</td><td>${formatCurrency(o.totalPrice || 0)}</td><td><span class="status-badge ${getStatusClass(o.status || 'Angebot offen')}">${escapeHtml(o.status || 'Angebot offen')}</span></td><td>${formatDate(o.createdAt)}</td><td><button class="btn btn-sm btn-primary" onclick="app.exportOfferPDF(${o.id})">📄 PDF</button> <button class="btn btn-sm btn-danger" onclick="app.deleteOffer(${o.id})">🗑</button></td></tr>`; }).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);">Keine Angebote</td></tr>'}</tbody></table></div>`; })(); }

        function renderSettings() { contentArea.innerHTML = `<h1 class="page-title">Einstellungen</h1><div class="card-grid"><div class="nav-card" onclick="app.openCompanySettings()"><div class="card-icon blue">🏢</div><div><div class="card-title">Firmendaten</div><div class="card-subtitle">Name, Adresse, Logo</div></div></div><div class="nav-card" onclick="app.openPDFSettings()"><div class="card-icon purple">📄</div><div><div class="card-title">PDF-Vorlage</div><div class="card-subtitle">Layout & Texte anpassen</div></div></div><div class="nav-card" onclick="app.resetAllData()"><div class="card-icon red">⚠️</div><div><div class="card-title">Alle Daten löschen</div><div class="card-subtitle">Zurücksetzen</div></div></div></div>`; }

        function renderBackup() { contentArea.innerHTML = `<h1 class="page-title">Backup & Wiederherstellung</h1><div class="card-grid"><div class="nav-card" onclick="app.createBackup()"><div class="card-icon blue">💾</div><div><div class="card-title">Backup erstellen</div><div class="card-subtitle">Alle Daten als Datei speichern</div></div></div><div class="nav-card" onclick="app.restoreBackup()"><div class="card-icon green">📥</div><div><div class="card-title">Backup wiederherstellen</div><div class="card-subtitle">Daten aus Datei laden</div></div></div><div class="nav-card" onclick="app.exportAllExcel()"><div class="card-icon purple">📊</div><div><div class="card-title">Komplett-Export</div><div class="card-subtitle">Alle Daten als Excel</div></div></div><div class="nav-card" onclick="app.importAllExcel()"><div class="card-icon amber">📤</div><div><div class="card-title">Komplett-Import</div><div class="card-subtitle">Daten aus Excel importieren</div></div></div></div>`; }

        // ==================== APP-CONTROLLER ====================
        const app = {
            currentPage: 'dashboard',
            currentProjectId: null,

            async init() {
                await db.init();
                document.getElementById('syncStatus').textContent = navigator.onLine ? 'Online' : 'Offline';
                if (navigator.onLine) await fullSync();
                this.setupNavigation();
                this.setupSearch();
                this.setupTheme();
                this.navigate('dashboard');
                this.setupResponsive();
            },

            setupNavigation() {
                document.querySelectorAll('.nav-item[data-page]').forEach(item => { item.addEventListener('click', (e) => { const page = item.dataset.page; this.navigate(page); }); });
                document.getElementById('syncBtn').addEventListener('click', fullSync);
            },

            navigate(page, param = null) {
                this.currentPage = page; this.currentProjectId = param;
                document.querySelectorAll('.nav-item[data-page]').forEach(item => { item.classList.remove('active'); if (item.dataset.page === page) item.classList.add('active'); });
                document.getElementById('sidebar').classList.remove('open');
                switch (page) { case 'dashboard': renderDashboard(); break; case 'customers': renderCustomers(); break; case 'projects': renderProjects(param); break; case 'materials': renderMaterials(); break; case 'offers': renderOffers(); break; case 'settings': renderSettings(); break; case 'backup': renderBackup(); break; default: renderDashboard(); }
            },

            setupSearch() { /* unverändert */ },
            setupTheme() { /* unverändert */ },
            setupResponsive() { /* unverändert */ },

            // Alle weiteren Methoden (Kunden, Projekte, Räume, Bilder, Material, Angebote, PDF, Excel, Backup, Einstellungen)
            // ... (identisch zur Originalversion, hier aus Platzgründen nicht wiederholt)
        };

        // ==================== INITIALISIERUNG ====================
        document.addEventListener('DOMContentLoaded', () => { app.init(); });
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
    </script>
</body>
</html>
