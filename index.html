<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b8fa3">
    <meta name="description" content="KTM – Kälte Technik Management">
    <title>KTM – Kälte Technik Management</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230b8fa3'/><circle cx='32' cy='32' r='19' fill='none' stroke='white' stroke-width='3.4'/><path d='M32 32 L42 20' stroke='white' stroke-width='4' stroke-linecap='round'/><circle cx='32' cy='32' r='3.4' fill='white'/></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500;600&amp;display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --bg-primary: #eef3f6;
            --bg-secondary: rgba(255,255,255,0.72);
            --bg-secondary-solid: #ffffff;
            --bg-tertiary: rgba(222,235,240,0.55);
            --text-primary: #0c1a22;
            --text-secondary: #47606b;
            --text-muted: #86999f;
            --border: rgba(13,45,58,0.10);
            --accent: #0b8fa3;
            --accent-hover: #076d7d;
            --accent-light: rgba(11,143,163,0.10);
            --discharge: #c17a45;
            --discharge-light: rgba(193,122,69,0.13);
            --success: #16805c;
            --success-light: rgba(22,128,92,0.10);
            --warning: #c17a45;
            --warning-light: rgba(193,122,69,0.13);
            --danger: #bf4040;
            --danger-light: rgba(191,64,64,0.10);
            --info: #5c63d1;
            --info-light: rgba(92,99,209,0.10);
            --shadow-sm: 0 1px 2px rgba(11,40,52,0.05), 0 1px 1px rgba(11,40,52,0.04);
            --shadow-md: 0 8px 24px rgba(11,40,52,0.09);
            --shadow-lg: 0 22px 50px rgba(11,40,52,0.16);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --transition: 0.2s cubic-bezier(.4,0,.2,1);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-display: 'Space Grotesk', 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', monospace;
            --sidebar-width: 264px;
            --header-height: 68px;
            --glass-blur: blur(22px) saturate(150%);
        }

        [data-theme="dark"] {
            --bg-primary: #070c12;
            --bg-secondary: rgba(19,27,37,0.60);
            --bg-secondary-solid: #131b25;
            --bg-tertiary: rgba(30,41,54,0.55);
            --text-primary: #e6f1f4;
            --text-secondary: #9db0ba;
            --text-muted: #647680;
            --border: rgba(255,255,255,0.08);
            --accent: #2dd4ee;
            --accent-hover: #6ae4f7;
            --accent-light: rgba(45,212,238,0.14);
            --discharge: #e2925f;
            --discharge-light: rgba(226,146,95,0.15);
            --success: #38d39b;
            --success-light: rgba(56,211,155,0.13);
            --warning: #e2925f;
            --warning-light: rgba(226,146,95,0.15);
            --danger: #f2716f;
            --danger-light: rgba(242,113,111,0.13);
            --info: #8891f0;
            --info-light: rgba(136,145,240,0.13);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.35);
            --shadow-md: 0 10px 28px rgba(0,0,0,0.45);
            --shadow-lg: 0 26px 58px rgba(0,0,0,0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font-family);
            background:
                radial-gradient(circle at 12% -8%, var(--accent-light), transparent 42%),
                radial-gradient(circle at 92% 6%, var(--discharge-light), transparent 38%),
                var(--bg-primary);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
        }
        ::selection { background: var(--accent); color: #fff; }
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
        }
        .stat-card::before, .nav-card::before, .table-container::before, .modal::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2.5px;
            background: linear-gradient(90deg, var(--accent), var(--discharge));
            border-radius: inherit;
            opacity: 0.85;
        }
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 22px 16px;
            flex-shrink: 0;
            transition: all var(--transition);
            z-index: 100;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 12px; padding: 6px 10px; margin-bottom: 30px;
            font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px;
        }
        .sidebar-logo .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--discharge));
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            box-shadow: 0 4px 14px rgba(11,143,163,0.35);
            flex-shrink: 0;
        }
        .nav-section { margin-bottom: 22px; }
        .nav-section-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); padding: 8px 12px; font-weight: 700; }
        .nav-item {
            display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--radius-sm);
            cursor: pointer; transition: all var(--transition); font-size: 14px; color: var(--text-secondary);
            text-decoration: none; font-weight: 500;
        }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
        .nav-item .nav-icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }
        .nav-badge {
            margin-left: auto; background: linear-gradient(135deg, var(--accent), var(--discharge)); color: #fff;
            font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 700; font-family: var(--font-mono);
        }
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar {
            height: var(--header-height); background: var(--bg-secondary);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px;
            gap: 16px; flex-shrink: 0; position: sticky; top: 0; z-index: 90;
        }
        .search-box {
            flex: 1; max-width: 420px; display: flex; align-items: center; background: var(--bg-tertiary);
            border: 1px solid transparent; border-radius: 24px; padding: 9px 16px; gap: 8px; transition: all var(--transition);
        }
        .search-box:focus-within { border-color: var(--accent); background: var(--bg-secondary-solid); }
        .search-box input { border: none; background: transparent; flex: 1; font-size: 14px; color: var(--text-primary); outline: none; font-family: var(--font-family); }
        .search-box .search-icon { color: var(--text-muted); font-size: 16px; }
        .topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; cursor: pointer;
            font-size: 19px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all var(--transition);
        }
        .icon-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); transform: translateY(-1px); }
        .content-scroll { flex: 1; overflow-y: auto; padding: 26px; }
        .page-title { font-family: var(--font-display); font-size: 27px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.4px; color: var(--text-primary); }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card {
            position: relative; background: var(--bg-secondary); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-md); padding: 22px 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border);
            transition: all var(--transition); overflow: hidden;
        }
        .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .stat-card .stat-value { font-family: var(--font-mono); font-size: 32px; font-weight: 600; color: var(--accent); letter-spacing: -0.5px; }
        .stat-card .stat-label { font-size: 12.5px; color: var(--text-muted); margin-top: 5px; font-weight: 500; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .nav-card {
            position: relative; background: var(--bg-secondary); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-md); padding: 22px 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border);
            cursor: pointer; transition: all var(--transition); display: flex; align-items: center; gap: 16px; overflow: hidden;
        }
        .nav-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--accent); }
        .nav-card .card-icon { width: 50px; height: 50px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 23px; flex-shrink: 0; }
        .card-icon.blue { background: var(--accent-light); }
        .card-icon.green { background: var(--success-light); }
        .card-icon.amber { background: var(--discharge-light); }
        .card-icon.purple { background: var(--info-light); }
        .card-icon.red { background: var(--danger-light); }
        .nav-card .card-title { font-weight: 600; font-size: 15px; }
        .nav-card .card-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .table-container {
            position: relative; background: var(--bg-secondary); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-md); border: 1px solid var(--border); overflow-x: auto; box-shadow: var(--shadow-sm);
        }
        table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
        th {
            background: var(--bg-tertiary); padding: 13px 16px; text-align: left; font-weight: 700; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap;
        }
        td { padding: 13px 16px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg-tertiary); }
        .status-badge { display: inline-block; padding: 4px 11px; border-radius: 12px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.2px; }
        .status-neu { background: var(--info-light); color: var(--info); }
        .status-offen { background: var(--discharge-light); color: var(--discharge); }
        .status-aktiv { background: var(--success-light); color: var(--success); }
        .status-fertig { background: var(--bg-tertiary); color: var(--text-muted); }
        .btn {
            padding: 10px 18px; border-radius: 24px; border: none; cursor: pointer; font-size: 13.5px; font-weight: 600;
            transition: all var(--transition); display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-family); white-space: nowrap;
        }
        .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 10px rgba(11,143,163,0.3); }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(11,143,163,0.4); }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--bg-tertiary); border-color: var(--accent); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { opacity: 0.88; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 16px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px;
            background: var(--bg-secondary-solid); color: var(--text-primary); font-family: var(--font-family); transition: all var(--transition);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(6,14,20,0.55); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 1000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease;
        }
        .modal {
            position: relative; background: var(--bg-secondary); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg); width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; padding: 28px;
            box-shadow: var(--shadow-lg); border: 1px solid var(--border); animation: modalIn 0.25s cubic-bezier(.2,.9,.3,1);
        }
        .modal.modal-wide { max-width: 980px; }
        .modal h3 { font-family: var(--font-display); font-size: 20px; margin-bottom: 20px; font-weight: 700; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes modalIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 14px 20px; border-radius: var(--radius-md); color: #fff; font-weight: 600; font-size: 13.5px; box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s cubic-bezier(.2,.9,.3,1); display: flex; align-items: center; gap: 8px; min-width: 250px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .toast-success { background: rgba(22,128,92,0.92); }
        .toast-error { background: rgba(191,64,64,0.92); }
        .toast-info { background: rgba(92,99,209,0.92); }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .image-card { aspect-ratio: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; transition: all var(--transition); }
        .image-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .image-card img { width: 100%; height: 100%; object-fit: cover; }
        .image-card .img-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.75), transparent); color: #fff; padding: 14px 10px 8px; font-size: 11px; text-align: center; }
        .offer-builder { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 20px; }
        @media (max-width: 800px) { .offer-builder { grid-template-columns: 1fr; } }
        .offer-search-wrap { position: relative; }
        .offer-search-wrap input {
            width: 100%; padding: 12px 14px 12px 40px; border: 1.5px solid var(--border); border-radius: var(--radius-md); font-size: 14px;
            background: var(--bg-tertiary); color: var(--text-primary); font-family: var(--font-family);
        }
        .offer-search-wrap input:focus { outline: none; border-color: var(--accent); background: var(--bg-secondary-solid); }
        .offer-search-wrap .search-ic { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .autocomplete-list {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--bg-secondary-solid); border: 1px solid var(--border);
            border-radius: var(--radius-md); box-shadow: var(--shadow-lg); max-height: 260px; overflow-y: auto; z-index: 50; display: none;
        }
        .autocomplete-item { padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 13px; }
        .autocomplete-item:hover { background: var(--bg-tertiary); }
        .autocomplete-item .ac-name { font-weight: 600; }
        .autocomplete-item .ac-meta { color: var(--text-muted); font-size: 11px; }
        .autocomplete-item .ac-price { color: var(--accent); font-weight: 700; white-space: nowrap; font-family: var(--font-mono); }
        .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .chip {
            padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; background: var(--bg-tertiary); color: var(--text-secondary);
            cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition);
        }
        .chip:hover { background: var(--border); }
        .chip.active { background: var(--accent); color: #fff; }
        .offer-pos-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; margin-top: 10px; }
        .offer-pos-item {
            display: grid; grid-template-columns: 1fr 70px 90px 32px; gap: 8px; align-items: center;
            background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px;
        }
        .offer-pos-item .pos-name { font-weight: 600; }
        .offer-pos-item .pos-meta { font-size: 11px; color: var(--text-muted); }
        .offer-pos-item input[type="number"] { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid var(--border); text-align: center; font-family: var(--font-mono); }
        .offer-summary-box { background: var(--bg-tertiary); border-radius: var(--radius-md); padding: 18px; margin-top: 16px; }
        .offer-summary-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; color: var(--text-secondary); }
        .offer-summary-row.total { font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: var(--accent); border-top: 1px solid var(--border); margin-top: 8px; padding-top: 12px; }
        .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
        .calendar-nav { display: flex; align-items: center; gap: 10px; }
        .calendar-nav .cal-month-label { font-family: var(--font-display); font-size: 18px; font-weight: 700; min-width: 170px; text-align: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 24px; }
        .calendar-weekday { text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); padding: 4px 0; }
        .calendar-day {
            position: relative; min-height: 78px; background: var(--bg-secondary); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 7px; cursor: pointer; transition: all var(--transition); overflow: hidden;
        }
        .calendar-day:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
        .calendar-day.other-month { opacity: 0.35; }
        .calendar-day.today { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
        .calendar-day .cal-day-num { font-size: 12.5px; font-weight: 700; font-family: var(--font-mono); color: var(--text-secondary); }
        .calendar-day.today .cal-day-num { color: var(--accent); }
        .calendar-day .cal-event-pill {
            margin-top: 4px; font-size: 10.5px; padding: 2px 6px; border-radius: 6px; background: var(--accent-light); color: var(--accent);
            font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .calendar-day .cal-event-pill.type-montage { background: var(--success-light); color: var(--success); }
        .calendar-day .cal-event-pill.type-besichtigung { background: var(--discharge-light); color: var(--discharge); }
        .calendar-day .cal-event-pill.type-wartung { background: var(--info-light); color: var(--info); }
        .calendar-day .cal-more { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        .event-list-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: var(--radius-sm);
            background: var(--bg-tertiary); margin-bottom: 8px;
        }
        .event-list-item .event-date-box {
            flex-shrink: 0; width: 46px; text-align: center; background: var(--bg-secondary-solid); border-radius: 8px; padding: 6px 4px; border: 1px solid var(--border);
        }
        .event-list-item .event-date-box .ed-day { font-family: var(--font-mono); font-weight: 700; font-size: 15px; color: var(--accent); }
        .event-list-item .event-date-box .ed-month { font-size: 9.5px; text-transform: uppercase; color: var(--text-muted); }

        const REVERSE_MAP = Object.fromEntries(Object.entries(FIELD_MAP).map(([k,v])=>[v,k]));
function toSnake(o) {

        // ============================================================

        class DatabaseManager {
            constructor() { this.db = null; }

            init() {
                return new Promise((resolve, reject) => {
                    if (!('indexedDB' in window)) {
                        reject(new Error('IndexedDB wird von diesem Browser nicht unterstützt.'));
                        return;
                    }
                    const req = indexedDB.open('KTM_DB', 4);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        ['customers', 'projects', 'rooms', 'images', 'materials', 'offers', 'settings', 'events'].forEach(s => {
                            if (!db.objectStoreNames.contains(s)) db.createObjectStore(s, { keyPath: s === 'settings' ? 'key' : 'id', autoIncrement: s !== 'settings' });
                        });
                    };
                    req.onsuccess = (e) => { this.db = e.target.result; resolve(); };
                    req.onerror = (e) => {
                        const err = e.target.error;
                        if (err && err.name === 'VersionError') {
                            reject(new Error('Es existiert bereits eine neuere lokale Datenbank in diesem Browser. Bitte lade die aktuellste Version der App, oder leere im Zweifel die Website-Daten für diese Seite (Browser-Einstellungen).'));
                            return;
                        }
                        reject(err || new Error('IndexedDB konnte nicht geöffnet werden.'));
                    };
                    req.onblocked = () => reject(new Error('Datenbank-Upgrade blockiert. Bitte alle anderen Tabs dieser App schließen.'));
                });
            }

            async addLocalOnly(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const request = tx.objectStore(storeName).add(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async putLocalOnly(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const request = tx.objectStore(storeName).put(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async deleteLocalOnly(storeName, id) {
                return new Promise((resolve, reject) => {
                    if (id === undefined || id === null) { resolve(); return; }
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const request = tx.objectStore(storeName).delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async get(storeName, id) {
                return new Promise((resolve, reject) => {
                    if (id === undefined || id === null) { resolve(undefined); return; }
                    const tx = this.db.transaction(storeName, 'readonly');
                    const request = tx.objectStore(storeName).get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const request = tx.objectStore(storeName).getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getByIndex(storeName, indexName, value) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const request = tx.objectStore(storeName).getAll();
                    request.onsuccess = () => {
                        const results = request.result.filter(item => item[indexName] === value);
                        resolve(results);
                    };
                    request.onerror = () => reject(request.error);
                });
            }

            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const request = tx.objectStore(storeName).clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async add(storeName, data) {
                data._synced = false;
                data.createdAt = data.createdAt || new Date().toISOString();
                data.updatedAt = new Date().toISOString();

                const result = await this.addLocalOnly(storeName, data);

                if (storeName !== 'settings' && !data.id) {

await this.putLocalOnly(storeName, data);
}

if (!isSyncing) {

}

return result;
}

async put(storeName, data) {

    return result;
}

        const db = new DatabaseManager();

        async function handleRemoteChange(payload) {
            const { table, eventType, new: newRec, old: oldRec } = payload;
            console.log("Supabase Live Update:", eventType, table);

            if (eventType === 'DELETE') {
                await db.deleteLocalOnly(table, oldRec.key || oldRec.id);
            } else {
               const localData = toCamel(newRec);

const existing = await db.get(table, localData.id);

if (
    existing &&
    existing.updatedAt &&
    localData.updatedAt &&
    new Date(existing.updatedAt) >= new Date(localData.updatedAt)
) {
    return;
}

localData._synced = true;
localData._remote = true;

await db.putLocalOnly(table, localData);
            }

        function initRealtime() {

            try {
                sb.channel('public-changes')
                    .on('postgres_changes', { event: '*', schema: 'public' }, handleRemoteChange)
                    .subscribe((status) => {
                        if (status === 'SUBSCRIBED') {
                            updateSyncStatus('online', '🟢 Live');
                        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
                            updateSyncStatus('offline', '🟡 Live-Sync gestört');

                    });

        async function initialFullSync() {
            if (!supabaseAvailable) {
                updateSyncStatus('offline', '⚪ Lokal (kein Supabase)');
                return;
            }
            updateSyncStatus('syncing', '🔄 Syncing...');
            if (!navigator.onLine) {
                updateSyncStatus('offline', '🔴 Offline');

            try {
                await backgroundSyncPush();

                const failedTables = [];
                for (const t of ['customers','projects','rooms','images','materials','offers','events','settings']) {
                    const { data, error } = await sb.from(t).select('*');
                    if (!error && data) {
                        for (const row of data) {

                            localData._synced = true;

                            await db.putLocalOnly(t, localData);
                        }
                    } else if (error) {
                        console.warn(`Sync-Fehler bei Tabelle "${t}":`, error.message);
                        failedTables.push({ table: t, message: error.message });
                    }
                }
                if (failedTables.length > 0) {
                    updateSyncStatus('offline', '🟡 Sync unvollständig');
                    const details = failedTables.map(f => `${f.table}: ${f.message}`).join(' | ');
                    console.error('Folgende Tabellen konnten nicht synchronisiert werden:', details);
                    showToast(`Sync unvollständig (${failedTables.length} Tabelle${failedTables.length > 1 ? 'n' : ''}). Details in der Konsole (F12).`, 'error');
                } else {
                    updateSyncStatus('online', '🟢 Online');

                app.navigate(app.currentPage, app.currentProjectId);

                console.error("Sync Error:", e);
                updateSyncStatus('offline', '🔴 Sync Fehler');

            }
        }

const _pushErrorsWarned = new Set();

let isSyncing = false;

async function backgroundSyncPush() {

    if (isSyncing) return;
    if (!navigator.onLine || !supabaseAvailable) return;

    isSyncing = true;

    try {

        for (const t of ['customers','projects','rooms','images','materials','offers','events','settings']) {

            const unsynced = (await db.getAll(t)).filter(r => !r._synced);

            const handled = new Set();

            const filtered = unsynced.filter(r => {
                const key = r.id ?? r.offerNumber ?? JSON.stringify(r);

                if (handled.has(key)) return false;

                handled.add(key);
                return true;
            });

            for (const rec of filtered) {

                const oldPK = getPK(t, rec);

                const p = toSnake(rec);

                if (!rec._remote || !p.id) {
                    delete p.id;
                }

                        const { data, error } = await sb.from(t)
                            .upsert(p, rec._remote ? { onConflict: t === 'settings' ? 'key' : 'id' } : undefined)
                            .select();

                        if (!error && data?.length) {
                            const nr = toCamel(data[0]);
                            nr._synced = true;
                            nr._remote = true;
                            nr.updatedAt = new Date().toISOString();
                            const idChanged = !rec._remote && oldPK !== undefined && oldPK !== nr.id;

                            if (oldPK !== nr.id) {
    await db.deleteLocalOnly(t, oldPK);
}

await db.putLocalOnly(t, nr);

                            if (idChanged) {
                                await remapForeignKeys(t, oldPK, nr.id);
                            }
                        } else if (error) {
                            console.warn(`Sync-Push-Fehler bei Tabelle "${t}":`, error.message);
                            if (!_pushErrorsWarned.has(t)) {
                                _pushErrorsWarned.add(t);
                                showToast(`"${t}" konnte nicht synchronisiert werden: ${error.message}`, 'error');
                            }
                        }
                    }
                }
            } catch(e) { console.warn('Sync Push Fehler:', e); }
        }

        async function remapForeignKeys(table, oldId, newId) {
            const relations = {
                customers: [{ store: 'projects', field: 'customerId' }],
                projects: [
                    { store: 'rooms', field: 'projectId' },
                    { store: 'images', field: 'projectId' },
                    { store: 'offers', field: 'projectId' },
                ],
            };
            const deps = relations[table];
            if (!deps) return;
            for (const dep of deps) {
                const related = await db.getByIndex(dep.store, dep.field, oldId);
                for (const rec of related) {
                    rec[dep.field] = newId;
                    await db.putLocalOnly(dep.store, rec);
                }
            }
        }

        function calculateCoolingCapacity(rooms) {
            if (!rooms || rooms.length === 0) return { totalKW: 0, recommendation: null, details: [] };

            let totalWatts = 0;
            const details = [];

            for (const room of rooms) {
                const area = (room.length || 0) * (room.width || 0);
                const volume = area * (room.height || 2.5);

                let wattsPerSqm = 80;
                if (room.name && (room.name.toLowerCase().includes('dach') || room.name.toLowerCase().includes('wintergarten'))) {
                    wattsPerSqm = 120;
                }
                if (room.name && room.name.toLowerCase().includes('keller')) {
                    wattsPerSqm = 60;
                }

                const roomWatts = area * wattsPerSqm;
                totalWatts += roomWatts;

                details.push({
                    roomName: room.name || 'Unbenannt',
                    area: Math.round(area * 100) / 100,
                    volume: Math.round(volume * 100) / 100,
                    wattsPerSqm,
                    estimatedKW: Math.round(roomWatts / 100) / 10
                });
            }

            const totalKW = Math.round(totalWatts / 100) / 10;
            const availableSizes = [2.0, 2.5, 3.5, 4.2, 5.0, 6.0, 7.1, 8.5, 10.0];

            let recommendation = availableSizes[0];
            for (const size of availableSizes) {
                if (size >= totalKW) { recommendation = size; break; }
            }
            if (totalKW > availableSizes[availableSizes.length - 1]) {
                recommendation = availableSizes[availableSizes.length - 1];
            }

            return { totalKW, recommendation, details };
        }

            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

            overlay.innerHTML = `
                <div class="modal ${opts.wide ? 'modal-wide' : ''}">

                    </div>
                </div>
            `;
            container.appendChild(overlay);

            overlay.querySelector('.cancel-btn')?.addEventListener('click', () => {
                overlay.remove();
                if (onCancel) onCancel();
            });
            overlay.querySelector('.save-btn')?.addEventListener('click', () => {
                if (onSave) onSave(overlay);

function compressImage(file, maxWidth = 800, quality = 0.7) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                if (width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = reject;
            img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

async function loadOfferDefaults() {

    for (const key of Object.keys(defaults)) {
        const val = await getSetting(`offerDefault_${key}`, null);
        if (val !== null) {
            if (typeof defaults[key] === 'boolean') defaults[key] = val === 'true';

            else defaults[key] = val;

async function getNextAutoNumber() {

    const counterKey = `offerCounter_${year}`;

    await setSetting(counterKey, String(counter));
    return `A-${year}-${String(counter).padStart(4, '0')}`;
}

        const app = {
            currentPage: 'dashboard',
            currentProjectId: null,

            async init() {
                await db.init();

                this.setupNavigation();
                this.setupSearch();
                this.setupTheme();
                this.navigate('dashboard');
                this.setupResponsive();

                this.hideSplash();

                if (navigator.onLine) {
                    initialFullSync().then(initRealtime);
                } else {
                    updateSyncStatus('offline', '🔴 Offline');
                }
            },

            hideSplash() {
                const splash = document.getElementById('splash');
                if (splash) splash.style.display = 'none';
            },

            showSplashError(message) {
                const splash = document.getElementById('splash');
                const status = document.getElementById('splashStatus');
                if (!splash) return;
                splash.style.display = 'flex';
                if (status) status.textContent = 'Fehler beim Start';
                if (!splash.querySelector('.splash-error')) {
                    const errEl = document.createElement('div');
                    errEl.className = 'splash-error';
                    errEl.textContent = message;
                    splash.appendChild(errEl);
                    const retryBtn = document.createElement('button');
                    retryBtn.className = 'splash-retry';
                    retryBtn.textContent = 'Erneut versuchen';
                    retryBtn.onclick = () => window.location.reload();
                    splash.appendChild(retryBtn);
                }
            },

            setupNavigation() {
                document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const page = item.dataset.page;
                        this.navigate(page);
                    });
                });

                document.getElementById('syncBtn').addEventListener('click', async () => {
                    if (!navigator.onLine) {
                        showToast('Keine Internetverbindung.', 'error');
                        return;
                    }
                    if (!supabaseAvailable) {
                        showToast('Supabase ist nicht verbunden.', 'error');
                        return;
                    }
                    showToast('Synchronisiere...', 'info');
                    await initialFullSync();
                    showToast('Synchronisierung abgeschlossen.', 'success');
                });
            },

            navigate(page, param = null) {
                this.currentPage = page;
                this.currentProjectId = param;

                document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.page === page) item.classList.add('active');
                });

                document.getElementById('sidebar').classList.remove('open');

                switch (page) {
                    case 'dashboard': renderDashboard(); break;
                    case 'customers': renderCustomers(); break;
                    case 'projects': renderProjects(param); break;
                    case 'calendar': renderCalendar(param); break;
                    case 'materials': renderMaterials(); break;
                    case 'offers': renderOffers(); break;
                    case 'settings': renderSettings(); break;
                    case 'backup': renderBackup(); break;
                    default: renderDashboard();
                }
            },

            setupSearch() {
                const searchInput = document.getElementById('globalSearch');
                searchInput.addEventListener('input', async (e) => {
                    const query = e.target.value.toLowerCase().trim();
                    if (query.length < 2 && query.length > 0) return;
                    if (query.length === 0) {
                        this.navigate(this.currentPage, this.currentProjectId);
                        return;
                    }

                    const customers = await db.getAll('customers');
                    const projects = await db.getAll('projects');
                    const materials = await db.getAll('materials');

                    const results = [
                        ...customers.filter(c =>
                            (c.firstName + ' ' + c.lastName).toLowerCase().includes(query) ||
                            (c.phone || '').includes(query) ||
                            (c.city || '').toLowerCase().includes(query) ||
                            (c.street || '').toLowerCase().includes(query)
                        ).map(c => ({ type: 'Kunde', title: `${c.firstName} ${c.lastName}`, id: c.id, link: 'customers' })),
                        ...projects.filter(p =>
                            (p.title || '').toLowerCase().includes(query) ||
                            (p.status || '').toLowerCase().includes(query)
                        ).map(p => ({ type: 'Projekt', title: p.title, id: p.id, link: 'projects' })),
                        ...materials.filter(m =>
                            (m.name || '').toLowerCase().includes(query)
                        ).map(m => ({ type: 'Material', title: m.name, id: m.id, link: 'materials' })),
                    ];

                    contentArea.innerHTML = `
                        <h1 class="page-title">Suchergebnisse für "${escapeHtml(query)}"</h1>
                        <div class="table-container">
                            <table>
                                <thead><tr><th>Typ</th><th>Name</th><th>Aktion</th></tr></thead>
                                <tbody>
                                    ${results.length > 0 ? results.map(r => `
                                        <tr>
                                            <td><span class="status-badge ${r.type === 'Kunde' ? 'status-neu' : r.type === 'Projekt' ? 'status-aktiv' : 'status-offen'}">${r.type}</span></td>
                                            <td><strong>${escapeHtml(r.title)}</strong></td>
                                            <td><button class="btn btn-sm btn-primary" onclick="app.navigate('${r.link}', ${idJS(r.id)})">Öffnen</button></td>
                                        </tr>
                                    `).join('') : '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);">Keine Ergebnisse</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    `;
                });
            },

            setupTheme() {
                const toggle = document.getElementById('themeToggle');
                let saved = 'light';
                try { saved = localStorage.getItem('klima-theme') || 'light'; } catch (e) { /* Privater Modus o.ä. */ }
                document.body.dataset.theme = saved;
                toggle.innerHTML = saved === 'dark' ? '<span class="nav-icon">☀️</span> Hellmodus' : '<span class="nav-icon">🌙</span> Dunkelmodus';

                toggle.addEventListener('click', () => {
                    const newTheme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
                    document.body.dataset.theme = newTheme;
                    try { localStorage.setItem('klima-theme', newTheme); } catch (e) { /* ignorieren */ }
                    toggle.innerHTML = newTheme === 'dark' ? '<span class="nav-icon">☀️</span> Hellmodus' : '<span class="nav-icon">🌙</span> Dunkelmodus';
                });
            },

            setupResponsive() {
                const menuToggle = document.getElementById('menuToggle');
                const sidebar = document.getElementById('sidebar');
                const checkWidth = () => {
                    if (window.innerWidth <= 900) {
                        menuToggle.style.display = 'flex';
                    } else {
                        menuToggle.style.display = 'none';
                        sidebar.classList.remove('open');
                    }
                };
                checkWidth();
                window.addEventListener('resize', checkWidth);
                menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
                document.addEventListener('click', (e) => {
                    if (window.innerWidth <= 900 && !sidebar.contains(e.target) && e.target !== menuToggle && !menuToggle.contains(e.target)) {
                        sidebar.classList.remove('open');
                    }
                });
            },

                const original = await db.get('customers', id);
                if (!original) return;
                const copy = { ...original };
                delete copy.id;
                delete copy.createdAt;

                delete copy._remote;
                copy.firstName = copy.firstName + ' (Kopie)';
                await db.add('customers', copy);

            async deleteProject(id) {

                    const rooms = await db.getByIndex('rooms', 'projectId', id);

      async createOffer(projectId) {
    const project = await db.getProjectWithDetails(projectId);
    if (!project) { showToast('Projekt nicht gefunden.', 'error'); return; }
    const customer = project.customerId ? await db.get('customers', project.customerId) : null;
    if (!customer) { showToast('Kein Kunde zugewiesen.', 'error'); return; }

    const materials = await db.getAll('materials');
    const cooling = calculateCoolingCapacity(project.rooms || []);
    const manufacturers = [...new Set(materials.map(m => m.manufacturer).filter(Boolean))];
    const defaults = await loadOfferDefaults();

    let selected = [];
    let activeFilter = 'Alle';

    let offerSettings = {
        offerNumber: defaults.autoNumber ? await getNextAutoNumber() : '',
        autoNumber: defaults.autoNumber,
        offerDate: toLocalDateString(new Date()),
        validUntilEnabled: defaults.validUntilEnabled,
        validUntil: toLocalDateString(new Date(Date.now() + defaults.defaultValidDays * 86400000)),
        vatEnabled: defaults.vatEnabled,
        vatRate: defaults.defaultVatRate,
        discountEnabled: defaults.defaultDiscount > 0,
        discountRate: defaults.defaultDiscount,
    };

    const siteAddress = project.siteAddress || `${customer.street || ''} ${customer.houseNumber || ''}, ${customer.zip || ''} ${customer.city || ''}`.trim();

    const modal = showModal(
        'Angebot erstellen',
        `
        <div style="background:var(--bg-tertiary);border-radius:var(--radius-md);padding:16px;margin-bottom:18px;">

                        <label style="display:flex;align-items:center;gap:4px;font-size:12px;white-space:nowrap;">
                            <input type="checkbox" id="offerAutoNumber" ${offerSettings.autoNumber ? 'checked' : ''}> Auto

                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:6px;">
                        <input type="checkbox" id="offerValidUntilToggle" ${offerSettings.validUntilEnabled ? 'checked' : ''}> Gültig bis anzeigen
                    </label>
                    <input type="date" id="offerValidUntilInput" value="${offerSettings.validUntil}" ${offerSettings.validUntilEnabled ? '' : 'disabled'}>
                </div>
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:6px;">
                        <input type="checkbox" id="offerVatToggle" ${offerSettings.vatEnabled ? 'checked' : ''}> Mehrwertsteuer berechnen
                    </label>
                    <select id="offerVatRate" ${offerSettings.vatEnabled ? '' : 'disabled'}>
                        <option value="0.20" ${offerSettings.vatRate === 0.20 ? 'selected' : ''}>20 % (Standard)</option>
                        <option value="0.10" ${offerSettings.vatRate === 0.10 ? 'selected' : ''}>10 % (ermäßigt)</option>
                        <option value="0.13" ${offerSettings.vatRate === 0.13 ? 'selected' : ''}>13 % (ermäßigt)</option>
                        <option value="0" ${offerSettings.vatRate === 0 ? 'selected' : ''}>0 % (steuerfrei)</option>
                        <option value="custom" ${![0.20,0.10,0.13,0].includes(offerSettings.vatRate) ? 'selected' : ''}>Benutzerdefiniert...</option>
                    </select>
                    <input type="number" id="offerVatCustom" placeholder="z.B. 19" step="0.1" min="0" max="100" style="margin-top:6px;display:${![0.20,0.10,0.13,0].includes(offerSettings.vatRate) ? 'block' : 'none'};" value="${offerSettings.vatRate !== 0.20 && offerSettings.vatRate !== 0.10 && offerSettings.vatRate !== 0.13 && offerSettings.vatRate !== 0 ? (offerSettings.vatRate*100) : ''}">
                </div>
            </div>
            <div class="form-group">
                <label style="display:flex;align-items:center;gap:6px;">
                    <input type="checkbox" id="offerDiscountToggle" ${offerSettings.discountEnabled ? 'checked' : ''}> Rabatt
                </label>
                <input type="number" id="offerDiscountRate" value="${offerSettings.discountRate}" step="0.5" min="0" max="100" ${offerSettings.discountEnabled ? '' : 'disabled'}>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group"><label>Ansprechpartner</label><input type="text" id="offerContact" value="${escapeHtml(customer.firstName + ' ' + customer.lastName)}"></div>
            <div class="form-group"><label>Telefon</label><input type="text" id="offerPhone" value="${escapeHtml(customer.phone || '')}"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>E-Mail</label><input type="email" id="offerEmail" value="${escapeHtml(customer.email || '')}"></div>
        </div>
        <div class="form-group"><label>Baustellenadresse</label><input type="text" id="offerSiteAddress" value="${escapeHtml(siteAddress)}"></div>

        <div class="offer-builder">
            <div>
                <label style="font-size:13px;font-weight:600;color:var(--text-secondary);">Material suchen</label>
                <div class="offer-search-wrap">
                    <span class="search-ic">🔍</span>
                    <input type="text" id="offerMatSearch" placeholder="z.B. Mitsu, Kupferrohr, Klima...">
                    <div class="autocomplete-list" id="offerAutocomplete"></div>
                </div>
                <div class="filter-chips" id="offerFilterChips">
                    <div class="chip active" data-filter="Alle">Alle</div>
                    ${manufacturers.map(m => `<div class="chip" data-filter="${escapeHtml(m)}">${escapeHtml(m)}</div>`).join('')}
                    <div class="chip" data-filter="cat:Zubehör">Zubehör</div>
                    <div class="chip" data-filter="cat:Arbeitszeit">Arbeitszeit</div>
                </div>
                <div id="offerQuickResults" class="table-container" style="max-height:220px;overflow-y:auto;">
                    <table><tbody id="offerQuickResultsBody"></tbody></table>
                </div>
            </div>
            <div>
                <label style="font-size:13px;font-weight:600;color:var(--text-secondary);">Ausgewählte Positionen</label>
                <div class="offer-pos-list" id="offerPosList"></div>
                <div class="offer-summary-box" id="offerSummaryBox"></div>
            </div>
        </div>
        `,
        async (overlay) => {
            if (selected.length === 0) { showToast('Bitte mindestens eine Position wählen.', 'error'); return; }

            const autoNumber = overlay.querySelector('#offerAutoNumber').checked;
            const offerNumber = overlay.querySelector('#offerNumberInput').value.trim();

            if (!offerNumber) {
                showToast('Bitte eine Angebotsnummer eingeben.', 'error');
                return;
            }

            if (!(await isOfferNumberUnique(offerNumber))) {
                showToast('Diese Angebotsnummer existiert bereits!', 'error');
                return;
            }

            const offerDate = overlay.querySelector('#offerDateInput').value;
            const validUntilEnabled = overlay.querySelector('#offerValidUntilToggle').checked;
            const validUntil = overlay.querySelector('#offerValidUntilInput').value;
            const vatEnabled = overlay.querySelector('#offerVatToggle').checked;

            let vatRate = parseFloat(overlay.querySelector('#offerVatRate').value);
            if (overlay.querySelector('#offerVatRate').value === 'custom') {
                vatRate = (parseFloat(overlay.querySelector('#offerVatCustom').value) || 0) / 100;
            }

            const discountEnabled = overlay.querySelector('#offerDiscountToggle').checked;
            const discountRate = discountEnabled ? (parseFloat(overlay.querySelector('#offerDiscountRate').value) || 0) : 0;

            await saveOfferDefault('autoNumber', autoNumber);
            await saveOfferDefault('vatEnabled', vatEnabled);
            await saveOfferDefault('vatRate', vatRate);
            await saveOfferDefault('validUntilEnabled', validUntilEnabled);
            await saveOfferDefault('defaultDiscount', discountRate);

            const calc = computeOfferTotals();

            const offerData = {
                projectId,
                customerId: project.customerId,
                offerNumber,
                offerDate,
                validUntilEnabled,
                validUntil: validUntilEnabled ? validUntil : null,
                vatEnabled,
                vatRate,
                discountEnabled,
                discountRate,
                contactPerson: overlay.querySelector('#offerContact').value.trim(),
                contactPhone: overlay.querySelector('#offerPhone').value.trim(),
                contactEmail: overlay.querySelector('#offerEmail').value.trim(),
                siteAddress: overlay.querySelector('#offerSiteAddress').value.trim(),
                positions: selected.map(s => ({ ...s })),
                subtotal: calc.subtotal,
                discountAmount: calc.discountAmount,
                netAfterDiscount: calc.netAfterDiscount,
                vatAmount: calc.vatAmount,
                totalPrice: calc.total,
                coolingRecommendation: cooling.recommendation,
                coolingDetails: cooling.details,
                status: 'Angebot offen',
                createdAt: new Date().toISOString(),
            };

            await db.add('offers', offerData);
            project.status = 'Angebot offen';
            await db.put('projects', project);

            overlay.remove();
            showToast('Angebot erstellt.', 'success');
            this.navigate('offers');
        },
        null,
        { wide: true }
    );

    function computeOfferTotals() {
        const subtotal = selected.reduce((s, it) => s + it.price * it.quantity, 0);
        const discountRateVal = offerSettings.discountEnabled ? (offerSettings.discountRate / 100) : 0;
        const discountAmount = subtotal * discountRateVal;
        const netAfterDiscount = subtotal - discountAmount;
        const vatAmount = offerSettings.vatEnabled ? netAfterDiscount * offerSettings.vatRate : 0;
        const total = netAfterDiscount + vatAmount;
        return { subtotal, discountRate: discountRateVal, discountAmount, netAfterDiscount, vatAmount, total };
    }

    function updateSettingsFromUI() {
        const autoNumCheckbox = modal.querySelector('#offerAutoNumber');
        const numInput = modal.querySelector('#offerNumberInput');
        const validUntilToggle = modal.querySelector('#offerValidUntilToggle');
        const validUntilInput = modal.querySelector('#offerValidUntilInput');
        const vatToggle = modal.querySelector('#offerVatToggle');
        const vatSelect = modal.querySelector('#offerVatRate');
        const vatCustom = modal.querySelector('#offerVatCustom');
        const discountToggle = modal.querySelector('#offerDiscountToggle');
        const discountInput = modal.querySelector('#offerDiscountRate');

        offerSettings.autoNumber = autoNumCheckbox.checked;
        offerSettings.offerNumber = numInput.value.trim();
        offerSettings.offerDate = modal.querySelector('#offerDateInput').value;
        offerSettings.validUntilEnabled = validUntilToggle.checked;
        offerSettings.validUntil = validUntilInput.value;
        offerSettings.vatEnabled = vatToggle.checked;

        if (vatSelect.value === 'custom') {
            offerSettings.vatRate = (parseFloat(vatCustom.value) || 0) / 100;
        } else {
            offerSettings.vatRate = parseFloat(vatSelect.value);
        }

        offerSettings.discountEnabled = discountToggle.checked;
        offerSettings.discountRate = discountToggle.checked ? (parseFloat(discountInput.value) || 0) : 0;
    }

    modal.querySelector('#offerAutoNumber').addEventListener('change', async function() {
        updateSettingsFromUI();
        if (this.checked) {
            const newNum = await getNextAutoNumber();
            modal.querySelector('#offerNumberInput').value = newNum;
            offerSettings.offerNumber = newNum;
        }
        renderSummary();
    });

    modal.querySelector('#offerNumberInput').addEventListener('input', function() {
        updateSettingsFromUI();
        renderSummary();
    });

    modal.querySelector('#offerDateInput').addEventListener('change', function() {
        updateSettingsFromUI();
        renderSummary();
    });

    modal.querySelector('#offerValidUntilToggle').addEventListener('change', function() {
        updateSettingsFromUI();
        modal.querySelector('#offerValidUntilInput').disabled = !this.checked;
        renderSummary();
    });

    modal.querySelector('#offerValidUntilInput').addEventListener('change', function() {
        updateSettingsFromUI();
        renderSummary();
    });

    modal.querySelector('#offerVatToggle').addEventListener('change', function() {
        updateSettingsFromUI();
        modal.querySelector('#offerVatRate').disabled = !this.checked;
        modal.querySelector('#offerVatCustom').disabled = !this.checked;
        renderSummary();
    });

    modal.querySelector('#offerVatRate').addEventListener('change', function() {
        const customInput = modal.querySelector('#offerVatCustom');
        if (this.value === 'custom') {
            customInput.style.display = 'block';
            customInput.disabled = false;
        } else {
            customInput.style.display = 'none';
            customInput.disabled = true;
        }
        updateSettingsFromUI();
        renderSummary();
    });

    modal.querySelector('#offerVatCustom').addEventListener('input', function() {
        updateSettingsFromUI();
        renderSummary();
    });

    modal.querySelector('#offerDiscountToggle').addEventListener('change', function() {
        updateSettingsFromUI();
        modal.querySelector('#offerDiscountRate').disabled = !this.checked;
        renderSummary();
    });

    modal.querySelector('#offerDiscountRate').addEventListener('input', function() {
        updateSettingsFromUI();
        renderSummary();
    });

    function renderPosList() {
        const list = modal.querySelector('#offerPosList');
        list.innerHTML = selected.map((s, idx) => `
            <div class="offer-pos-item">
                <div>
                    <div class="pos-name">${escapeHtml(s.name)}</div>
                    <div class="pos-meta">${escapeHtml(s.manufacturer || '')} ${s.articleNumber ? '· ' + escapeHtml(s.articleNumber) : ''}</div>
                </div>
                <input type="number" min="1" value="${s.quantity}" data-idx="${idx}" class="offer-qty-input">
                <div style="text-align:right;font-weight:600;">${formatCurrency(s.price * s.quantity)}</div>
                <button class="btn btn-sm btn-danger" data-remove="${idx}" style="padding:4px 8px;">✕</button>
            </div>
        `).join('') || '<div style="color:var(--text-muted);font-size:13px;padding:12px;text-align:center;">Noch keine Positionen ausgewählt.</div>';

        list.querySelectorAll('.offer-qty-input').forEach(inp => {
            inp.addEventListener('input', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                selected[idx].quantity = parseInt(e.target.value) || 1;
                renderPosList();
                updateSettingsFromUI();
                renderSummary();
            });
        });
        list.querySelectorAll('[data-remove]').forEach(btn => {
            btn.addEventListener('click', () => {
                selected.splice(parseInt(btn.dataset.remove), 1);
                renderPosList();
                updateSettingsFromUI();
                renderSummary();
            });
        });
    }

    function renderSummary() {
        updateSettingsFromUI();
        const calc = computeOfferTotals();
        let html = `
            <div class="offer-summary-row"><span>Nettobetrag</span><span>${formatCurrency(calc.subtotal)}</span></div>
        `;
        if (offerSettings.discountEnabled && calc.discountAmount > 0) {
            html += `<div class="offer-summary-row"><span>Rabatt (${(calc.discountRate*100).toFixed(1)}%)</span><span>- ${formatCurrency(calc.discountAmount)}</span></div>`;
        }
        if (offerSettings.vatEnabled) {
            html += `<div class="offer-summary-row"><span>MwSt. (${(offerSettings.vatRate*100).toFixed(0)}%)</span><span>${formatCurrency(calc.vatAmount)}</span></div>`;
        }
        html += `<div class="offer-summary-row total"><span>Gesamtbetrag</span><span>${formatCurrency(calc.total)}</span></div>`;
        modal.querySelector('#offerSummaryBox').innerHTML = html;
    }

    function matchesFilter(m) {
        if (activeFilter === 'Alle') return true;
        if (activeFilter.startsWith('cat:')) return m.category === activeFilter.slice(4);
        return m.manufacturer === activeFilter;
    }

    function renderQuickResults(query = '') {
        const q = query.toLowerCase().trim();
        const results = materials.filter(m => matchesFilter(m) && (!q || (m.name||'').toLowerCase().includes(q) || (m.manufacturer||'').toLowerCase().includes(q) || (m.category||'').toLowerCase().includes(q))).slice(0, 30);
        modal.querySelector('#offerQuickResultsBody').innerHTML = results.map(m => `
            <tr style="cursor:pointer;" data-add="${m.id}">
                <td>${m.image ? `<img src="${m.image}" style="width:28px;height:28px;object-fit:cover;border-radius:6px;">` : ''}</td>
                <td><strong>${escapeHtml(m.name)}</strong><div class="pos-meta" style="color:var(--text-muted);font-size:11px;">${escapeHtml(m.manufacturer||'')} ${escapeHtml(m.category||'')}</div></td>
                <td style="text-align:right;color:var(--accent);font-weight:700;">${formatCurrency(m.sellingPrice||0)}</td>
                <td><button class="btn btn-sm btn-primary" data-add-btn="${m.id}">+</button></td>
            </tr>
        `).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:14px;">Keine Treffer</td></tr>';

        modal.querySelectorAll('[data-add-btn]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                addMaterial(parseId(btn.dataset.addBtn));
            });
        });
        modal.querySelectorAll('[data-add]').forEach(row => {
            row.addEventListener('click', () => addMaterial(parseId(row.dataset.add)));
        });
    }

    function addMaterial(materialId) {
        const m = materials.find(mm => mm.id === materialId);
        if (!m) return;
        const existing = selected.find(s => s.materialId === materialId);
        if (existing) { existing.quantity += 1; }
        else {
            selected.push({
                materialId: m.id, name: m.name, unit: m.unit || 'Stk', price: m.sellingPrice || 0,
                quantity: 1, manufacturer: m.manufacturer || '', articleNumber: m.articleNumber || '',
                category: m.category || '', description: m.description || '', image: m.image || ''
            });
        }
        renderPosList();
        updateSettingsFromUI();
        renderSummary();
        modal.querySelector('#offerMatSearch').value = '';
        modal.querySelector('#offerAutocomplete').style.display = 'none';
    }

    const searchInput = modal.querySelector('#offerMatSearch');
    const acList = modal.querySelector('#offerAutocomplete');
    searchInput.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase().trim();
        renderQuickResults(q);
        if (!q) { acList.style.display = 'none'; return; }
        const matches = materials.filter(m => matchesFilter(m) && (m.name||'').toLowerCase().includes(q)).slice(0, 8);
        if (matches.length === 0) { acList.style.display = 'none'; return; }
        acList.innerHTML = matches.map(m => `
            <div class="autocomplete-item" data-ac="${m.id}">
                <div><div class="ac-name">${escapeHtml(m.name)}</div><div class="ac-meta">${escapeHtml(m.manufacturer||'')} ${escapeHtml(m.category||'')}</div></div>
                <div class="ac-price">${formatCurrency(m.sellingPrice||0)}</div>
            </div>
        `).join('');
        acList.style.display = 'block';
        acList.querySelectorAll('[data-ac]').forEach(el => {
            el.addEventListener('click', () => addMaterial(parseId(el.dataset.ac)));
        });
    });
    modal.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target) && !acList.contains(e.target)) acList.style.display = 'none';
    });

    modal.querySelectorAll('#offerFilterChips .chip').forEach(chip => {
        chip.addEventListener('click', () => {
            modal.querySelectorAll('#offerFilterChips .chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            activeFilter = chip.dataset.filter;
            renderQuickResults(searchInput.value);
        });
    });

    renderQuickResults();
    renderPosList();
    renderSummary();
},

async exportOfferPDF(offerId) {
    if (typeof window.jspdf === 'undefined') {
        showToast('PDF-Bibliothek konnte nicht geladen werden.', 'error');
        return;
    }
    const offer = await db.get('offers', offerId);
    if (!offer) { showToast('Angebot nicht gefunden.', 'error'); return; }
    const project = await db.get('projects', offer.projectId);
    const customer = offer.customerId ? await db.get('customers', offer.customerId) : null;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageWidth = doc.internal.pageSize.getWidth();
    const marginX = 16;
    const accentColor = [37, 99, 235];
    const grayColor = [90, 95, 107];
    const lightGray = [238, 241, 245];

    const companyLogo = await getSetting('companyLogo', '');
    const companyPhone = await getSetting('companyPhone', '');
    const companyEmail = await getSetting('companyEmail', '');
    const companyWebsite = await getSetting('companyWebsite', '');
    const companyAddress = await getSetting('companyAddress', '');
    const companyUID = await getSetting('companyUID', '');
    const companyFirmenbuch = await getSetting('companyFirmenbuch', '');
    const companyBank = await getSetting('companyBank', '');
    const paymentTerms = await getSetting('paymentTerms', 'Zahlbar innerhalb 14 Tagen ohne Abzug.');

    let y = 18;

    if (companyLogo) {
        try {
            const imgProps = doc.getImageProperties(companyLogo);
            const logoH = 16;
            const logoW = (imgProps.width / imgProps.height) * logoH;
            doc.addImage(companyLogo, imgProps.fileType || 'PNG', marginX, y - 4, logoW, logoH);
        } catch(e) { console.warn('Logo-Fehler', e); }
    }

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(...grayColor);
    const contactLines = [companyPhone, companyEmail, companyWebsite, companyAddress].filter(Boolean);
    let cy = y - 4;
    contactLines.forEach(line => { doc.text(line, pageWidth - marginX, cy, { align: 'right' }); cy += 4.5; });

    y = Math.max(y + 18, cy + 4);
    doc.setDrawColor(...lightGray);
    doc.setLineWidth(0.6);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 10;

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.setTextColor(30, 33, 35);
    doc.text('ANGEBOT', marginX, y);
    y += 9;

    doc.setFontSize(9.5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...grayColor);
    doc.text(`Angebotsnummer: ${offer.offerNumber || offer.id}`, marginX, y); y += 5;
    doc.text(`Angebotsdatum: ${formatDate(offer.offerDate || offer.createdAt)}`, marginX, y); y += 5;

    if (offer.validUntilEnabled && offer.validUntil) {
        doc.text(`Gültig bis: ${formatDate(offer.validUntil)}`, marginX, y); y += 5;
    }
    y += 8;

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10.5);
    doc.setTextColor(30, 33, 35);
    doc.text('Kunde', marginX, y);
    y += 6;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9.5);
    doc.setTextColor(60, 64, 72);
    const custLines = [];
    if (customer) {
        custLines.push(`${customer.firstName || ''} ${customer.lastName || ''}`.trim());
        if (customer.company) custLines.push(customer.company);
    }
    if (project?.title) custLines.push(`Projekt: ${project.title}`);
    if (offer.siteAddress) custLines.push(`Baustelle: ${offer.siteAddress}`);
    if (offer.contactPerson) custLines.push(`Ansprechpartner: ${offer.contactPerson}`);
    if (offer.contactPhone) custLines.push(`Telefon: ${offer.contactPhone}`);
    if (offer.contactEmail) custLines.push(`E-Mail: ${offer.contactEmail}`);
    custLines.forEach(line => { doc.text(line, marginX, y); y += 4.8; });
    y += 6;

    if (offer.coolingRecommendation) {
        doc.setFillColor(...lightGray);
        doc.roundedRect(marginX, y, pageWidth - marginX*2, 10, 2, 2, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9.5);
        doc.setTextColor(...accentColor);
        doc.text(`❄ Empfohlene Kälteleistung: ${offer.coolingRecommendation} kW`, marginX + 4, y + 6.5);
        y += 16;
    }

    const rows = (offer.positions || []).map((p, i) => [
        String(i + 1),
        p.name || '',
        p.description || (p.manufacturer ? `${p.manufacturer}${p.articleNumber ? ' · ' + p.articleNumber : ''}` : ''),
        String(p.quantity),
        p.unit || 'Stk',
        formatCurrency(p.price),
        formatCurrency(p.price * p.quantity)
    ]);

    doc.autoTable({
        startY: y,
        margin: { left: marginX, right: marginX },
        head: [['Pos', 'Artikel', 'Beschreibung', 'Menge', 'Einheit', 'Einzelpreis', 'Gesamt']],
        body: rows,
        styles: { font: 'helvetica', fontSize: 8.8, cellPadding: 3, textColor: [40,44,50], lineColor: lightGray, lineWidth: 0.2 },
        headStyles: { fillColor: [26,29,35], textColor: 255, fontStyle: 'bold', fontSize: 8.5 },
        alternateRowStyles: { fillColor: [248, 249, 251] },
        columnStyles: {
            0: { cellWidth: 10, halign: 'center' },
            3: { cellWidth: 16, halign: 'center' },
            4: { cellWidth: 16, halign: 'center' },
            5: { cellWidth: 26, halign: 'right' },
            6: { cellWidth: 26, halign: 'right' },
        },
        didDrawPage: () => drawFooter(),
    });

    let finalY = doc.lastAutoTable.finalY + 8;
    if (finalY > 250) { doc.addPage(); finalY = 20; }

    const boxW = 78;
    const boxX = pageWidth - marginX - boxW;
    doc.setFontSize(9.5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(60, 64, 72);

    const summaryRows = [['Nettobetrag', formatCurrency(offer.subtotal || 0)]];

    if (offer.discountEnabled && offer.discountRate > 0 && offer.discountAmount > 0) {
        summaryRows.push([`Rabatt (${((offer.discountRate||0)*100).toFixed(1)}%)`, `- ${formatCurrency(offer.discountAmount || 0)}`]);
    }
    if (offer.vatEnabled) {
        summaryRows.push([`MwSt. (${((offer.vatRate||0)*100).toFixed(0)}%)`, formatCurrency(offer.vatAmount || 0)]);
    }

    summaryRows.forEach(([label, val]) => {
        doc.text(label, boxX, finalY);
        doc.text(val, pageWidth - marginX, finalY, { align: 'right' });
        finalY += 6;
    });

    finalY += 2;
    doc.setFillColor(...accentColor);
    doc.roundedRect(boxX, finalY - 6, boxW, 13, 2.5, 2.5, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.setTextColor(255, 255, 255);
    doc.text('Gesamtbetrag', boxX + 4, finalY + 2);
    doc.text(formatCurrency(offer.totalPrice || 0), pageWidth - marginX - 4, finalY + 2, { align: 'right' });

    function drawFooter() {
        const ph = doc.internal.pageSize.getHeight();
        const fy = ph - 20;
        doc.setDrawColor(...lightGray);
        doc.setLineWidth(0.4);
        doc.line(marginX, fy, pageWidth - marginX, fy);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7.5);
        doc.setTextColor(...grayColor);
        const left = [companyAddress, [companyPhone, companyEmail].filter(Boolean).join('  ·  '), companyWebsite].filter(Boolean).join('   |   ');
        const right = [companyUID ? `UID: ${companyUID}` : '', companyFirmenbuch ? `FB-Nr.: ${companyFirmenbuch}` : '', companyBank].filter(Boolean).join('   |   ');
        doc.text(left, marginX, fy + 5);
        doc.text(right, marginX, fy + 9.5);
        doc.text(paymentTerms, pageWidth - marginX, fy + 5, { align: 'right' });
    }
    drawFooter();

    doc.save(`${offer.offerNumber || ('Angebot_' + offer.id)}_${customer?.lastName || 'Kunde'}.pdf`);
    showToast('PDF exportiert.', 'success');
},

            async deleteOffer(id) {
                if (!confirm('Angebot löschen?')) return;

                showToast('Angebot gelöscht.', 'info');
