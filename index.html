<html lang="de">
<head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* ============ EXAKT DAS GLEICHE CSS WIE IN DER ERSTEN OFFLINE-VERSION ============ */
        :root {
            --bg-primary: #f5f6f8; --bg-secondary: #ffffff; --bg-tertiary: #eef1f5;
            --text-primary: #1a1d23; --text-secondary: #5a5f6b; --text-muted: #8b909c;
            --border: #e2e5ea; --accent: #2563eb; --accent-hover: #1d4ed8; --accent-light: #eff3ff;
            --success: #059669; --success-light: #ecfdf5; --warning: #d97706; --warning-light: #fffbeb;
            --danger: #dc2626; --danger-light: #fef2f2; --info: #6366f1; --info-light: #eef2ff;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12); --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
            --transition: 0.2s ease; --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --sidebar-width: 260px; --header-height: 64px;
        }
        [data-theme="dark"] {
            --bg-primary: #111827; --bg-secondary: #1a1f2e; --bg-tertiary: #222837;
            --text-primary: #e8eaed; --text-secondary: #9ca3af; --text-muted: #6b7280;
            --border: #2d3340; --accent: #3b82f6; --accent-hover: #60a5fa; --accent-light: #1e293b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3); --shadow-md: 0 4px 12px rgba(0,0,0,0.4); --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-family); background: var(--bg-primary); color: var(--text-primary);
            display: flex; min-height: 100vh; transition: background var(--transition), color var(--transition);
        }
        .sidebar {
            width: var(--sidebar-width); background: var(--bg-secondary); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px 16px; flex-shrink: 0; transition: all var(--transition); z-index: 100;
        }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 8px 12px; margin-bottom: 28px; font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
        .sidebar-logo .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; }
        .nav-section { margin-bottom: 20px; }
        .nav-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 8px 12px; font-weight: 600; }
        .nav-item {
            display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--radius-sm);
            cursor: pointer; transition: all var(--transition); font-size: 14px; color: var(--text-secondary);
            text-decoration: none; font-weight: 500;
        }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
        .nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
        .nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar {
            height: var(--header-height); background: var(--bg-secondary); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0;
        }
        .search-box { flex: 1; max-width: 400px; display: flex; align-items: center; background: var(--bg-tertiary); border-radius: 24px; padding: 9px 16px; gap: 8px; }
        .search-box input { border: none; background: transparent; flex: 1; font-size: 14px; color: var(--text-primary); outline: none; font-family: var(--font-family); }
        .search-box .search-icon { color: var(--text-muted); font-size: 16px; }
        .topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all var(--transition); }
        .icon-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .content-scroll { flex: 1; overflow-y: auto; padding: 24px; }
        .page-title { font-size: 26px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.4px; color: var(--text-primary); }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card {
            background: var(--bg-secondary); border-radius: var(--radius-md); padding: 20px 24px;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: all var(--transition);
        }
        .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
        .stat-card .stat-value { font-size: 32px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
        .stat-card .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .nav-card {
            background: var(--bg-secondary); border-radius: var(--radius-md); padding: 22px 20px;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border); cursor: pointer; transition: all var(--transition);
            display: flex; align-items: center; gap: 16px;
        }
        .nav-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .nav-card .card-icon { width: 50px; height: 50px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .card-icon.blue { background: #eff3ff; } .card-icon.green { background: #ecfdf5; } .card-icon.amber { background: #fffbeb; } .card-icon.purple { background: #eef2ff; } .card-icon.red { background: #fef2f2; }
        .nav-card .card-title { font-weight: 600; font-size: 15px; } .nav-card .card-subtitle { font-size: 12px; color: var(--text-muted); }
        .table-container { background: var(--bg-secondary); border-radius: var(--radius-md); border: 1px solid var(--border); overflow-x: auto; box-shadow: var(--shadow-sm); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: var(--bg-tertiary); padding: 13px 16px; text-align: left; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
        td { padding: 13px 16px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg-tertiary); }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .status-neu { background: #eef2ff; color: #6366f1; } .status-offen { background: #fffbeb; color: #d97706; }
        .status-aktiv { background: #ecfdf5; color: #059669; } .status-fertig { background: #f3f4f6; color: #6b7280; }
        .btn { padding: 10px 18px; border-radius: 24px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all var(--transition); display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-family); white-space: nowrap; }
        .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); } .btn-outline:hover { background: var(--bg-tertiary); }
        .btn-danger { background: var(--danger); color: #fff; } .btn-danger:hover { opacity: 0.9; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 16px; }
        .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 50%; justify-content: center; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg-secondary); color: var(--text-primary); font-family: var(--font-family); transition: all var(--transition); }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
        .modal { background: var(--bg-secondary); border-radius: var(--radius-lg); width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; padding: 28px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .modal h3 { font-size: 20px; margin-bottom: 20px; font-weight: 700; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 14px 20px; border-radius: var(--radius-md); color: #fff; font-weight: 600; font-size: 14px; box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px; min-width: 250px; }
        .toast-success { background: #059669; } .toast-error { background: #dc2626; } .toast-info { background: #6366f1; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        .tab-btn { padding: 12px 20px; border: none; background: transparent; cursor: pointer; font-weight: 600; color: var(--text-muted); font-size: 14px; transition: all var(--transition); border-bottom: 2px solid transparent; margin-bottom: -2px; font-family: var(--font-family); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .image-card { aspect-ratio: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; }
        .image-card .img-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: #fff; padding: 6px 10px; font-size: 11px; text-align: center; }
        @media (max-width: 900px) { .sidebar { position: fixed; left: -280px; height: 100vh; transition: left 0.3s ease; } .sidebar.open { left: 0; } .stats-row { grid-template-columns: repeat(2, 1fr); } .card-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
        @media (max-width: 600px) { .stats-row { grid-template-columns: 1fr; } .modal { width: 95%; padding: 16px; margin: 8px; } .topbar { padding: 0 12px; } .content-scroll { padding: 16px; } }
        @media print { .sidebar, .topbar, .toast-container { display: none !important; } .main-area { margin: 0; } .content-scroll { overflow: visible; padding: 0; } .modal-overlay { position: static; } }
        .splash-screen { position: fixed; inset: 0; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 16px; }
        .splash-screen .splash-logo { font-size: 48px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>

    <aside class="sidebar" id="sidebar">

    <!-- MAIN CONTENT -->
    <div class="main-area">

    <div id="modalContainer"></div>

    <script>
        // ==================== SUPABASE KONFIGURATION ====================
        const SUPABASE_URL = 'https://xnscmfplphinkqnuiknj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_crnUSmznTl6eWBIV0Y-6VA_gslGmklv';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==================== SYNCHRONISATIONS-LOGIK ====================
        const SYNC_INTERVAL = 300000; // 5 Minuten

        // camelCase ↔ snake_case Konvertierung
        const FIELD_MAP = {
            firstName:'first_name', lastName:'last_name', houseNumber:'house_number',
            customerId:'customer_id', projectId:'project_id', roomCount:'room_count',
            purchasePrice:'purchase_price', sellingPrice:'selling_price', totalPrice:'total_price',
            vatRate:'vat_rate', vatAmount:'vat_amount', coolingRecommendation:'cooling_recommendation',
            coolingDetails:'cooling_details', createdAt:'created_at', updatedAt:'updated_at'
        };
        const REVERSE_MAP = Object.fromEntries(Object.entries(FIELD_MAP).map(([k,v])=>[v,k]));

        function toSnakeCase(obj) {
            const result = {};
            for (const [key, value] of Object.entries(obj)) {
                result[FIELD_MAP[key] || key] = value;
            }
            return result;
        }

        function toCamelCase(obj) {
            const result = {};
            for (const [key, value] of Object.entries(obj)) {
                result[REVERSE_MAP[key] || key] = value;
            }
            return result;
        }

        async function syncTableToSupabase(tableName) {
            const allLocal = await db.getAll(tableName);
            for (const record of allLocal) {
                if (record._synced) continue;
                const payload = toSnakeCase({...record});
                delete payload.id;
                delete payload._synced;
                delete payload.createdAt;
                delete payload.updatedAt;

                const { data, error } = await supabase.from(tableName).insert(payload).select();
                if (!error && data && data.length > 0) {
                    // Lokalen Eintrag durch Server-Version ersetzen
                    await db.delete(tableName, record.id);
                    const serverRecord = toCamelCase(data[0]);
                    serverRecord._synced = true;
                    await db.add(tableName, serverRecord);
                } else if (error) {
                    console.warn(`Sync-Fehler bei ${tableName}:`, error.message);
                }
            }
        }

        async function syncTableFromSupabase(tableName) {
            const { data, error } = await supabase.from(tableName).select('*');
            if (error) {
                console.warn(`Pull-Fehler bei ${tableName}:`, error.message);
                return;
            }
            const existingIds = new Set((await db.getAll(tableName)).map(r => r.id));
            for (const row of data) {
                const record = toCamelCase(row);
                record._synced = true;
                if (existingIds.has(record.id)) {
                    await db.put(tableName, record);
                } else {
                    await db.add(tableName, record);
                }
            }
        }

        async function fullSync() {
            if (!navigator.onLine) {
                showToast('Keine Internetverbindung – Offline-Modus', 'info');
                return;
            }
            const statusEl = document.getElementById('syncStatus');
            const badgeEl = document.getElementById('syncBadge');
            statusEl.textContent = 'Sync...';
            if (badgeEl) badgeEl.textContent = '⏳';

            try {
                const tables = ['customers', 'projects', 'rooms', 'images', 'materials', 'offers', 'settings'];
                for (const table of tables) {
                    await syncTableToSupabase(table);
                    await syncTableFromSupabase(table);
                }
                showToast('Synchronisation abgeschlossen', 'success');
                if (badgeEl) badgeEl.textContent = '✅';
                setTimeout(() => { if (badgeEl) badgeEl.textContent = ''; }, 3000);
            } catch (e) {
                console.error('Sync-Fehler:', e);
                showToast('Synchronisationsfehler', 'error');
                if (badgeEl) badgeEl.textContent = '❌';
            }
            statusEl.textContent = navigator.onLine ? 'Online' : 'Offline';
            // Aktuelle Seite neu rendern, um neue Daten anzuzeigen
            app.navigate(app.currentPage, app.currentProjectId);
        }

        // Automatischer Sync bei Verbindungswiederherstellung
        window.addEventListener('online', () => {
            document.getElementById('syncStatus').textContent = 'Online';
            fullSync();
        });
        window.addEventListener('offline', () => {
            document.getElementById('syncStatus').textContent = 'Offline';
        });

        // Regelmäßiger Sync
        setInterval(() => {
            if (navigator.onLine) fullSync();
        }, SYNC_INTERVAL);

        // ==================== DATENBANK-SCHICHT (ORIGINAL INDEXEDDB) ====================
        const DB_NAME = 'KTM_DB';
        const DB_VERSION = 1;

        class DatabaseManager {
            constructor() {
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('customers')) {
                            const custStore = db.createObjectStore('customers', { keyPath: 'id', autoIncrement: true });
                            custStore.createIndex('name', 'lastName', { unique: false });
                            custStore.createIndex('status', 'status', { unique: false });
                            custStore.createIndex('created', 'createdAt', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('projects')) {
                            const projStore = db.createObjectStore('projects', { keyPath: 'id', autoIncrement: true });
                            projStore.createIndex('customerId', 'customerId', { unique: false });
                            projStore.createIndex('status', 'status', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('rooms')) {
                            const roomStore = db.createObjectStore('rooms', { keyPath: 'id', autoIncrement: true });
                            roomStore.createIndex('projectId', 'projectId', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('images')) {
                            const imgStore = db.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
                            imgStore.createIndex('projectId', 'projectId', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('materials')) {
                            const matStore = db.createObjectStore('materials', { keyPath: 'id', autoIncrement: true });
                            matStore.createIndex('category', 'category', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('offers')) {
                            const offStore = db.createObjectStore('offers', { keyPath: 'id', autoIncrement: true });
                            offStore.createIndex('projectId', 'projectId', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('settings')) {
                            db.createObjectStore('settings', { keyPath: 'key' });
                        }
                    };
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        resolve(this.db);
                    };
                    request.onerror = (e) => {
                        console.error('DB-Fehler:', e.target.error);
                        reject(e.target.error);
                    };
                });
            }

            // Generische CRUD-Operationen (unverändert)
            async add(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.createdAt = data.createdAt || new Date().toISOString();
                    data.updatedAt = new Date().toISOString();
                    if (data._synced === undefined) data._synced = false;
                    const request = store.add(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async put(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.updatedAt = new Date().toISOString();
                    if (data._synced === undefined) data._synced = false;
                    const request = store.put(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async get(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async delete(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async getByIndex(storeName, indexName, value) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const index = store.index(indexName);
                    const request = index.getAll(value);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async getProjectWithDetails(projectId) {
                const project = await this.get('projects', projectId);
                if (!project) return null;
                const rooms = await this.getByIndex('rooms', 'projectId', projectId);
                const images = await this.getByIndex('images', 'projectId', projectId);
                const offers = await this.getByIndex('offers', 'projectId', projectId);
                return { ...project, rooms, images, offers };
            }

            async getCustomerWithProjects(customerId) {
                const customer = await this.get('customers', customerId);
                if (!customer) return null;
                const projects = await this.getByIndex('projects', 'customerId', customerId);
                return { ...customer, projects };
            }

            async exportAllData() {
                const data = {
                    customers: await this.getAll('customers'),
                    projects: await this.getAll('projects'),
                    rooms: await this.getAll('rooms'),
                    images: await this.getAll('images'),
                    materials: await this.getAll('materials'),
                    offers: await this.getAll('offers'),
                    settings: await this.getAll('settings'),
                    exportDate: new Date().toISOString(),
                    version: '1.0'
                };
                return data;
            }

            async importAllData(data) {
                await this.clear('customers');
                await this.clear('projects');
                await this.clear('rooms');
                await this.clear('images');
                await this.clear('materials');
                await this.clear('offers');
                await this.clear('settings');

                for (const c of data.customers || []) await this.add('customers', c);
                for (const p of data.projects || []) await this.add('projects', p);
                for (const r of data.rooms || []) await this.add('rooms', r);
                for (const i of data.images || []) await this.add('images', i);
                for (const m of data.materials || []) await this.add('materials', m);
                for (const o of data.offers || []) await this.add('offers', o);
                for (const s of data.settings || []) await this.put('settings', s);
            }
        }

        const db = new DatabaseManager();

        // ==================== KÄLTELEISTUNGS-BERECHNUNG ====================
        function calculateCoolingCapacity(rooms) {
            if (!rooms || rooms.length === 0) return { totalKW: 0, recommendation: null, details: [] };
            let totalWatts = 0;
            const details = [];
            for (const room of rooms) {
                const area = (room.length || 0) * (room.width || 0);
                const volume = area * (room.height || 2.5);
                let wattsPerSqm = 80;
                if (room.name && (room.name.toLowerCase().includes('dach') || room.name.toLowerCase().includes('wintergarten'))) {
                    wattsPerSqm = 120;
                }
                if (room.name && room.name.toLowerCase().includes('keller')) {
                    wattsPerSqm = 60;
                }
                const roomWatts = area * wattsPerSqm;
                totalWatts += roomWatts;
                details.push({
                    roomName: room.name || 'Unbenannt',
                    area: Math.round(area * 100) / 100,
                    volume: Math.round(volume * 100) / 100,
                    wattsPerSqm,
                    estimatedKW: Math.round(roomWatts / 100) / 10
                });
            }
            const totalKW = Math.round(totalWatts / 100) / 10;
            const availableSizes = [2.0, 2.5, 3.5, 4.2, 5.0, 6.0, 7.1, 8.5, 10.0];
            let recommendation = availableSizes[0];
            for (const size of availableSizes) {
                if (size >= totalKW) {
                    recommendation = size;
                    break;
                }
            }
            if (totalKW > availableSizes[availableSizes.length - 1]) {
                recommendation = availableSizes[availableSizes.length - 1];
            }
            return { totalKW, recommendation, details };
        }

        // ==================== UI-HILFSFUNKTIONEN ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.innerHTML = `${icons[type] || ''} ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(amount);
        }

        function formatDate(isoString) {
            if (!isoString) return '-';
            return new Date(isoString).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function getStatusClass(status) {
            const map = {
                'Neu': 'status-neu',
                'Besichtigung offen': 'status-offen',
                'Besichtigt': 'status-offen',
                'Angebot offen': 'status-offen',
                'Angebot gesendet': 'status-aktiv',
                'Auftrag erhalten': 'status-aktiv',
                'Material bestellt': 'status-aktiv',
                'Montage geplant': 'status-aktiv',
                'Montage läuft': 'status-aktiv',
                'Fertig': 'status-fertig',
                'Archiv': 'status-fertig'
            };
            return map[status] || 'status-neu';
        }

        function showModal(title, contentHtml, onSave, onCancel) {
            const container = document.getElementById('modalContainer');
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal">
                    <h3>${title}</h3>
                    <div class="modal-body">${contentHtml}</div>
                    <div class="modal-actions">
                        <button class="btn btn-outline cancel-btn">Abbrechen</button>
                        ${onSave ? '<button class="btn btn-primary save-btn">Speichern</button>' : ''}
                    </div>
                </div>
            `;
            container.appendChild(overlay);
            overlay.querySelector('.cancel-btn')?.addEventListener('click', () => {
                overlay.remove();
                if (onCancel) onCancel();
            });
            overlay.querySelector('.save-btn')?.addEventListener('click', () => {
                if (onSave) onSave(overlay);
            });
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) { overlay.remove(); if (onCancel) onCancel(); }
            });
            return overlay;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== SEITEN-RENDERER (ORIGINAL) ====================
        const contentArea = document.getElementById('contentArea');

                                        <td>${formatDate(p.createdAt)}</td>
                                    </tr>`;

                            </tbody>
                        </table>
                    </div>
                `;
            })();
        }

        // ========== KUNDEN, PROJEKTE, RÄUME, BILDER, MATERIAL, ANGEBOTE, PDF, EXCEL, BACKUP, EINSTELLUNGEN ==========

        // ==================== APP-CONTROLLER (ORIGINAL) ====================
        const app = {
            currentPage: 'dashboard',
            currentProjectId: null,

            async init() {
                await db.init();
                this.setupNavigation();
                this.setupSearch();
                this.setupTheme();
                this.setupSync();
                this.navigate('dashboard');

                    fullSync();
                }

            setupNavigation() {
                document.querySelectorAll('.nav-item[data-page]').forEach(item => {

                        const page = item.dataset.page;

                    });
                });

            navigate(page, param = null) {
                this.currentPage = page;
                this.currentProjectId = param;
                document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.page === page) item.classList.add('active');
                });
                document.getElementById('sidebar').classList.remove('open');
                switch (page) {
                    case 'dashboard': renderDashboard(); break;
                    case 'customers': renderCustomers(); break;
                    case 'projects': renderProjects(param); break;
                    case 'materials': renderMaterials(); break;
                    case 'offers': renderOffers(); break;
                    case 'settings': renderSettings(); break;
                    case 'backup': renderBackup(); break;
                    default: renderDashboard();
                }
            },

            setupSearch() { /* unverändert */ },
            setupTheme() { /* unverändert */ },
            setupResponsive() { /* unverändert */ },

            setupSync() {
                document.getElementById('syncStatus').textContent = navigator.onLine ? 'Online' : 'Offline';
            },

            // Alle weiteren Methoden (openCustomerModal, deleteCustomer, etc.) bleiben unverändert
            // ...
        };

        // ==================== INITIALISIERUNG ====================
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
