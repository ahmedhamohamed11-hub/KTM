<html lang="de">
<head>

    <style>
        /* ============ CSS-VARIABLEN & DESIGN-SYSTEM ============ */
        :root {
            --bg-primary: #f5f6f8;
            --bg-secondary: #ffffff;
            --bg-tertiary: #eef1f5;
            --text-primary: #1a1d23;
            --text-secondary: #5a5f6b;
            --text-muted: #8b909c;
            --border: #e2e5ea;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-light: #eff3ff;
            --success: #059669;
            --success-light: #ecfdf5;
            --warning: #d97706;
            --warning-light: #fffbeb;
            --danger: #dc2626;
            --danger-light: #fef2f2;
            --info: #6366f1;
            --info-light: #eef2ff;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: 0.2s ease;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --sidebar-width: 260px;
            --header-height: 64px;
        }

        [data-theme="dark"] {
            --bg-primary: #111827;
            --bg-secondary: #1a1f2e;
            --bg-tertiary: #222837;
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #2d3340;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-light: #1e293b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            flex-shrink: 0;
            transition: all var(--transition);
            z-index: 100;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            margin-bottom: 28px;
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.3px;
        }
        .sidebar-logo .logo-icon {
            width: 40px; height: 40px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 22px;
        }
        .nav-section { margin-bottom: 20px; }
        .nav-section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 8px 12px;
            font-weight: 600;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
        }
        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .nav-item.active {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 600;
        }
        .nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
        .nav-badge {
            margin-left: auto;
            background: var(--accent);
            color: #fff;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        /* ============ MAIN CONTENT ============ */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topbar {
            height: var(--header-height);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            flex-shrink: 0;
        }
        .search-box {
            flex: 1;
            max-width: 400px;
            display: flex;
            align-items: center;
            background: var(--bg-tertiary);
            border-radius: 24px;
            padding: 9px 16px;
            gap: 8px;
        }
        .search-box input {
            border: none;
            background: transparent;
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            font-family: var(--font-family);
        }
        .search-box .search-icon { color: var(--text-muted); font-size: 16px; }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        .icon-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary);
            transition: all var(--transition);
        }
        .icon-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* ============ DASHBOARD KACHELN ============ */
        .page-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.4px;
            color: var(--text-primary);
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all var(--transition);
        }
        .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
        .stat-card .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
        }
        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .nav-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 22px 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .nav-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .nav-card .card-icon {
            width: 50px; height: 50px;
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .card-icon.blue { background: #eff3ff; }
        .card-icon.green { background: #ecfdf5; }
        .card-icon.amber { background: #fffbeb; }
        .card-icon.purple { background: #eef2ff; }
        .card-icon.red { background: #fef2f2; }
        .nav-card .card-title { font-weight: 600; font-size: 15px; }
        .nav-card .card-subtitle { font-size: 12px; color: var(--text-muted); }

        /* ============ TABELLEN ============ */
        .table-container {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            overflow-x: auto;
            box-shadow: var(--shadow-sm);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: var(--bg-tertiary);
            padding: 13px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg-tertiary); }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-neu { background: #eef2ff; color: #6366f1; }
        .status-offen { background: #fffbeb; color: #d97706; }
        .status-aktiv { background: #ecfdf5; color: #059669; }
        .status-fertig { background: #f3f4f6; color: #6b7280; }

        /* ============ BUTTONS ============ */
        .btn {
            padding: 10px 18px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-family: var(--font-family);
            white-space: nowrap;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--bg-tertiary); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { opacity: 0.9; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 16px; }

        /* ============ FORMULARE ============ */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: var(--font-family);
            transition: all var(--transition);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }

        /* ============ MODAL ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .modal h3 {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ============ TOAST ============ */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 14px 20px;
            border-radius: var(--radius-md);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 250px;
        }
        .toast-success { background: #059669; }
        .toast-error { background: #dc2626; }
        .toast-info { background: #6366f1; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

        /* ============ IMAGE GRID ============ */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .image-card {
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            position: relative;
        }
        .image-card img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .image-card .img-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 6px 10px;
            font-size: 11px;
            text-align: center;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100vh;
                transition: left 0.3s ease;
            }
            .sidebar.open { left: 0; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .card-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .stats-row { grid-template-columns: 1fr; }
            .modal { width: 95%; padding: 16px; margin: 8px; }
            .topbar { padding: 0 12px; }
            .content-scroll { padding: 16px; }
        }

        /* ============ PRINT ============ */
        @media print {
            .sidebar, .topbar, .toast-container { display: none !important; }
            .main-area { margin: 0; }
            .content-scroll { overflow: visible; padding: 0; }
            .modal-overlay { position: static; }
        }

        /* ============ SPLASH ============ */
        .splash-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 16px;
        }
        .splash-screen .splash-logo {
            font-size: 48px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>

            </div>

    <div id="modalContainer"></div>

    <script>
        // ============================================================
        // ============ SUPABASE & SYNC LOGIK =========================
        // ============================================================
        const SUPABASE_URL = 'https://byajcepqydkyoegztcgj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_s3zhy_TO4KWnVQN1XSYDHg_zcOwA6Qn';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const FIELD_MAP = { firstName:'first_name', lastName:'last_name', houseNumber:'house_number', customerId:'customer_id', projectId:'project_id', roomCount:'room_count', purchasePrice:'purchase_price', sellingPrice:'selling_price', totalPrice:'total_price', vatRate:'vat_rate', vatAmount:'vat_amount', coolingRecommendation:'cooling_recommendation', coolingDetails:'cooling_details', createdAt:'created_at', updatedAt:'updated_at' };
        const REVERSE_MAP = Object.fromEntries(Object.entries(FIELD_MAP).map(([k,v])=>[v,k]));
        
        function toSnake(o) { 
            const r={}; 
            for(const k in o) { 
                if(['id','_synced'].includes(k)) continue; 
                r[FIELD_MAP[k]||k]=o[k]; 
            } 
            return r; 
        }
        function toCamel(o) { 
            const r={}; 
            for(const k in o) r[REVERSE_MAP[k]||k]=o[k]; 
            return r; 
        }

        async function syncPush(table) {
            const all = await db.getAll(table);
            for (const rec of all) { 
                if(rec._synced) continue;
                const p = toSnake(rec);
                try {
                    const { data, error } = await sb.from(table).insert(p).select();
                    if (!error && data?.length) { 
                        await db.delete(table, rec.id); 
                        const nr = toCamel(data[0]); 
                        nr._synced = true; 
                        await db.add(table, nr); 
                    }
                    else if (error) console.warn(`Push ${table}:`, error.message);
                } catch(e) { console.warn(`Push-Ex ${table}:`, e.message); }
            }
        }

        async function syncPull(table) {
            try {
                const { data, error } = await sb.from(table).select('*');
                if (error) { console.warn(`Pull ${table}:`, error.message); return; }
                const ids = new Set((await db.getAll(table)).map(r=>r.id));
                for (const row of data) { 
                    const rec = toCamel(row); 
                    rec._synced = true; 
                    if(ids.has(rec.id)) await db.put(table, rec); 
                    else await db.add(table, rec); 
                }
            } catch(e) { console.warn(`Pull-Ex ${table}:`, e.message); }
        }

        async function fullSync() {
            if (!navigator.onLine) { showToast('Offline. Synchronisation nicht möglich.', 'info'); return; }
            document.getElementById('syncStatus').textContent = 'Sync...';
            try {
                for (const t of ['customers','projects','rooms','images','materials','offers','settings']) { 
                    await syncPush(t); 
                    await syncPull(t); 
                }
                showToast('Sync abgeschlossen', 'success');
            } catch(e) { 
                showToast('Sync-Fehler', 'error'); 
                console.error(e); 
            }
            document.getElementById('syncStatus').textContent = navigator.onLine ? 'Online' : 'Offline';
            app.navigate(app.currentPage, app.currentProjectId);
        }

        // ============================================================
        // ============ DATENBANK-SCHICHT (IndexedDB) =================
        // ============================================================
        const DB_NAME = 'KTM_DB';
        const DB_VERSION = 2; // Geupdatet auf Version 2 aus Code 2

        class DatabaseManager {
            constructor() {
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        const tx = e.target.transaction;
                        
                        // Alle Stores definieren
                        const stores = ['customers', 'projects', 'rooms', 'images', 'materials', 'offers', 'settings'];
                        const indexedStores = ['rooms', 'images', 'offers'];
                        
                        stores.forEach(s => {
                            let store;
                            if (!db.objectStoreNames.contains(s)) {
                                store = db.createObjectStore(s, { keyPath: s === 'settings' ? 'key' : 'id', autoIncrement: s !== 'settings' });
                            } else {
                                store = tx.objectStore(s);
                            }
                            
                            // Spezifische Indizes anlegen
                            if (s === 'customers' && !store.indexNames.contains('name')) {
                                store.createIndex('name', 'lastName', { unique: false });
                                store.createIndex('status', 'status', { unique: false });
                            }
                            if (s === 'projects' && !store.indexNames.contains('customerId')) {
                                store.createIndex('customerId', 'customerId', { unique: false });
                                store.createIndex('status', 'status', { unique: false });
                            }
                            if (s === 'materials' && !store.indexNames.contains('category')) {
                                store.createIndex('category', 'category', { unique: false });
                            }
                            
                            // v2 Update: Fehlende projectId Indizes hinzufügen
                            if (indexedStores.includes(s) && !store.indexNames.contains('projectId')) {
                                store.createIndex('projectId', 'projectId', { unique: false });
                            }
                        });
                    };
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        resolve(this.db);
                    };
                    request.onerror = (e) => {
                        console.error('DB-Fehler:', e.target.error);
                        reject(e.target.error);
                    };
                });
            }

            // Generische CRUD-Operationen mit _synced Flag
            async add(storeName, data) {
                if (data._synced === undefined && storeName !== 'settings') data._synced = false;
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.createdAt = data.createdAt || new Date().toISOString();
                    data.updatedAt = new Date().toISOString();
                    const request = store.add(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async put(storeName, data) {
                if (data._synced === undefined && storeName !== 'settings') data._synced = false;
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.updatedAt = new Date().toISOString();
                    const request = store.put(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async get(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async delete(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async getByIndex(storeName, indexName, value) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const index = store.index(indexName);
                    const request = index.getAll(value);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            // Spezifische Queries
            async getProjectWithDetails(projectId) {
                const project = await this.get('projects', projectId);
                if (!project) return null;
                const rooms = await this.getByIndex('rooms', 'projectId', projectId);
                const images = await this.getByIndex('images', 'projectId', projectId);
                const offers = await this.getByIndex('offers', 'projectId', projectId);
                return { ...project, rooms, images, offers };
            }

            async getCustomerWithProjects(customerId) {
                const customer = await this.get('customers', customerId);
                if (!customer) return null;
                const projects = await this.getByIndex('projects', 'customerId', customerId);
                return { ...customer, projects };
            }

            // Backup
            async exportAllData() {
                const data = {
                    customers: await this.getAll('customers'),
                    projects: await this.getAll('projects'),
                    rooms: await this.getAll('rooms'),
                    images: await this.getAll('images'),

                };
                return data;
            }

            async importAllData(data) {
                await this.clear('customers');

                await this.clear('rooms');
                await this.clear('images');
                await this.clear('materials');
                await this.clear('offers');
                await this.clear('settings');

                for (const c of data.customers || []) await this.add('customers', c);
                for (const p of data.projects || []) await this.add('projects', p);
                for (const r of data.rooms || []) await this.add('rooms', r);
                for (const i of data.images || []) await this.add('images', i);
                for (const m of data.materials || []) await this.add('materials', m);
                for (const o of data.offers || []) await this.add('offers', o);
                for (const s of data.settings || []) await this.put('settings', s);
            }
        }

        // ============================================================
        function calculateCoolingCapacity(rooms) {
            if (!rooms || rooms.length === 0) return { totalKW: 0, recommendation: null, details: [] };

            let totalWatts = 0;
            const details = [];

            for (const room of rooms) {
                const area = (room.length || 0) * (room.width || 0);
                const volume = area * (room.height || 2.5);

                // Faustformel: 60-100 W/m² je nach Raumtyp (konservativ 80 W/m² für Wohnräume)
                let wattsPerSqm = 80;
                if (room.name && (room.name.toLowerCase().includes('dach') || room.name.toLowerCase().includes('wintergarten'))) {
                    wattsPerSqm = 120;
                }
                if (room.name && room.name.toLowerCase().includes('keller')) {
                    wattsPerSqm = 60;
                }

                const roomWatts = area * wattsPerSqm;
                totalWatts += roomWatts;

                details.push({
                    roomName: room.name || 'Unbenannt',
                    area: Math.round(area * 100) / 100,
                    volume: Math.round(volume * 100) / 100,
                    wattsPerSqm,
                    estimatedKW: Math.round(roomWatts / 100) / 10
                });
            }

            const totalKW = Math.round(totalWatts / 100) / 10;
            const availableSizes = [2.0, 2.5, 3.5, 4.2, 5.0, 6.0, 7.1, 8.5, 10.0];

            let recommendation = availableSizes[0];
            for (const size of availableSizes) {
                if (size >= totalKW) {
                    recommendation = size;
                    break;
                }
            }
            if (totalKW > availableSizes[availableSizes.length - 1]) {
                recommendation = availableSizes[availableSizes.length - 1];
            }

            return { totalKW, recommendation, details };
        }

            const container = document.getElementById('modalContainer');

            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal">
                    <h3>${title}</h3>
                    <div class="modal-body">${contentHtml}</div>
                    <div class="modal-actions">
                        <button class="btn btn-outline cancel-btn">Abbrechen</button>
                        ${onSave ? '<button class="btn btn-primary save-btn">Speichern</button>' : ''}
                    </div>
                </div>
            `;
            container.appendChild(overlay);

            overlay.querySelector('.cancel-btn')?.addEventListener('click', () => {
                overlay.remove();
                if (onCancel) onCancel();
            });
            overlay.querySelector('.save-btn')?.addEventListener('click', () => {
                if (onSave) onSave(overlay);

                if (e.target === overlay) { overlay.remove(); if (onCancel) onCancel(); }

            return overlay;

        // ============ APP-CONTROLLER ================================
        // ============================================================
        const app = {
            currentPage: 'dashboard',
            currentProjectId: null,

            async init() {
                await db.init();
                document.getElementById('syncStatus').textContent = navigator.onLine ? 'Online' : 'Offline';
                this.setupNavigation();
                this.setupSearch();
                this.setupTheme();
                this.navigate('dashboard');
                document.getElementById('splash').style.display = 'none';
                this.setupResponsive();
            },

            setupNavigation() {
                document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const page = item.dataset.page;
                        this.navigate(page);
                    });
                });
                document.getElementById('syncBtn').addEventListener('click', fullSync);
            },

            navigate(page, param = null) {
                this.currentPage = page;
                this.currentProjectId = param;

                // Aktualisiere aktive Navigation
                document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.page === page) item.classList.add('active');
                });

                // Schließe Sidebar auf Mobile
                document.getElementById('sidebar').classList.remove('open');

                // Rendere Seite
                switch (page) {
                    case 'dashboard': renderDashboard(); break;
                    case 'customers': renderCustomers(); break;
                    case 'projects': renderProjects(param); break;
                    case 'materials': renderMaterials(); break;
                    case 'offers': renderOffers(); break;
                    case 'settings': renderSettings(); break;
                    case 'backup': renderBackup(); break;
                    default: renderDashboard();
                }
            },

            setupSearch() {
                const searchInput = document.getElementById('globalSearch');
                searchInput.addEventListener('input', async (e) => {
                    const query = e.target.value.toLowerCase().trim();
                    if (query.length < 2 && query.length > 0) return;
                    if (query.length === 0) {
                        this.navigate(this.currentPage, this.currentProjectId);
                        return;
                    }
                    // Globale Suche
                    const customers = await db.getAll('customers');
                    const projects = await db.getAll('projects');
                    const materials = await db.getAll('materials');

                    const results = [
                        ...customers.filter(c =>
                            (c.firstName + ' ' + c.lastName).toLowerCase().includes(query) ||
                            (c.phone || '').includes(query) ||
                            (c.city || '').toLowerCase().includes(query) ||
                            (c.street || '').toLowerCase().includes(query)
                        ).map(c => ({ type: 'Kunde', title: `${c.firstName} ${c.lastName}`, id: c.id, link: 'customers' })),
                        ...projects.filter(p =>
                            (p.title || '').toLowerCase().includes(query) ||
                            (p.status || '').toLowerCase().includes(query)
                        ).map(p => ({ type: 'Projekt', title: p.title, id: p.id, link: 'projects' })),
                        ...materials.filter(m =>
                            (m.name || '').toLowerCase().includes(query)
                        ).map(m => ({ type: 'Material', title: m.name, id: m.id, link: 'materials' })),
                    ];

                    contentArea.innerHTML = `
                        <h1 class="page-title">Suchergebnisse für "${escapeHtml(query)}"</h1>
                        <div class="table-container">
                            <table>
                                <thead><tr><th>Typ</th><th>Name</th><th>Aktion</th></tr></thead>
                                <tbody>
                                    ${results.length > 0 ? results.map(r => `
                                        <tr>
                                            <td><span class="status-badge ${r.type === 'Kunde' ? 'status-neu' : r.type === 'Projekt' ? 'status-aktiv' : 'status-offen'}">${r.type}</span></td>
                                            <td><strong>${escapeHtml(r.title)}</strong></td>
                                            <td><button class="btn btn-sm btn-primary" onclick="app.navigate('${r.link}', ${r.id})">Öffnen</button></td>
                                        </tr>
                                    `).join('') : '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);">Keine Ergebnisse</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    `;
                });
            },

            setupTheme() {
                const toggle = document.getElementById('themeToggle');
                const saved = localStorage.getItem('klima-theme') || 'light';
                document.body.dataset.theme = saved;
                toggle.innerHTML = saved === 'dark' ? '<span class="nav-icon">☀️</span> Hellmodus' : '<span class="nav-icon">🌙</span> Dunkelmodus';

                toggle.addEventListener('click', () => {
                    const newTheme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
                    document.body.dataset.theme = newTheme;
                    localStorage.setItem('klima-theme', newTheme);
                    toggle.innerHTML = newTheme === 'dark' ? '<span class="nav-icon">☀️</span> Hellmodus' : '<span class="nav-icon">🌙</span> Dunkelmodus';
                });
            },

            setupResponsive() {
                const menuToggle = document.getElementById('menuToggle');
                const sidebar = document.getElementById('sidebar');
                const checkWidth = () => {
                    if (window.innerWidth <= 900) {
                        menuToggle.style.display = 'flex';
                    } else {
                        menuToggle.style.display = 'none';
                        sidebar.classList.remove('open');
                    }
                };
                checkWidth();
                window.addEventListener('resize', checkWidth);
                menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
                document.addEventListener('click', (e) => {
                    if (window.innerWidth <= 900 && !sidebar.contains(e.target) && e.target !== menuToggle && !menuToggle.contains(e.target)) {
                        sidebar.classList.remove('open');
                    }
                });
            },

                        <p><strong>Projekt:</strong> ${escapeHtml(project.title)}</p>
                        <p><strong>Kunde:</strong> ${escapeHtml(customer.firstName)} ${escapeHtml(customer.lastName)}</p>
                        <p><strong>Empf. Kälteleistung:</strong> ${cooling.recommendation || '?'} kW</p>
                        <div class="table-container" style="max-height:300px;overflow-y:auto;margin-top:12px;">
                            <table>
                                <thead><tr><th>Auswählen</th><th>Artikel</th><th>Preis</th><th>Menge</th></tr></thead>
                                <tbody>
                                    ${materials.map(m => `
                                        <tr>
                                            <td><input type="checkbox" class="offer-mat-check" value="${m.id}" data-price="${m.sellingPrice || 0}" data-name="${escapeHtml(m.name)}" data-unit="${escapeHtml(m.unit || 'Stk')}"></td>
                                            <td>${escapeHtml(m.name)}</td>
                                            <td>${formatCurrency(m.sellingPrice || 0)}</td>
                                            <td><input type="number" class="offer-mat-qty" value="1" min="1" style="width:60px;padding:4px;"></td>
                                        </tr>
                                    `).join('') || '<tr><td colspan="4">Keine Materialien</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    `,
                    async (overlay) => {
                        const selectedItems = [];
                        const rows = overlay.querySelectorAll('tbody tr');
                        rows.forEach(row => {
                            const checkbox = row.querySelector('.offer-mat-check');
                            const qtyInput = row.querySelector('.offer-mat-qty');
                            if (checkbox && checkbox.checked) {
                                selectedItems.push({
                                    materialId: parseInt(checkbox.value),
                                    name: checkbox.dataset.name,
                                    unit: checkbox.dataset.unit,
                                    price: parseFloat(checkbox.dataset.price),
                                    quantity: parseInt(qtyInput?.value || 1),
                                });
                            }
                        });

                        let subtotal = 0;
                        const positions = selectedItems.map(item => {
                            const total = item.price * item.quantity;
                            subtotal += total;
                            return { ...item, total };
                        });

                        const vatRate = 0.19;
                        const vatAmount = subtotal * vatRate;
                        const totalPrice = subtotal + vatAmount;

                        const offerData = {
                            projectId,
                            customerId: project.customerId,
                            positions,
                            subtotal,
                            vatRate,
                            vatAmount,
                            totalPrice,
                            coolingRecommendation: cooling.recommendation,
                            coolingDetails: cooling.details,
                            status: 'Angebot offen',
                            createdAt: new Date().toISOString(),
                        };

                        await db.add('offers', offerData);
                        project.status = 'Angebot offen';
                        await db.put('projects', project);

                        overlay.remove();
                        showToast('Angebot erstellt.', 'success');
                        this.navigate('offers');
                    }
                );
            },

            async exportOfferPDF(offerId) {
                const offer = await db.get('offers', offerId);
                if (!offer) { showToast('Angebot nicht gefunden.', 'error'); return; }
                const project = await db.get('projects', offer.projectId);
                const customer = offer.customerId ? await db.get('customers', offer.customerId) : null;

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

                let y = 20;
                const companyName = (await db.get('settings', 'companyName'))?.value || 'Ihr Unternehmen';
                const companyAddress = (await db.get('settings', 'companyAddress'))?.value || '';

                doc.setFontSize(18);
                doc.setFont('helvetica', 'bold');
                doc.text(companyName, 20, y);
                y += 7;
                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                if (companyAddress) {
                    doc.text(companyAddress, 20, y);
                    y += 5;
                }
                y += 5;
                doc.setFontSize(14);
                doc.setFont('helvetica', 'bold');
                doc.text('ANGEBOT', 20, y);
                y += 10;

                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                if (customer) {
                    doc.text(`Kunde: ${customer.firstName} ${customer.lastName}`, 20, y);
                    y += 5;
                    if (customer.company) { doc.text(`Firma: ${customer.company}`, 20, y); y += 5; }
                    doc.text(`Adresse: ${customer.street || ''} ${customer.houseNumber || ''}, ${customer.zip || ''} ${customer.city || ''}`, 20, y);
                    y += 5;
                    if (customer.phone) { doc.text(`Telefon: ${customer.phone}`, 20, y); y += 5; }
                }
                y += 5;

                doc.setFont('helvetica', 'bold');
                doc.text(`Projekt: ${project?.title || 'Unbenannt'}`, 20, y);
                y += 5;
                doc.setFont('helvetica', 'normal');
                doc.text(`Datum: ${formatDate(offer.createdAt)}`, 20, y);
                y += 5;
                doc.text(`Empfohlene Kälteleistung: ${offer.coolingRecommendation} kW`, 20, y);
                y += 8;

                doc.setFont('helvetica', 'bold');
                doc.setFillColor(240, 240, 240);
                doc.rect(20, y, 170, 7, 'F');
                doc.text('Pos.', 22, y + 5);
                doc.text('Bezeichnung', 35, y + 5);
                doc.text('Einheit', 100, y + 5);
                doc.text('Menge', 120, y + 5);
                doc.text('Einzelpreis', 140, y + 5);
                doc.text('Gesamt', 165, y + 5);
                y += 9;

                doc.setFont('helvetica', 'normal');
                let posNum = 1;
                for (const pos of offer.positions || []) {
                    if (y > 250) { doc.addPage(); y = 20; }
                    doc.text(`${posNum}.`, 22, y);
                    doc.text(pos.name || '', 35, y);
                    doc.text(pos.unit || 'Stk', 100, y);
                    doc.text(`${pos.quantity}`, 120, y);
                    doc.text(formatCurrency(pos.price), 140, y);
                    doc.text(formatCurrency(pos.total), 165, y);
                    y += 6;
                    posNum++;
                }

                y += 5;
                doc.line(20, y, 190, y);
                y += 7;
                doc.setFont('helvetica', 'bold');
                doc.text(`Zwischensumme:`, 120, y);
                doc.text(formatCurrency(offer.subtotal || 0), 165, y);
                y += 6;
                doc.text(`MwSt. (19%):`, 120, y);
                doc.text(formatCurrency(offer.vatAmount || 0), 165, y);
                y += 6;
                doc.setFontSize(12);
                doc.text(`Gesamtsumme:`, 120, y);
                doc.text(formatCurrency(offer.totalPrice || 0), 165, y);

                doc.setFontSize(8);
                doc.setFont('helvetica', 'normal');
                const pdfFooter = (await db.get('settings', 'pdfFooter'))?.value || 'Angebot freibleibend - Es gelten unsere AGB.';
                doc.text(pdfFooter, 20, 280);

                doc.save(`Angebot_${offer.id}_${customer?.lastName || 'Kunde'}.pdf`);
                showToast('PDF exportiert.', 'success');
            },

            async deleteOffer(id) {
                if (!confirm('Angebot löschen?')) return;
                await db.delete('offers', id);
                showToast('Angebot gelöscht.', 'info');
                this.navigate('offers');
            },

            // ---- Excel Exports ----
            async exportMaterialsExcel() {
                const materials = await db.getAll('materials');
                const wsData = [['Artikelname', 'Kategorie', 'Einheit', 'Einkaufspreis', 'Verkaufspreis', 'Notizen']];
                for (const m of materials) {
                    wsData.push([m.name, m.category, m.unit, m.purchasePrice, m.sellingPrice, m.notes]);
                }
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Materialien');
                XLSX.writeFile(wb, 'KTM_Materialliste.xlsx');
                showToast('Material-Excel exportiert.', 'success');
            },

            async importMaterialsExcel() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.xlsx,.xls';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    const data = await file.arrayBuffer();
                    const wb = XLSX.read(data);
                    const sheetName = wb.SheetNames.find(n => /material/i.test(n)) || wb.SheetNames[0];
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1 });
                    
                    const existing = await db.getAll('materials');
                    const existingNames = new Set(existing.map(m => m.name));
                    let imported = 0, skipped = 0;

                    for (let i = 1; i < rows.length; i++) {
                        // Support für beide Formate (alt und neu)
                        let name, category, unit, purchasePrice, sellingPrice, notes;
                        
                        // Versuche Spaltenstruktur automatisch zu erkennen oder Fallback zu nutzen
                        if(rows[i].length >= 5 && typeof rows[0][0] === 'string' && rows[0][0].toLowerCase().includes('artikel')) {
                            name = rows[i][0]; category = rows[i][1]; unit = rows[i][2]; purchasePrice = rows[i][3]; sellingPrice = rows[i][4]; notes = rows[i][5];
                        } else {
                            name = rows[i][0]; category = rows[i][1]; unit = rows[i][2]; purchasePrice = rows[i][3]; sellingPrice = rows[i][4];
                        }

                        if (name) {
                            if (existingNames.has(name.toString())) { skipped++; continue; }
                            await db.add('materials', {
                                name: String(name),
                                category: String(category || ''),
                                unit: String(unit || 'Stk'),
                                purchasePrice: parseFloat(purchasePrice) || 0,
                                sellingPrice: parseFloat(sellingPrice) || 0,
                                notes: String(notes || ''),
                                createdAt: new Date().toISOString(),
                            });
                            existingNames.add(String(name));
                            imported++;
                        }
                    }
                    showToast(`${imported} Artikel importiert${skipped ? `, ${skipped} übersprungen` : ''}`, 'success');
                    this.navigate('materials');
                };
                input.click();
            },

            async exportOffersExcel() {
                const offers = await db.getAll('offers');
                const wsData = [['Angebot ID', 'Projekt', 'Summe', 'Status', 'Datum']];
                for (const o of offers) {
                    const proj = await db.get('projects', o.projectId);
                    wsData.push([o.id, proj?.title || '', o.totalPrice, o.status, formatDate(o.createdAt)]);
                }
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Angebote');
                XLSX.writeFile(wb, 'KTM_Angebote.xlsx');
                showToast('Angebote exportiert.', 'success');
            },

            async exportAllExcel() {
                const data = await db.exportAllData();
                const wb = XLSX.utils.book_new();

                const custData = [['ID','Vorname','Nachname','Firma','Straße','PLZ','Ort','Telefon','Status']];
                for (const c of data.customers) custData.push([c.id,c.firstName,c.lastName,c.company,c.street,c.zip,c.city,c.phone,c.status]);
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(custData), 'Kunden');

                const projData = [['ID','Titel','Kunden-ID','Status','Notizen','Datum']];
                for (const p of data.projects) projData.push([p.id,p.title,p.customerId,p.status,p.notes,formatDate(p.createdAt)]);
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(projData), 'Projekte');

                const matData = [['ID','Name','Kategorie','Einheit','Einkaufspreis','Verkaufspreis']];
                for (const m of data.materials) matData.push([m.id,m.name,m.category,m.unit,m.purchasePrice,m.sellingPrice]);
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(matData), 'Materialien');

                XLSX.writeFile(wb, 'KTM_KomplettExport.xlsx');
                showToast('Komplett-Export erstellt.', 'success');
            },

            async importAllExcel() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.xlsx,.xls';
                input.onchange = async (e) => {
                    if (!confirm('Achtung: Alle vorhandenen Daten werden überschrieben! Fortfahren?')) return;
                    const file = e.target.files[0];
                    const data = await file.arrayBuffer();
                    const wb = XLSX.read(data);
                    const importData = { customers: [], projects: [], materials: [] };

                    if (wb.SheetNames.includes('Kunden')) {
                        const rows = XLSX.utils.sheet_to_json(wb.Sheets['Kunden'], { header: 1 });
                        for (let i = 1; i < rows.length; i++) {
                            const [id, firstName, lastName, company, street, zip, city, phone, status] = rows[i];
                            importData.customers.push({ id, firstName, lastName, company, street, zip, city, phone, status, createdAt: new Date().toISOString() });
                        }
                    }
                    if (wb.SheetNames.includes('Materialien')) {
                        const rows = XLSX.utils.sheet_to_json(wb.Sheets['Materialien'], { header: 1 });
                        for (let i = 1; i < rows.length; i++) {
                            const [id, name, category, unit, purchasePrice, sellingPrice] = rows[i];
                            importData.materials.push({ name, category, unit, purchasePrice: parseFloat(purchasePrice)||0, sellingPrice: parseFloat(sellingPrice)||0, createdAt: new Date().toISOString() });
                        }
                    }
                    await db.clear('customers');
                    await db.clear('materials');
                    for (const c of importData.customers) await db.add('customers', c);
                    for (const m of importData.materials) await db.add('materials', m);
                    showToast('Daten importiert.', 'success');
                    this.navigate('dashboard');
                };
                input.click();
            },

            // ---- Backup ----
            async createBackup() {
                const data = await db.exportAllData();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `KTM_Backup_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('Backup erstellt.', 'success');
            },

            async restoreBackup() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = async (e) => {
                    if (!confirm('Achtung: Alle vorhandenen Daten werden überschrieben! Fortfahren?')) return;
                    const file = e.target.files[0];
                    const text = await file.text();
                    const data = JSON.parse(text);
                    await db.importAllData(data);
                    showToast('Backup wiederhergestellt.', 'success');
                    this.navigate('dashboard');
                };
                input.click();
            },

            // ---- Einstellungen ----
            async openCompanySettings() {
                const companyName = (await db.get('settings', 'companyName'))?.value || '';
                const companyAddress = (await db.get('settings', 'companyAddress'))?.value || '';
                const modal = showModal(
                    'Firmendaten',
                    `
                        <div class="form-group"><label>Firmenname</label><input type="text" id="setCompanyName" value="${escapeHtml(companyName)}"></div>
                        <div class="form-group"><label>Adresse (für PDF)</label><textarea id="setCompanyAddress" rows="3">${escapeHtml(companyAddress)}</textarea></div>
                    `,
                    async (overlay) => {
                        await db.put('settings', { key: 'companyName', value: overlay.querySelector('#setCompanyName').value.trim() });
                        await db.put('settings', { key: 'companyAddress', value: overlay.querySelector('#setCompanyAddress').value.trim() });
                        overlay.remove();
                        showToast('Firmendaten gespeichert.', 'success');
                    }
                );
            },

            async openPDFSettings() {
                const pdfFooter = (await db.get('settings', 'pdfFooter'))?.value || 'Angebot freibleibend - Es gelten unsere AGB.';
                const modal = showModal(
                    'PDF-Einstellungen',
                    `
                        <div class="form-group"><label>Footer-Text</label><textarea id="setPdfFooter" rows="3">${escapeHtml(pdfFooter)}</textarea></div>
                    `,
                    async (overlay) => {
                        await db.put('settings', { key: 'pdfFooter', value: overlay.querySelector('#setPdfFooter').value.trim() });
                        overlay.remove();
                        showToast('PDF-Einstellungen gespeichert.', 'success');
                    }
                );
            },

            async openFieldSettings() {
                showToast('Felder können im Code erweitert werden. Dies ist ein Profi-Feature.', 'info');
            },

            async resetAllData() {
                if (!confirm('ALLE DATEN UNWIDERRUFLICH LÖSCHEN? Dies kann nicht rückgängig gemacht werden!')) return;
                if (!confirm('Wirklich ALLES löschen?')) return;
                const stores = ['customers', 'projects', 'rooms', 'images', 'materials', 'offers', 'settings'];
                for (const store of stores) await db.clear(store);
                showToast('Alle Daten gelöscht.', 'info');
                this.navigate('dashboard');
            }
        };

        // ============================================================
        // ============ INITIALISIERUNG ===============================
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

        // Service Worker registrieren
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {
                // Läuft auch ohne SW
            });
        }
    </script>
</body>
