        .modal { background: var(--bg-secondary); border-radius: var(--radius-lg); width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; padding: 28px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .modal h3 { font-size: 20px; margin-bottom: 20px; font-weight: 700; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 14px 20px; border-radius: var(--radius-md); color: #fff; font-weight: 600; box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px; min-width: 250px; }
        .toast-success { background: #059669; } .toast-error { background: #dc2626; } .toast-info { background: #6366f1; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .image-card { aspect-ratio: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; }
        .image-card .img-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: #fff; padding: 6px 10px; font-size: 11px; text-align: center; }
        @media (max-width: 900px) { .sidebar { position: fixed; left: -280px; height: 100vh; } .sidebar.open { left: 0; } .stats-row { grid-template-columns: repeat(2, 1fr); } .card-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
        @media (max-width: 600px) { .stats-row { grid-template-columns: 1fr; } .modal { width: 95%; padding: 16px; } .topbar { padding: 0 12px; } .content-scroll { padding: 16px; } }
    </style>

<script>
// ==================== KONFIGURATION ====================
const SUPABASE_URL = 'https://xnscmfplphinkqnuiknj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_crnUSmznTl6eWBIV0Y-6VA_gslGmklv';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== DATENBANK (IndexedDB mit LocalStorage-Fallback) ====================
const DB_NAME = 'KTM_DB';
let useLocalStorage = false;
const LS_PREFIX = 'ktm_';

async function getLocalStore(store) {
    const raw = localStorage.getItem(LS_PREFIX + store);
    return raw ? JSON.parse(raw) : [];
}
async function setLocalStore(store, data) {
    localStorage.setItem(LS_PREFIX + store, JSON.stringify(data));
}

// IndexedDB-Layer
class IDB {
    constructor() { this.db = null; }
    async open() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = (e) => {
                const d = e.target.result;
                ['customers','projects','rooms','images','materials','offers','settings'].forEach(s => {
                    if (!d.objectStoreNames.contains(s)) d.createObjectStore(s, { keyPath: 'id', autoIncrement: true });
                });
            };
            req.onsuccess = (e) => { this.db = e.target.result; resolve(); };
            req.onerror = (e) => {
                console.warn('IndexedDB nicht verfügbar, verwende localStorage');
                useLocalStorage = true;
                resolve();
            };
        });
    }
    async getAll(store) {
        if (useLocalStorage) return await getLocalStore(store);
        return new Promise(r => { this.db.transaction(store,'readonly').objectStore(store).getAll().onsuccess = e => r(e.target.result); });
    }
    async get(store, id) {
        if (useLocalStorage) { const all = await getLocalStore(store); return all.find(x => x.id == id); }
        return new Promise(r => { this.db.transaction(store,'readonly').objectStore(store).get(id).onsuccess = e => r(e.target.result); });
    }
    async put(store, obj) {
        obj._synced = false;
        if (useLocalStorage) { const all = await getLocalStore(store); const idx = all.findIndex(x => x.id == obj.id); if (idx >= 0) all[idx] = obj; else all.push(obj); await setLocalStore(store, all); return; }
        this.db.transaction(store,'readwrite').objectStore(store).put(obj);
    }
    async add(store, obj) {
        obj._synced = false;
        if (useLocalStorage) { const all = await getLocalStore(store); obj.id = Date.now(); all.push(obj); await setLocalStore(store, all); return obj.id; }
        return new Promise(r => { const req = this.db.transaction(store,'readwrite').objectStore(store).add(obj); req.onsuccess = () => r(req.result); });
    }
    async delete(store, id) {
        if (useLocalStorage) { const all = await getLocalStore(store); await setLocalStore(store, all.filter(x => x.id != id)); return; }
        this.db.transaction(store,'readwrite').objectStore(store).delete(id);
    }
    async getByIndex(store, index, value) {
        if (useLocalStorage) { const all = await getLocalStore(store); return all.filter(x => x[index] === value); }
        return new Promise(r => { this.db.transaction(store,'readonly').objectStore(store).index(index).getAll(value).onsuccess = e => r(e.target.result); });
    }
}
const db = new IDB();

// ==================== HILFSFUNKTIONEN ====================
function showToast(msg, type='info') {
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
function formatCurrency(v) { return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(v||0); }
function formatDate(iso) { return iso ? new Date(iso).toLocaleDateString('de-DE') : '-'; }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function getStatusClass(st) {
    const m = {'Neu':'status-neu','Besichtigung offen':'status-offen','Angebot gesendet':'status-aktiv','Fertig':'status-fertig'};
    return m[st] || 'status-neu';
}
function calcCooling(rooms) {
    if (!rooms || !rooms.length) return { totalKW:0, rec:null };
    let total=0;
    rooms.forEach(r => { const a = (r.length||0)*(r.width||0); total += a*80; });
    const kw = Math.round(total/100)/10;
    const sizes = [2.0,2.5,3.5,4.2,5.0,6.0,7.1,8.5,10.0];
    const rec = sizes.find(s => s>=kw) || sizes[sizes.length-1];
    return { totalKW: kw, recommendation: rec, details: [] };
}

// ==================== SYNC ====================
const camelToSnake = { firstName:'first_name', lastName:'last_name', houseNumber:'house_number', customerId:'customer_id', projectId:'project_id', roomCount:'room_count', purchasePrice:'purchase_price', sellingPrice:'selling_price', totalPrice:'total_price', vatRate:'vat_rate', vatAmount:'vat_amount', coolingRecommendation:'cooling_recommendation', coolingDetails:'cooling_details', createdAt:'created_at', updatedAt:'updated_at' };
const snakeToCamel = Object.fromEntries(Object.entries(camelToSnake).map(([k,v])=>[v,k]));
function toSnake(obj) { const r={}; for(const k in obj) r[camelToSnake[k]||k] = obj[k]; return r; }
function toCamel(obj) { const r={}; for(const k in obj) r[snakeToCamel[k]||k] = obj[k]; return r; }

async function pushTable(table) {
    const all = await db.getAll(table);
    for (const rec of all) {
        if (rec._synced) continue;
        const payload = toSnake({...rec});
        delete payload.id; delete payload._synced; delete payload.createdAt; delete payload.updatedAt;
        const { data, error } = await supabase.from(table).insert(payload).select();
        if (!error && data?.length) {
            await db.delete(table, rec.id);
            const newRec = toCamel(data[0]);
            newRec._synced = true;
            await db.add(table, newRec);
        }
    }
}
async function pullTable(table) {
    const { data, error } = await supabase.from(table).select('*');
    if (error) return;
    const existingIds = new Set((await db.getAll(table)).map(x=>x.id));
    for (const row of data) {
        const rec = toCamel(row);
        rec._synced = true;
        if (existingIds.has(rec.id)) await db.put(table, rec);
        else await db.add(table, rec);
    }
}
async function fullSync() {
    if (!navigator.onLine) { showToast('Offline', 'info'); return; }
    document.getElementById('syncStatus').textContent = 'Sync...';
    try {
        const tables = ['customers','projects','rooms','images','materials','offers','settings'];
        for (const t of tables) { await pushTable(t); await pullTable(t); }
        showToast('Sync abgeschlossen ✅', 'success');
        document.getElementById('syncBadge').textContent = '✅';
        setTimeout(() => document.getElementById('syncBadge').textContent = '', 2000);
    } catch(e) {
        showToast('Sync-Fehler', 'error');
    }
    document.getElementById('syncStatus').textContent = navigator.onLine ? 'Online' : 'Offline';
    renderPage();
}
setInterval(() => { if (navigator.onLine) fullSync(); }, 300000);

// ==================== NAVIGATION ====================
let currentPage = 'dashboard';
let currentProjectId = null;
function navigate(page, param) {
    currentPage = page;
    currentProjectId = param || null;
    document.querySelectorAll('.nav-item[data-page]').forEach(el => el.classList.remove('active'));
    const activeEl = document.querySelector(`.nav-item[data-page="${page}"]`);
    if (activeEl) activeEl.classList.add('active');
    renderPage();
}

async function renderPage() {
    const area = document.getElementById('contentArea');
    try {
        switch(currentPage) {
            case 'dashboard': await renderDashboard(area); break;
            case 'customers': await renderCustomers(area); break;
            case 'projects': await renderProjects(area); break;
            case 'materials': await renderMaterials(area); break;
            case 'offers': await renderOffers(area); break;
            case 'settings': await renderSettings(area); break;
            case 'backup': await renderBackup(area); break;
            default: area.innerHTML = '<h1>Seite nicht gefunden</h1>';
        }
    } catch(e) {
        area.innerHTML = `<h1>Fehler</h1><p>${e.message}</p>`;
        console.error(e);
    }
}

// ==================== SEITEN ====================
async function renderDashboard(area) {
    const customers = await db.getAll('customers');
    const projects = await db.getAll('projects');
    const offers = await db.getAll('offers');
    document.getElementById('customerCount').textContent = customers.length;
    document.getElementById('projectCount').textContent = projects.filter(p => !['Fertig','Archiv'].includes(p.status)).length;
    area.innerHTML = `
        <h1 class="page-title">Dashboard</h1>
        <div class="stats-row">
            <div class="stat-card"><div class="stat-value">${customers.length}</div><div class="stat-label">Kunden</div></div>
            <div class="stat-card"><div class="stat-value">${projects.filter(p=>!['Fertig','Archiv'].includes(p.status)).length}</div><div class="stat-label">Offene Projekte</div></div>
            <div class="stat-card"><div class="stat-value">${offers.length}</div><div class="stat-label">Angebote</div></div>
        </div>
        <div class="card-grid">
            <div class="nav-card" onclick="navigate('customers')"><div class="card-icon blue">👥</div><div><div class="card-title">Kunden</div><div class="card-subtitle">${customers.length} Kunden</div></div></div>
            <div class="nav-card" onclick="navigate('projects')"><div class="card-icon green">📋</div><div><div class="card-title">Projekte</div><div class="card-subtitle">${projects.length} gesamt</div></div></div>
            <div class="nav-card" onclick="navigate('materials')"><div class="card-icon amber">📦</div><div><div class="card-title">Material</div><div class="card-subtitle">${(await db.getAll('materials')).length} Artikel</div></div></div>
            <div class="nav-card" onclick="navigate('offers')"><div class="card-icon purple">📄</div><div><div class="card-title">Angebote</div><div class="card-subtitle">${offers.length} erstellt</div></div></div>
        </div>`;
}

async function renderCustomers(area) {
    const customers = await db.getAll('customers');
    area.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h1 class="page-title" style="margin:0;">Kunden</h1>
            <button class="btn btn-primary" onclick="openCustomerModal()">+ Neuer Kunde</button>
        </div>
        <div class="table-container">
            <table><thead><tr><th>Name</th><th>Ort</th><th>Telefon</th><th></th></tr></thead>
            <tbody>
                ${customers.map(c => `<tr><td><strong>${escapeHtml(c.firstName)} ${escapeHtml(c.lastName)}</strong></td><td>${escapeHtml(c.city||'')}</td><td>${escapeHtml(c.phone||'')}</td><td>
                    <button class="btn btn-sm btn-outline" onclick="openCustomerModal(${c.id})">✏️</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${c.id})">🗑</button>
                </td></tr>`).join('') || '<tr><td colspan="4">Keine Kunden</td></tr>'}
            </tbody></table>
        </div>`;
}

function openCustomerModal(id=null) {
    (async () => {
        const cust = id ? await db.get('customers', id) : {};
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal">
                <h3>${id?'Kunde bearbeiten':'Neuer Kunde'}</h3>
                <div class="form-row"><div class="form-group"><label>Vorname</label><input id="cfname" value="${escapeHtml(cust.firstName||'')}"></div>
                <div class="form-group"><label>Nachname</label><input id="clname" value="${escapeHtml(cust.lastName||'')}"></div></div>
                <div class="form-row"><div class="form-group"><label>Straße</label><input id="cstreet" value="${escapeHtml(cust.street||'')}"></div>
                <div class="form-group"><label>Hausnr.</label><input id="chnumber" value="${escapeHtml(cust.houseNumber||'')}"></div></div>
                <div class="form-row"><div class="form-group"><label>PLZ</label><input id="czip" value="${escapeHtml(cust.zip||'')}"></div>
                <div class="form-group"><label>Ort</label><input id="ccity" value="${escapeHtml(cust.city||'')}"></div></div>
                <div class="form-group"><label>Telefon</label><input id="cphone" value="${escapeHtml(cust.phone||'')}"></div>
                <div class="modal-actions">
                    <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button>
                    <button class="btn btn-primary" id="saveCust">Speichern</button>
                </div>
            </div>`;
        document.body.appendChild(modal);
        document.getElementById('saveCust').addEventListener('click', async () => {
            const obj = {
                firstName: document.getElementById('cfname').value,
                lastName: document.getElementById('clname').value,
                street: document.getElementById('cstreet').value,
                houseNumber: document.getElementById('chnumber').value,
                zip: document.getElementById('czip').value,
                city: document.getElementById('ccity').value,
                phone: document.getElementById('cphone').value,
                _synced: false
            };
            if (id) { obj.id = id; await db.put('customers', obj); }
            else await db.add('customers', obj);
            modal.remove();
            navigate('customers');
        });
    })();
}

async function deleteCustomer(id) { if(confirm('Löschen?')) { await db.delete('customers', id); navigate('customers'); } }

async function renderProjects(area) { area.innerHTML = '<h1>Projekte</h1>'; /* Hier später vollständig */ }
async function renderMaterials(area) { area.innerHTML = '<h1>Material</h1>'; }
async function renderOffers(area) { area.innerHTML = '<h1>Angebote</h1>'; }
async function renderSettings(area) { area.innerHTML = '<h1>Einstellungen</h1>'; }
async function renderBackup(area) { area.innerHTML = '<h1>Backup</h1>'; }

// ==================== START ====================
async function init() {
    await db.open();
    document.querySelectorAll('.nav-item[data-page]').forEach(el => el.addEventListener('click', () => navigate(el.dataset.page)));
    document.getElementById('syncBtn').addEventListener('click', fullSync);
    document.getElementById('themeToggle').addEventListener('click', () => {
        document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    });
    document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
    window.addEventListener('resize', () => {
        document.getElementById('menuToggle').style.display = window.innerWidth <= 900 ? 'flex' : 'none';
    });
    if (navigator.onLine) await fullSync();
    navigate('dashboard');
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
