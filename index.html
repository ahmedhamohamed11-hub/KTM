<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a2b3c">
    <title>KTM – Kälte Technik Management</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%232563eb'/><text x='32' y='44' text-anchor='middle' font-size='36' fill='white'>❄</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-primary: #f5f6f8; --bg-secondary: #ffffff; --bg-tertiary: #eef1f5;
            --text-primary: #1a1d23; --text-secondary: #5a5f6b; --text-muted: #8b909c;
            --border: #e2e5ea; --accent: #2563eb; --accent-hover: #1d4ed8; --accent-light: #eff3ff;
            --success: #059669; --warning: #d97706; --danger: #dc2626; --info: #6366f1;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12); --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
            --transition: 0.2s ease; --font-family: 'Inter', -apple-system, sans-serif;
            --sidebar-width: 260px; --header-height: 64px;
        }
        [data-theme="dark"] {
            --bg-primary: #111827; --bg-secondary: #1a1f2e; --bg-tertiary: #222837;
            --text-primary: #e8eaed; --text-secondary: #9ca3af; --text-muted: #6b7280;
            --border: #2d3340; --accent: #3b82f6; --accent-hover: #60a5fa; --accent-light: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family); background: var(--bg-primary); color: var(--text-primary); display: flex; min-height: 100vh; transition: background var(--transition), color var(--transition); }
        .sidebar { width: var(--sidebar-width); background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 16px; flex-shrink: 0; transition: left 0.3s; z-index: 100; }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 8px 12px; margin-bottom: 28px; font-size: 20px; font-weight: 700; color: var(--accent); }
        .sidebar-logo .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; }
        .nav-section { margin-bottom: 20px; }
        .nav-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 8px 12px; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-bottom: 2px; transition: all var(--transition); }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
        .nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
        .nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: var(--header-height); background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0; }
        .search-box { flex: 1; max-width: 400px; display: flex; align-items: center; background: var(--bg-tertiary); border-radius: 24px; padding: 9px 16px; gap: 8px; }
        .search-box input { border: none; background: transparent; flex: 1; font-size: 14px; color: var(--text-primary); outline: none; font-family: var(--font-family); }
        .topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all var(--transition); }
        .icon-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .content-scroll { flex: 1; overflow-y: auto; padding: 24px; }
        .page-title { font-size: 26px; font-weight: 700; margin-bottom: 24px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 20px 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        .stat-card .stat-value { font-size: 32px; font-weight: 700; color: var(--accent); }
        .stat-card .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .nav-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 22px 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); cursor: pointer; transition: all var(--transition); display: flex; align-items: center; gap: 16px; }
        .nav-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .nav-card .card-icon { width: 50px; height: 50px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .card-icon.blue { background: #eff3ff; } .card-icon.green { background: #ecfdf5; } .card-icon.amber { background: #fffbeb; } .card-icon.purple { background: #eef2ff; } .card-icon.red { background: #fef2f2; }
        .nav-card .card-title { font-weight: 600; font-size: 15px; } .nav-card .card-subtitle { font-size: 12px; color: var(--text-muted); }
        .table-container { background: var(--bg-secondary); border-radius: var(--radius-md); border: 1px solid var(--border); overflow-x: auto; box-shadow: var(--shadow-sm); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: var(--bg-tertiary); padding: 13px 16px; text-align: left; font-weight: 600; font-size: 12px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 13px 16px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--bg-tertiary); }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .status-neu { background: #eef2ff; color: #6366f1; } .status-offen { background: #fffbeb; color: #d97706; } .status-aktiv { background: #ecfdf5; color: #059669; } .status-fertig { background: #f3f4f6; color: #6b7280; }
        .btn { padding: 10px 18px; border-radius: 24px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-family); white-space: nowrap; }
        .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); } .btn-outline:hover { background: var(--bg-tertiary); }
        .btn-danger { background: var(--danger); color: #fff; } .btn-danger:hover { opacity: 0.9; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 16px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg-secondary); color: var(--text-primary); font-family: var(--font-family); transition: all var(--transition); }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
        .modal { background: var(--bg-secondary); border-radius: var(--radius-lg); width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; padding: 28px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .modal h3 { font-size: 20px; margin-bottom: 20px; font-weight: 700; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 14px 20px; border-radius: var(--radius-md); color: #fff; font-weight: 600; box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px; min-width: 250px; }
        .toast-success { background: #059669; } .toast-error { background: #dc2626; } .toast-info { background: #6366f1; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .image-card { aspect-ratio: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; }
        .image-card .img-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: #fff; padding: 6px 10px; font-size: 11px; text-align: center; }
        @media (max-width: 900px) { .sidebar { position: fixed; left: -280px; height: 100vh; } .sidebar.open { left: 0; } .stats-row { grid-template-columns: repeat(2, 1fr); } .card-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
        @media (max-width: 600px) { .stats-row { grid-template-columns: 1fr; } .modal { width: 95%; padding: 16px; } .topbar { padding: 0 12px; } .content-scroll { padding: 16px; } }
    </style>
</head>
<body data-theme="light">

<div class="toast-container" id="toastContainer"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">❄</div><span>KTM</span></div>
    <nav>
        <div class="nav-section"><div class="nav-section-label">Hauptmenü</div>
            <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</div>
            <div class="nav-item" data-page="customers"><span class="nav-icon">👥</span> Kunden <span class="nav-badge" id="customerCount">0</span></div>
            <div class="nav-item" data-page="projects"><span class="nav-icon">📋</span> Projekte <span class="nav-badge" id="projectCount">0</span></div>
        </div>
        <div class="nav-section"><div class="nav-section-label">Werkzeuge</div>
            <div class="nav-item" data-page="materials"><span class="nav-icon">📦</span> Material</div>
            <div class="nav-item" data-page="offers"><span class="nav-icon">📄</span> Angebote</div>
        </div>
        <div class="nav-section"><div class="nav-section-label">System</div>
            <div class="nav-item" data-page="settings"><span class="nav-icon">⚙️</span> Einstellungen</div>
            <div class="nav-item" data-page="backup"><span class="nav-icon">💾</span> Backup</div>
            <div class="nav-item" id="syncBtn"><span class="nav-icon">🔄</span> Sync</div>
        </div>
    </nav>
    <div style="margin-top:auto;padding-top:16px;">
        <div class="nav-item" id="themeToggle"><span class="nav-icon">🌙</span> Dunkelmodus</div>
    </div>
</aside>

<div class="main-area">
    <div class="topbar">
        <button class="icon-btn" id="menuToggle" style="display:none;">☰</button>
        <div class="search-box"><span>🔍</span><input type="text" id="globalSearch" placeholder="Suche..."></div>
        <div class="topbar-actions">
            <span id="syncStatus" style="font-size:12px;color:var(--text-muted);"></span>
            <button class="icon-btn" onclick="navigate('backup')">💾</button>
            <button class="icon-btn" onclick="navigate('settings')">⚙️</button>
        </div>
    </div>
    <div class="content-scroll" id="contentArea"><h1>Wird geladen...</h1></div>
</div>
<div id="modalContainer"></div>

<script>
// ==================== SUPABASE (EINZIGE DEKLARATION) ====================
const SUPABASE_URL = 'https://xnscmfplphinkqnuiknj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_crnUSmznTl6eWBIV0Y-6VA_gslGmklv';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== DATENBANK (IndexedDB + Fallback) ====================
const DB_NAME = 'KTM_DB'; const LS_PREFIX = 'ktm_'; let useLocalStorage = false; let idb = null;
async function getLS(s) { return JSON.parse(localStorage.getItem(LS_PREFIX+s) || '[]'); }
async function setLS(s, d) { localStorage.setItem(LS_PREFIX+s, JSON.stringify(d)); }
async function openDB() {
    return new Promise(r => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => { const d = e.target.result; ['customers','projects','rooms','images','materials','offers','settings'].forEach(s => { if(!d.objectStoreNames.contains(s)) d.createObjectStore(s, { keyPath: 'id', autoIncrement: true }); }); };
        req.onsuccess = e => { idb = e.target.result; r(); };
        req.onerror = () => { useLocalStorage = true; r(); };
    });
}
const db = {
    getAll: async s => useLocalStorage ? getLS(s) : new Promise(r => idb.transaction(s).objectStore(s).getAll().onsuccess = e => r(e.target.result)),
    get: async (s, id) => useLocalStorage ? (await getLS(s)).find(x => x.id == id) : new Promise(r => idb.transaction(s).objectStore(s).get(id).onsuccess = e => r(e.target.result)),
    add: async (s, o) => { o._synced = false; if(useLocalStorage) { const a = await getLS(s); o.id = Date.now(); a.push(o); await setLS(s, a); return o.id; } return new Promise(r => { const req = idb.transaction(s,'readwrite').objectStore(s).add(o); req.onsuccess = () => r(req.result); }); },
    put: async (s, o) => { o._synced = false; if(useLocalStorage) { const a = await getLS(s); const i = a.findIndex(x => x.id == o.id); if(i>=0) a[i] = o; else a.push(o); await setLS(s, a); } else idb.transaction(s,'readwrite').objectStore(s).put(o); },
    delete: async (s, id) => { if(useLocalStorage) { const a = await getLS(s); await setLS(s, a.filter(x => x.id != id)); } else idb.transaction(s,'readwrite').objectStore(s).delete(id); },
    getByIndex: async (s, idx, val) => useLocalStorage ? (await getLS(s)).filter(x => x[idx] === val) : new Promise(r => idb.transaction(s).objectStore(s).index(idx).getAll(val).onsuccess = e => r(e.target.result))
};

// ==================== HILFSFUNKTIONEN ====================
function showToast(msg, type='info') { const t = document.createElement('div'); t.className = `toast toast-${type}`; t.textContent = msg; document.getElementById('toastContainer').appendChild(t); setTimeout(() => t.remove(), 3000); }
function formatCurrency(v) { return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(v||0); }
function formatDate(iso) { return iso ? new Date(iso).toLocaleDateString('de-DE') : '-'; }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function getStatusClass(st) { const m = {'Neu':'status-neu','Besichtigung offen':'status-offen','Angebot gesendet':'status-aktiv','Fertig':'status-fertig'}; return m[st] || 'status-neu'; }
function calcCooling(rooms) { if(!rooms || !rooms.length) return { totalKW:0, recommendation:null, details:[] }; let total = 0; rooms.forEach(r => total += ((r.length||0)*(r.width||0))*80); const kw = Math.round(total/100)/10; const sizes = [2.0,2.5,3.5,4.2,5.0,6.0,7.1,8.5,10.0]; return { totalKW:kw, recommendation: sizes.find(s => s>=kw) || sizes[sizes.length-1], details:[] }; }

// ==================== SYNC ====================
const camelToSnake = { firstName:'first_name', lastName:'last_name', houseNumber:'house_number', customerId:'customer_id', projectId:'project_id', roomCount:'room_count', purchasePrice:'purchase_price', sellingPrice:'selling_price', totalPrice:'total_price', vatRate:'vat_rate', vatAmount:'vat_amount', coolingRecommendation:'cooling_recommendation', coolingDetails:'cooling_details', createdAt:'created_at', updatedAt:'updated_at' };
const snakeToCamel = Object.fromEntries(Object.entries(camelToSnake).map(([k,v])=>[v,k]));
function toSnake(o) { const r={}; for(const k in o) r[camelToSnake[k]||k] = o[k]; return r; }
function toCamel(o) { const r={}; for(const k in o) r[snakeToCamel[k]||k] = o[k]; return r; }
async function pushTable(t) { const all = await db.getAll(t); for(const rec of all) { if(rec._synced) continue; const p = toSnake({...rec}); delete p.id; delete p._synced; const { data, error } = await supabaseClient.from(t).insert(p).select(); if(!error && data?.length) { await db.delete(t, rec.id); const nr = toCamel(data[0]); nr._synced = true; await db.add(t, nr); } } }
async function pullTable(t) { const { data, error } = await supabaseClient.from(t).select('*'); if(error) return; const ids = new Set((await db.getAll(t)).map(x=>x.id)); for(const r of data) { const rec = toCamel(r); rec._synced = true; if(ids.has(rec.id)) await db.put(t, rec); else await db.add(t, rec); } }
async function fullSync() { if(!navigator.onLine) { showToast('Offline','info'); return; } document.getElementById('syncStatus').textContent='Sync...'; try { for(const t of ['customers','projects','rooms','images','materials','offers','settings']) { await pushTable(t); await pullTable(t); } showToast('Sync erfolgreich','success'); } catch(e) { showToast('Sync-Fehler','error'); } document.getElementById('syncStatus').textContent = navigator.onLine?'Online':'Offline'; renderPage(); }
setInterval(() => { if(navigator.onLine) fullSync(); }, 300000);

// ==================== NAVIGATION ====================
let currentPage = 'dashboard'; let currentProjectId = null;
function navigate(page, param) { currentPage = page; currentProjectId = param||null; document.querySelectorAll('.nav-item[data-page]').forEach(el => el.classList.remove('active')); const a = document.querySelector(`.nav-item[data-page="${page}"]`); if(a) a.classList.add('active'); renderPage(); }
async function renderPage() { const area = document.getElementById('contentArea'); try { switch(currentPage) { case 'dashboard': await renderDashboard(area); break; case 'customers': await renderCustomers(area); break; case 'projects': await renderProjects(area); break; case 'materials': await renderMaterials(area); break; case 'offers': await renderOffers(area); break; case 'settings': await renderSettings(area); break; case 'backup': await renderBackup(area); break; default: area.innerHTML='<h1>Seite nicht gefunden</h1>'; } } catch(e) { area.innerHTML=`<h1>Fehler</h1><p>${e.message}</p>`; console.error(e); } }

// ==================== DASHBOARD ====================
async function renderDashboard(area) { const customers = await db.getAll('customers'); const projects = await db.getAll('projects'); const offers = await db.getAll('offers'); document.getElementById('customerCount').textContent = customers.length; document.getElementById('projectCount').textContent = projects.filter(p=>!['Fertig','Archiv'].includes(p.status)).length; area.innerHTML = `<h1 class="page-title">Dashboard</h1><div class="stats-row"><div class="stat-card"><div class="stat-value">${customers.length}</div><div class="stat-label">Kunden</div></div><div class="stat-card"><div class="stat-value">${projects.filter(p=>!['Fertig','Archiv'].includes(p.status)).length}</div><div class="stat-label">Offene Projekte</div></div><div class="stat-card"><div class="stat-value">${offers.length}</div><div class="stat-label">Angebote</div></div></div><div class="card-grid"><div class="nav-card" onclick="navigate('customers')"><div class="card-icon blue">👥</div><div class="card-title">Kunden</div><div class="card-subtitle">${customers.length} Kunden</div></div><div class="nav-card" onclick="navigate('projects')"><div class="card-icon green">📋</div><div class="card-title">Projekte</div><div class="card-subtitle">${projects.length} gesamt</div></div><div class="nav-card" onclick="navigate('materials')"><div class="card-icon amber">📦</div><div class="card-title">Material</div><div class="card-subtitle">${(await db.getAll('materials')).length} Artikel</div></div><div class="nav-card" onclick="navigate('offers')"><div class="card-icon purple">📄</div><div class="card-title">Angebote</div><div class="card-subtitle">${offers.length} erstellt</div></div></div>`; }

// ==================== KUNDEN ====================
async function renderCustomers(area) { const customers = await db.getAll('customers'); area.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:20px;"><h1 class="page-title" style="margin:0;">Kunden</h1><button class="btn btn-primary" onclick="openCustomerModal()">+ Neuer Kunde</button></div><div class="table-container"><table><thead><tr><th>Name</th><th>Ort</th><th>Telefon</th><th></th></tr></thead><tbody>${customers.map(c=>`<tr><td><strong>${escapeHtml(c.firstName)} ${escapeHtml(c.lastName)}</strong></td><td>${escapeHtml(c.city||'')}</td><td>${escapeHtml(c.phone||'')}</td><td><button class="btn btn-sm btn-outline" onclick="openCustomerModal(${c.id})">✏️</button><button class="btn btn-sm btn-danger" onclick="deleteCustomer(${c.id})">🗑</button></td></tr>`).join('')}</tbody></table></div>`; }
function openCustomerModal(id=null) { (async () => { const cust = id ? await db.get('customers', id) : {}; const modal = document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal"><h3>${id?'Kunde bearbeiten':'Neuer Kunde'}</h3><div class="form-row"><div class="form-group"><label>Vorname</label><input id="cfname" value="${escapeHtml(cust.firstName||'')}"></div><div class="form-group"><label>Nachname</label><input id="clname" value="${escapeHtml(cust.lastName||'')}"></div></div><div class="form-row"><div class="form-group"><label>Straße</label><input id="cstreet" value="${escapeHtml(cust.street||'')}"></div><div class="form-group"><label>Hausnr.</label><input id="chnumber" value="${escapeHtml(cust.houseNumber||'')}"></div></div><div class="form-row"><div class="form-group"><label>PLZ</label><input id="czip" value="${escapeHtml(cust.zip||'')}"></div><div class="form-group"><label>Ort</label><input id="ccity" value="${escapeHtml(cust.city||'')}"></div></div><div class="form-group"><label>Telefon</label><input id="cphone" value="${escapeHtml(cust.phone||'')}"></div><div class="modal-actions"><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button><button class="btn btn-primary" id="saveCust">Speichern</button></div></div>`; document.body.appendChild(modal); document.getElementById('saveCust').addEventListener('click', async () => { const obj = { firstName: document.getElementById('cfname').value, lastName: document.getElementById('clname').value, street: document.getElementById('cstreet').value, houseNumber: document.getElementById('chnumber').value, zip: document.getElementById('czip').value, city: document.getElementById('ccity').value, phone: document.getElementById('cphone').value, _synced: false }; if(id) { obj.id = id; await db.put('customers', obj); } else await db.add('customers', obj); modal.remove(); if(navigator.onLine) fullSync(); navigate('customers'); }); })(); }
async function deleteCustomer(id) { if(confirm('Löschen?')) { await db.delete('customers', id); navigate('customers'); } }

// ==================== PROJEKTE (mit Räumen und Bildern) ====================
async function renderProjects(area) { const projects = await db.getAll('projects'); const customers = await db.getAll('customers'); let detail = ''; if(currentProjectId) { const p = await db.get('projects', currentProjectId); if(p) { const rooms = await db.getByIndex('rooms','projectId',currentProjectId); const images = await db.getByIndex('images','projectId',currentProjectId); const cust = customers.find(c=>c.id===p.customerId); const cool = calcCooling(rooms); detail = `<div style="background:var(--bg-secondary);border-radius:12px;padding:20px;margin-top:20px;"><h3>📋 ${escapeHtml(p.title)}</h3><p>Kunde: ${cust?`${cust.firstName} ${cust.lastName}`:'-'}</p><p>Status: ${p.status}</p><h4>Räume</h4><table><tr><th>Name</th><th>Maße</th><th>Fläche</th><th>kW</th></tr>${rooms.map(r=>`<tr><td>${escapeHtml(r.name)}</td><td>${r.length}x${r.width}x${r.height}</td><td>${((r.length*r.width).toFixed(1))} m²</td><td>${((r.length*r.width*80)/1000).toFixed(1)}</td></tr>`).join('')}</table><button class="btn btn-sm btn-primary" onclick="openRoomModal(${currentProjectId})">+ Raum</button>${cool.recommendation?`<p>❄️ Empf. Kälteleistung: <strong>${cool.recommendation} kW</strong></p>`:''}<h4>Bilder</h4><div class="image-grid">${images.map(img=>`<div class="image-card"><img src="${img.data}" onerror="this.style.display='none'"><div class="img-overlay">${escapeHtml(img.category||'')}</div></div>`).join('')}</div><button class="btn btn-sm btn-primary" onclick="openImageModal(${currentProjectId})">+ Bild</button><button class="btn btn-sm btn-primary" onclick="createOffer(${currentProjectId})">📄 Angebot erstellen</button></div>`; } }
    area.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:20px;"><h1 class="page-title" style="margin:0;">Projekte</h1><button class="btn btn-primary" onclick="openProjectModal()">+ Neues Projekt</button></div><div class="table-container"><table><thead><tr><th>Titel</th><th>Kunde</th><th>Status</th><th></th></tr></thead><tbody>${projects.map(p=>{ const cust = customers.find(c=>c.id===p.customerId); return `<tr style="cursor:pointer" onclick="navigate('projects',${p.id})"><td>${escapeHtml(p.title)}</td><td>${cust?`${cust.firstName} ${cust.lastName}`:'-'}</td><td>${p.status}</td><td><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openProjectModal(${p.id})">✏️</button></td></tr>`; }).join('')}</tbody></table></div>${detail}`; }
function openProjectModal(id=null) { (async () => { const p = id ? await db.get('projects', id) : {}; const custs = await db.getAll('customers'); const modal = document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal"><h3>${id?'Projekt bearbeiten':'Neues Projekt'}</h3><div class="form-group"><label>Titel</label><input id="ptitle" value="${escapeHtml(p.title||'')}"></div><div class="form-group"><label>Kunde</label><select id="pcustomer"><option value="">-</option>${custs.map(c=>`<option value="${c.id}" ${p.customerId==c.id?'selected':''}>${c.firstName} ${c.lastName}</option>`).join('')}</select></div><div class="modal-actions"><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button><button class="btn btn-primary" id="saveProj">Speichern</button></div></div>`; document.body.appendChild(modal); document.getElementById('saveProj').addEventListener('click', async () => { const obj = { title: document.getElementById('ptitle').value, customerId: parseInt(document.getElementById('pcustomer').value)||null, status: 'Neu', _synced: false }; if(id) { obj.id = id; await db.put('projects', obj); } else await db.add('projects', obj); modal.remove(); if(navigator.onLine) fullSync(); navigate('projects'); }); })(); }
function openRoomModal(projectId) { const modal = document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal"><h3>Raum hinzufügen</h3><div class="form-row"><div class="form-group"><label>Länge (m)</label><input type="number" id="rlength" step="0.1" value="0"></div><div class="form-group"><label>Breite (m)</label><input type="number" id="rwidth" step="0.1" value="0"></div><div class="form-group"><label>Höhe (m)</label><input type="number" id="rheight" step="0.1" value="2.5"></div></div><div class="modal-actions"><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button><button class="btn btn-primary" id="saveRoom">Speichern</button></div></div>`; document.body.appendChild(modal); document.getElementById('saveRoom').addEventListener('click', async () => { const obj = { projectId, length: parseFloat(document.getElementById('rlength').value)||0, width: parseFloat(document.getElementById('rwidth').value)||0, height: parseFloat(document.getElementById('rheight').value)||2.5, name: 'Raum', _synced: false }; await db.add('rooms', obj); modal.remove(); if(navigator.onLine) fullSync(); navigate('projects', projectId); }); }
function openImageModal(projectId) { const modal = document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal"><h3>Bild hinzufügen</h3><input type="file" id="imgfile" accept="image/*"><div class="modal-actions"><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button><button class="btn btn-primary" id="uploadImg">Hochladen</button></div></div>`; document.body.appendChild(modal); document.getElementById('uploadImg').addEventListener('click', async () => { const file = document.getElementById('imgfile').files[0]; if(!file) return; const reader = new FileReader(); reader.onload = async (e) => { const obj = { projectId, data: e.target.result, category: 'Sonstiges', label: '', _synced: false }; await db.add('images', obj); modal.remove(); navigate('projects', projectId); }; reader.readAsDataURL(file); }); }

// ==================== MATERIAL ====================
async function renderMaterials(area) { const materials = await db.getAll('materials'); area.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:20px;"><h1 class="page-title" style="margin:0;">Material</h1><button class="btn btn-primary" onclick="openMaterialModal()">+ Neues Material</button></div><div class="table-container"><table><thead><tr><th>Name</th><th>Kategorie</th><th>Einheit</th><th>VK-Preis</th><th></th></tr></thead><tbody>${materials.map(m=>`<tr><td><strong>${escapeHtml(m.name)}</strong></td><td>${escapeHtml(m.category||'')}</td><td>${m.unit||'Stk'}</td><td>${formatCurrency(m.sellingPrice)}</td><td><button class="btn btn-sm btn-outline" onclick="openMaterialModal(${m.id})">✏️</button><button class="btn btn-sm btn-danger" onclick="deleteMaterial(${m.id})">🗑</button></td></tr>`).join('')}</tbody></table></div>`; }
function openMaterialModal(id=null) { (async () => { const mat = id ? await db.get('materials', id) : {}; const modal = document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal"><h3>${id?'Material bearbeiten':'Neues Material'}</h3><div class="form-group"><label>Name</label><input id="mname" value="${escapeHtml(mat.name||'')}"></div><div class="form-row"><div class="form-group"><label>Kategorie</label><input id="mcat" value="${escapeHtml(mat.category||'')}"></div><div class="form-group"><label>Einheit</label><input id="munit" value="${escapeHtml(mat.unit||'Stk')}"></div></div><div class="form-row"><div class="form-group"><label>EK (€)</label><input type="number" id="mpurchase" step="0.01" value="${mat.purchasePrice||0}"></div><div class="form-group"><label>VK (€)</label><input type="number" id="mselling" step="0.01" value="${mat.sellingPrice||0}"></div></div><div class="modal-actions"><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button><button class="btn btn-primary" id="saveMat">Speichern</button></div></div>`; document.body.appendChild(modal); document.getElementById('saveMat').addEventListener('click', async () => { const obj = { name: document.getElementById('mname').value, category: document.getElementById('mcat').value, unit: document.getElementById('munit').value||'Stk', purchasePrice: parseFloat(document.getElementById('mpurchase').value)||0, sellingPrice: parseFloat(document.getElementById('mselling').value)||0, _synced: false }; if(id) { obj.id = id; await db.put('materials', obj); } else await db.add('materials', obj); modal.remove(); if(navigator.onLine) fullSync(); navigate('materials'); }); })(); }
async function deleteMaterial(id) { if(confirm('Löschen?')) { await db.delete('materials', id); navigate('materials'); } }

// ==================== ANGEBOTE ====================
async function renderOffers(area) { const offers = await db.getAll('offers'); const projects = await db.getAll('projects'); const customers = await db.getAll('customers'); area.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:20px;"><h1 class="page-title" style="margin:0;">Angebote</h1></div><div class="table-container"><table><thead><tr><th>ID</th><th>Projekt</th><th>Kunde</th><th>Summe</th><th>Status</th><th></th></tr></thead><tbody>${offers.map(o=>{ const proj = projects.find(p=>p.id===o.projectId); const cust = proj ? customers.find(c=>c.id===proj.customerId) : null; return `<tr><td>#${o.id}</td><td>${escapeHtml(proj?.title||'')}</td><td>${cust?`${cust.firstName} ${cust.lastName}`:'-'}</td><td>${formatCurrency(o.totalPrice)}</td><td><span class="status-badge ${getStatusClass(o.status)}">${o.status}</span></td><td><button class="btn btn-sm btn-primary" onclick="exportOfferPDF(${o.id})">📄 PDF</button><button class="btn btn-sm btn-danger" onclick="deleteOffer(${o.id})">🗑</button></td></tr>`; }).join('')}</tbody></table></div>`; }
async function createOffer(projectId) { const project = await db.get('projects', projectId); if(!project) return; const customer = project.customerId ? await db.get('customers', project.customerId) : null; if(!customer) { showToast('Kein Kunde zugewiesen','error'); return; } const materials = await db.getAll('materials'); const cooling = calcCooling((await db.getByIndex('rooms','projectId',projectId))); const modal = document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML = `<div class="modal"><h3>Angebot erstellen</h3><p><strong>Projekt:</strong> ${escapeHtml(project.title)}</p><p><strong>Kunde:</strong> ${customer.firstName} ${customer.lastName}</p><p><strong>Empf. Kälteleistung:</strong> ${cooling.recommendation} kW</p><div class="table-container"><table><thead><tr><th>Wählen</th><th>Artikel</th><th>Preis</th><th>Menge</th></tr></thead><tbody>${materials.map(m=>`<tr><td><input type="checkbox" class="sel" data-price="${m.sellingPrice||0}" data-name="${escapeHtml(m.name)}" data-unit="${m.unit||'Stk'}"></td><td>${escapeHtml(m.name)}</td><td>${formatCurrency(m.sellingPrice)}</td><td><input type="number" class="qty" value="1" min="1"></td></tr>`).join('')}</tbody></table></div><div class="modal-actions"><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button><button class="btn btn-primary" id="createOfferBtn">Erstellen</button></div></div>`; document.body.appendChild(modal); document.getElementById('createOfferBtn').addEventListener('click', async () => { const items = []; modal.querySelectorAll('tbody tr').forEach(row => { const cb = row.querySelector('.sel'); const qty = row.querySelector('.qty'); if(cb.checked) items.push({ name: cb.dataset.name, unit: cb.dataset.unit, price: parseFloat(cb.dataset.price), quantity: parseInt(qty.value)||1 }); }); let subtotal = 0; const positions = items.map(i => { const t = i.price*i.quantity; subtotal += t; return { ...i, total: t }; }); const vat = subtotal*0.19; const total = subtotal+vat; const offer = { projectId, customerId: project.customerId, positions, subtotal, vatRate:0.19, vatAmount:vat, totalPrice:total, coolingRecommendation:cooling.recommendation, status:'Angebot offen', _synced:false }; await db.add('offers', offer); modal.remove(); if(navigator.onLine) fullSync(); navigate('offers'); }); }
async function exportOfferPDF(offerId) { const offer = await db.get('offers', offerId); if(!offer) return; const project = await db.get('projects', offer.projectId); const customer = offer.customerId ? await db.get('customers', offer.customerId) : null; const { jsPDF } = window.jspdf; const doc = new jsPDF(); let y=20; doc.setFontSize(18).text('Angebot', 20, y); y+=10; if(customer) { doc.setFontSize(12).text(`${customer.firstName} ${customer.lastName}`, 20, y); y+=6; } doc.setFontSize(10).text(`Projekt: ${project?.title||''}`, 20, y); y+=6; doc.text(`Datum: ${formatDate(offer.createdAt)}`, 20, y); y+=8; doc.setFontSize(10); let pos=1; (offer.positions||[]).forEach(p => { if(y>270) { doc.addPage(); y=20; } doc.text(`${pos}. ${p.name}`, 20, y); doc.text(`${p.quantity} ${p.unit} x ${formatCurrency(p.price)}`, 100, y); doc.text(formatCurrency(p.total), 150, y); y+=5; pos++; }); y+=5; doc.text(`Netto: ${formatCurrency(offer.subtotal)}`, 130, y); y+=5; doc.text(`MwSt: ${formatCurrency(offer.vatAmount)}`, 130, y); y+=5; doc.text(`Gesamt: ${formatCurrency(offer.totalPrice)}`, 130, y); doc.save(`Angebot_${offerId}.pdf`); }
async function deleteOffer(id) { if(confirm('Angebot löschen?')) { await db.delete('offers', id); navigate('offers'); } }

// ==================== EINSTELLUNGEN ====================
async function renderSettings(area) { area.innerHTML = `<h1 class="page-title">Einstellungen</h1><div class="card-grid"><div class="nav-card" onclick="openCompanySettings()"><div class="card-icon blue">🏢</div><div class="card-title">Firmendaten</div></div><div class="nav-card" onclick="openPDFSettings()"><div class="card-icon purple">📄</div><div class="card-title">PDF-Footer</div></div></div>`; }
async function openCompanySettings() { const name = (await db.get('settings','companyName'))?.value || ''; const addr = (await db.get('settings','companyAddress'))?.value || ''; const modal = document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal"><h3>Firmendaten</h3><div class="form-group"><label>Firmenname</label><input id="compName" value="${escapeHtml(name)}"></div><div class="form-group"><label>Adresse</label><textarea id="compAddr">${escapeHtml(addr)}</textarea></div><div class="modal-actions"><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button><button class="btn btn-primary" id="saveComp">Speichern</button></div></div>`; document.body.appendChild(modal); document.getElementById('saveComp').addEventListener('click', async () => { await db.put('settings', { key:'companyName', value: document.getElementById('compName').value }); await db.put('settings', { key:'companyAddress', value: document.getElementById('compAddr').value }); modal.remove(); }); }
async function openPDFSettings() { const footer = (await db.get('settings','pdfFooter'))?.value || ''; const modal = document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal"><h3>PDF-Footer</h3><div class="form-group"><label>Text</label><textarea id="pdfFoot">${escapeHtml(footer)}</textarea></div><div class="modal-actions"><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button><button class="btn btn-primary" id="saveFooter">Speichern</button></div></div>`; document.body.appendChild(modal); document.getElementById('saveFooter').addEventListener('click', async () => { await db.put('settings', { key:'pdfFooter', value: document.getElementById('pdfFoot').value }); modal.remove(); }); }

// ==================== BACKUP ====================
async function renderBackup(area) { area.innerHTML = `<h1 class="page-title">Backup</h1><div class="card-grid"><div class="nav-card" onclick="createBackup()"><div class="card-icon blue">💾</div><div class="card-title">Backup erstellen</div></div><div class="nav-card" onclick="restoreBackup()"><div class="card-icon green">📥</div><div class="card-title">Backup wiederherstellen</div></div><div class="nav-card" onclick="exportAllExcel()"><div class="card-icon purple">📊</div><div class="card-title">Excel-Export (alle Daten)</div></div></div>`; }
async function createBackup() { const data = { customers: await db.getAll('customers'), projects: await db.getAll('projects'), rooms: await db.getAll('rooms'), images: await db.getAll('images'), materials: await db.getAll('materials'), offers: await db.getAll('offers'), settings: await db.getAll('settings') }; const blob = new Blob([JSON.stringify(data)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `KTM_Backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); }
async function restoreBackup() { const input = document.createElement('input'); input.type='file'; input.accept='.json'; input.onchange = async (e) => { if(!confirm('Alle vorhandenen Daten werden überschrieben. Fortfahren?')) return; const file = e.target.files[0]; const text = await file.text(); const data = JSON.parse(text); for(const t of ['customers','projects','rooms','images','materials','offers','settings']) { await db.clear(t); for(const d of data[t]||[]) await db.add(t, d); } showToast('Backup wiederhergestellt','success'); navigate('dashboard'); }; input.click(); }
async function exportAllExcel() { const data = { customers: await db.getAll('customers'), projects: await db.getAll('projects'), materials: await db.getAll('materials') }; const wb = XLSX.utils.book_new(); const custData = [['ID','Vorname','Nachname','Ort']]; data.customers.forEach(c => custData.push([c.id, c.firstName, c.lastName, c.city])); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(custData), 'Kunden'); const projData = [['ID','Titel','Kunde']]; data.projects.forEach(p => projData.push([p.id, p.title, p.customerId])); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(projData), 'Projekte'); const matData = [['ID','Name','VK-Preis']]; data.materials.forEach(m => matData.push([m.id, m.name, m.sellingPrice])); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(matData), 'Material'); XLSX.writeFile(wb, 'KTM_Export.xlsx'); }

// ==================== INIT ====================
async function init() { await openDB(); document.querySelectorAll('.nav-item[data-page]').forEach(el => el.addEventListener('click', () => navigate(el.dataset.page))); document.getElementById('syncBtn').addEventListener('click', fullSync); document.getElementById('themeToggle').addEventListener('click', () => { document.body.dataset.theme = document.body.dataset.theme==='dark'?'light':'dark'; }); document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open')); window.addEventListener('resize', () => { document.getElementById('menuToggle').style.display = window.innerWidth <= 900 ? 'flex' : 'none'; }); if(navigator.onLine) await fullSync(); navigate('dashboard'); }
document.addEventListener('DOMContentLoaded', init);
</script>
