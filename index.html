    <style>
        /* Exakt das gleiche CSS wie in deiner letzten funktionierenden Offline-Version */
        :root {
            --bg-primary: #f5f6f8; --bg-secondary: #ffffff; --bg-tertiary: #eef1f5;
            --text-primary: #1a1d23; --text-secondary: #5a5f6b; --text-muted: #8b909c;
            --border: #e2e5ea; --accent: #2563eb; --accent-hover: #1d4ed8; --accent-light: #eff3ff;
            --success: #059669; --warning: #d97706; --danger: #dc2626; --info: #6366f1;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12); --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
            --transition: 0.2s ease; --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --sidebar-width: 260px; --header-height: 64px;
        }
        [data-theme="dark"] {
            --bg-primary: #111827; --bg-secondary: #1a1f2e; --bg-tertiary: #222837;
            --text-primary: #e8eaed; --text-secondary: #9ca3af; --text-muted: #6b7280;
            --border: #2d3340; --accent: #3b82f6; --accent-hover: #60a5fa; --accent-light: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family); background: var(--bg-primary); color: var(--text-primary); display: flex; min-height: 100vh; transition: background var(--transition), color var(--transition); }
        .sidebar { width: var(--sidebar-width); background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 16px; flex-shrink: 0; transition: left 0.3s; z-index: 100; }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 8px 12px; margin-bottom: 28px; font-size: 20px; font-weight: 700; color: var(--accent); }
        .sidebar-logo .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; }
        .nav-section { margin-bottom: 20px; }
        .nav-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 8px 12px; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-bottom: 2px; transition: all var(--transition); }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
        .nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
        .nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: var(--header-height); background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0; }
        .search-box { flex: 1; max-width: 400px; display: flex; align-items: center; background: var(--bg-tertiary); border-radius: 24px; padding: 9px 16px; gap: 8px; }
        .search-box input { border: none; background: transparent; flex: 1; font-size: 14px; color: var(--text-primary); outline: none; font-family: var(--font-family); }
        .topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all var(--transition); }
        .icon-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .content-scroll { flex: 1; overflow-y: auto; padding: 24px; }
        .page-title { font-size: 26px; font-weight: 700; margin-bottom: 24px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 20px 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        .stat-card .stat-value { font-size: 32px; font-weight: 700; color: var(--accent); }
        .stat-card .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .nav-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 22px 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); cursor: pointer; transition: all var(--transition); display: flex; align-items: center; gap: 16px; }
        .nav-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .nav-card .card-icon { width: 50px; height: 50px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .card-icon.blue { background: #eff3ff; } .card-icon.green { background: #ecfdf5; } .card-icon.amber { background: #fffbeb; } .card-icon.purple { background: #eef2ff; } .card-icon.red { background: #fef2f2; }
        .nav-card .card-title { font-weight: 600; font-size: 15px; } .nav-card .card-subtitle { font-size: 12px; color: var(--text-muted); }
        .table-container { background: var(--bg-secondary); border-radius: var(--radius-md); border: 1px solid var(--border); overflow-x: auto; box-shadow: var(--shadow-sm); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: var(--bg-tertiary); padding: 13px 16px; text-align: left; font-weight: 600; font-size: 12px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 13px 16px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--bg-tertiary); }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .status-neu { background: #eef2ff; color: #6366f1; } .status-offen { background: #fffbeb; color: #d97706; } .status-aktiv { background: #ecfdf5; color: #059669; } .status-fertig { background: #f3f4f6; color: #6b7280; }
        .btn { padding: 10px 18px; border-radius: 24px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-family); white-space: nowrap; }
        .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); } .btn-outline:hover { background: var(--bg-tertiary); }
        .btn-danger { background: var(--danger); color: #fff; } .btn-danger:hover { opacity: 0.9; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 16px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg-secondary); color: var(--text-primary); font-family: var(--font-family); transition: all var(--transition); }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
        .modal { background: var(--bg-secondary); border-radius: var(--radius-lg); width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; padding: 28px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .modal h3 { font-size: 20px; margin-bottom: 20px; font-weight: 700; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 14px 20px; border-radius: var(--radius-md); color: #fff; font-weight: 600; box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px; min-width: 250px; }
        .toast-success { background: #059669; } .toast-error { background: #dc2626; } .toast-info { background: #6366f1; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .image-card { aspect-ratio: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; }
        .image-card .img-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: #fff; padding: 6px 10px; font-size: 11px; text-align: center; }
        @media (max-width: 900px) { .sidebar { position: fixed; left: -280px; height: 100vh; } .sidebar.open { left: 0; } }
        @media (max-width: 600px) { .modal { width: 95%; padding: 16px; } .topbar { padding: 0 12px; } .content-scroll { padding: 16px; } }
    </style>
</head>
<body data-theme="light">

<script>
    // ==================== SUPABASE KONFIGURATION ====================
    const SUPABASE_URL = 'https://byajcepqydkyoegztcgj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_s3zhy_TO4KWnVQN1XSYDHg_zcOwA6Qn';  // <<< HIER DEINEN ECHTEN ANON KEY EINTRAGEN!
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ==================== SYNCHRONISATION (manuell, kein automatischer Sync) ====================
    const FIELD_MAP = { firstName:'first_name', lastName:'last_name', houseNumber:'house_number', customerId:'customer_id', projectId:'project_id', roomCount:'room_count', purchasePrice:'purchase_price', sellingPrice:'selling_price', totalPrice:'total_price', vatRate:'vat_rate', vatAmount:'vat_amount', coolingRecommendation:'cooling_recommendation', coolingDetails:'cooling_details', createdAt:'created_at', updatedAt:'updated_at' };
    const REVERSE_MAP = Object.fromEntries(Object.entries(FIELD_MAP).map(([k,v])=>[v,k]));

    async function syncPush(table) {
        const all = await db.getAll(table);
        for (const rec of all) { if(rec._synced) continue;
            const p = {}; for(const k in rec) { const snake = FIELD_MAP[k]||k; if(!['id','_synced'].includes(k)) p[snake] = rec[k]; }
            try {
                const { data, error } = await sb.from(table).insert(p).select();
                if (!error && data?.length) { await db.delete(table, rec.id); const nr = {}; for(const k in data[0]) { nr[REVERSE_MAP[k]||k] = data[0][k]; } nr._synced = true; await db.add(table, nr); }
                else if (error) console.warn(`Push-Fehler ${table}:`, error.message);
            } catch(e) { console.warn(`Push-Exception ${table}:`, e.message); }
        }
    }

    async function syncPull(table) {
        try {
            const { data, error } = await sb.from(table).select('*');
            if (error) { console.warn(`Pull-Fehler ${table}:`, error.message); return; }
            const ids = new Set((await db.getAll(table)).map(r=>r.id));
            for (const row of data) {
                const rec = {}; for(const k in row) rec[REVERSE_MAP[k]||k] = row[k];
                rec._synced = true;
                if(ids.has(rec.id)) await db.put(table, rec);
                else await db.add(table, rec);
            }
        } catch(e) { console.warn(`Pull-Exception ${table}:`, e.message); }
    }

    async function fullSync() {
        if (!navigator.onLine) { showToast('Keine Internetverbindung', 'info'); return; }
        const statusEl = document.getElementById('syncStatus');
        statusEl.textContent = 'Sync...';
        try {
            for (const t of ['customers','projects','rooms','images','materials','offers','settings']) {
                await syncPush(t);
                await syncPull(t);
            }
            showToast('Synchronisation abgeschlossen', 'success');
        } catch(e) {
            showToast('Sync-Fehler – bitte Konsole prüfen', 'error');
            console.error(e);
        }
        statusEl.textContent = navigator.onLine ? 'Online' : 'Offline';
        app.navigate(app.currentPage, app.currentProjectId); // Seite aktualisieren
    }

    // ==================== DATENBANK (Original) ====================
    const DB_NAME = 'KTM_DB';
    class DatabaseManager {
        constructor() { this.db = null; }
        async init() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    ['customers','projects','rooms','images','materials','offers','settings'].forEach(s => {
                        if (!db.objectStoreNames.contains(s)) db.createObjectStore(s, { keyPath: 'id', autoIncrement: true });
                    });
                };
                request.onsuccess = (e) => { this.db = e.target.result; resolve(); };
                request.onerror = () => reject(request.error);
            });
        }
        async add(store, data) { data._synced = false; return new Promise((resolve, reject) => { const tx = this.db.transaction(store, 'readwrite'); const req = tx.objectStore(store).add(data); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error); }); }
        async put(store, data) { data._synced = false; return new Promise((resolve, reject) => { const tx = this.db.transaction(store, 'readwrite'); const req = tx.objectStore(store).put(data); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error); }); }
        async get(store, id) { return new Promise(r => { this.db.transaction(store).objectStore(store).get(id).onsuccess = e => r(e.target.result); }); }
        async getAll(store) { return new Promise(r => { this.db.transaction(store).objectStore(store).getAll().onsuccess = e => r(e.target.result); }); }
        async delete(store, id) { return new Promise(r => { this.db.transaction(store,'readwrite').objectStore(store).delete(id).onsuccess = () => r(); }); }
        async clear(store) { return new Promise(r => { this.db.transaction(store,'readwrite').objectStore(store).clear().onsuccess = () => r(); }); }
        async getByIndex(store, index, value) {
            return new Promise(r => {
                const tx = this.db.transaction(store);
                const req = tx.objectStore(store).index(index).getAll(value);
                req.onsuccess = e => r(e.target.result);
            });
        }
        async exportAllData() { /* wie zuvor */ }
        async importAllData(data) { /* wie zuvor */ }
    }
    const db = new DatabaseManager();

    // ==================== HILFSFUNKTIONEN ====================
    function showToast(msg, type='info') { /* wie zuvor */ }
    function formatCurrency(v) { return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(v||0); }
    function formatDate(iso) { return iso ? new Date(iso).toLocaleDateString('de-DE') : '-'; }
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
    function getStatusClass(st) { /* wie zuvor */ }
    function calcCooling(rooms) { /* wie zuvor */ }
    function showModal(title, html, onSave) { /* wie zuvor */ }

    // ==================== SEITEN (identisch zur Offline‑Version) ====================
    const contentArea = document.getElementById('contentArea');
    let currentPage = 'dashboard';
    let currentProjectId = null;

    async function renderDashboard() { /* wie zuvor */ }
    async function renderCustomers() { /* wie zuvor */ }
    async function renderProjects(projectId) { /* wie zuvor */ }
    async function renderMaterials() { /* wie zuvor */ }
    async function renderOffers() { /* wie zuvor */ }
    async function renderSettings() { /* wie zuvor */ }
    async function renderBackup() { /* wie zuvor */ }

    // ==================== APP‑CONTROLLER ====================
    const app = {
        currentPage: 'dashboard',
        currentProjectId: null,

        async init() {
            await db.init();
            document.getElementById('syncStatus').textContent = navigator.onLine ? 'Online' : 'Offline';
            this.setupNavigation();
            this.setupSearch();
            this.setupTheme();
            this.navigate('dashboard');
            this.setupResponsive();
        },

        setupNavigation() {
            document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                item.addEventListener('click', (e) => this.navigate(e.currentTarget.dataset.page));
            });
            document.getElementById('syncBtn').addEventListener('click', fullSync);
        },

        navigate(page, param = null) {
            this.currentPage = page;
            this.currentProjectId = param;
            document.querySelectorAll('.nav-item[data-page]').forEach(el => el.classList.remove('active'));
            const activeEl = document.querySelector(`.nav-item[data-page="${page}"]`);
            if (activeEl) activeEl.classList.add('active');
            document.getElementById('sidebar').classList.remove('open');
            switch(page) {
                case 'dashboard': renderDashboard(); break;
                case 'customers': renderCustomers(); break;
                case 'projects': renderProjects(param); break;
                case 'materials': renderMaterials(); break;
                case 'offers': renderOffers(); break;
                case 'settings': renderSettings(); break;
                case 'backup': renderBackup(); break;
                default: renderDashboard();
            }
        },

        setupSearch() { /* wie zuvor */ },
        setupTheme() { /* wie zuvor */ },
        setupResponsive() { /* wie zuvor */ },

        // Alle weiteren Methoden (Kunden, Projekte, Räume, Bilder, Material, Angebote, PDF, Excel, Backup, Einstellungen)
        // ... (identisch zur Originalversion)
    };

    // ==================== INITIALISIERUNG ====================
    document.addEventListener('DOMContentLoaded', () => app.init());
</script>
