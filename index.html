<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a2b3c">
    <meta name="description" content="KTM – Kälte Technik Management">
    <title>KTM – Kälte Technik Management</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%232563eb'/><text x='32' y='44' text-anchor='middle' font-size='36' fill='white'>❄</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* ============ CSS-VARIABLEN & DESIGN-SYSTEM ============ */
        :root {
            --bg-primary: #f5f6f8;
            --bg-secondary: #ffffff;
            --bg-tertiary: #eef1f5;
            --text-primary: #1a1d23;
            --text-secondary: #5a5f6b;
            --text-muted: #8b909c;
            --border: #e2e5ea;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-light: #eff3ff;
            --success: #059669;
            --success-light: #ecfdf5;
            --warning: #d97706;
            --warning-light: #fffbeb;
            --danger: #dc2626;
            --danger-light: #fef2f2;
            --info: #6366f1;
            --info-light: #eef2ff;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: 0.2s ease;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --sidebar-width: 260px;
            --header-height: 64px;
        }

        [data-theme="dark"] {
            --bg-primary: #111827;
            --bg-secondary: #1a1f2e;
            --bg-tertiary: #222837;
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #2d3340;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-light: #1e293b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            flex-shrink: 0;
            transition: all var(--transition);
            z-index: 100;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            margin-bottom: 28px;
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.3px;
        }
        .sidebar-logo .logo-icon {
            width: 40px; height: 40px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 22px;
        }
        .nav-section { margin-bottom: 20px; }
        .nav-section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 8px 12px;
            font-weight: 600;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
        }
        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .nav-item.active {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 600;
        }
        .nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
        .nav-badge {
            margin-left: auto;
            background: var(--accent);
            color: #fff;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        /* ============ MAIN CONTENT ============ */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topbar {
            height: var(--header-height);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            flex-shrink: 0;
        }
        .search-box {
            flex: 1;
            max-width: 400px;
            display: flex;
            align-items: center;
            background: var(--bg-tertiary);
            border-radius: 24px;
            padding: 9px 16px;
            gap: 8px;
        }
        .search-box input {
            border: none;
            background: transparent;
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            font-family: var(--font-family);
        }
        .search-box .search-icon { color: var(--text-muted); font-size: 16px; }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        .icon-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary);
            transition: all var(--transition);
        }
        .icon-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* ============ DASHBOARD KACHELN ============ */
        .page-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.4px;
            color: var(--text-primary);
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all var(--transition);
        }
        .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
        .stat-card .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
        }
        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .nav-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 22px 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .nav-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .nav-card .card-icon {
            width: 50px; height: 50px;
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .card-icon.blue { background: #eff3ff; }
        .card-icon.green { background: #ecfdf5; }
        .card-icon.amber { background: #fffbeb; }
        .card-icon.purple { background: #eef2ff; }
        .card-icon.red { background: #fef2f2; }
        .nav-card .card-title { font-weight: 600; font-size: 15px; }
        .nav-card .card-subtitle { font-size: 12px; color: var(--text-muted); }

        /* ============ TABELLEN ============ */
        .table-container {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            overflow-x: auto;
            box-shadow: var(--shadow-sm);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: var(--bg-tertiary);
            padding: 13px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg-tertiary); }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-neu { background: #eef2ff; color: #6366f1; }
        .status-offen { background: #fffbeb; color: #d97706; }
        .status-aktiv { background: #ecfdf5; color: #059669; }
        .status-fertig { background: #f3f4f6; color: #6b7280; }

        /* ============ BUTTONS ============ */
        .btn {
            padding: 10px 18px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-family: var(--font-family);
            white-space: nowrap;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--bg-tertiary); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { opacity: 0.9; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 16px; }

        /* ============ FORMULARE ============ */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: var(--font-family);
            transition: all var(--transition);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }

        /* ============ MODAL ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .modal.modal-wide { max-width: 980px; }
        .modal h3 {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ============ TOAST ============ */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 14px 20px;
            border-radius: var(--radius-md);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 250px;
        }
        .toast-success { background: #059669; }
        .toast-error { background: #dc2626; }
        .toast-info { background: #6366f1; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

        /* ============ IMAGE GRID ============ */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .image-card {
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            position: relative;
        }
        .image-card img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .image-card .img-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 6px 10px;
            font-size: 11px;
            text-align: center;
        }

        /* ============ ANGEBOT-BUILDER ============ */
        .offer-builder { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 20px; }
        @media (max-width: 800px) { .offer-builder { grid-template-columns: 1fr; } }
        .offer-search-wrap { position: relative; }
        .offer-search-wrap input {
            width: 100%; padding: 12px 14px 12px 40px; border: 1.5px solid var(--border);
            border-radius: var(--radius-md); font-size: 14px; background: var(--bg-tertiary);
            color: var(--text-primary); font-family: var(--font-family);
        }
        .offer-search-wrap input:focus { outline: none; border-color: var(--accent); background: var(--bg-secondary); }
        .offer-search-wrap .search-ic { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .autocomplete-list {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg); max-height: 260px; overflow-y: auto; z-index: 50; display: none;
        }
        .autocomplete-item { padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 13px; }
        .autocomplete-item:hover { background: var(--bg-tertiary); }
        .autocomplete-item .ac-name { font-weight: 600; }
        .autocomplete-item .ac-meta { color: var(--text-muted); font-size: 11px; }
        .autocomplete-item .ac-price { color: var(--accent); font-weight: 700; white-space: nowrap; }
        .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .chip {
            padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
            background: var(--bg-tertiary); color: var(--text-secondary); cursor: pointer; border: 1.5px solid transparent;
            transition: all var(--transition);
        }
        .chip:hover { background: var(--border); }
        .chip.active { background: var(--accent); color: #fff; }
        .offer-pos-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; margin-top: 10px; }
        .offer-pos-item {
            display: grid; grid-template-columns: 1fr 70px 90px 32px; gap: 8px; align-items: center;
            background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px;
        }
        .offer-pos-item .pos-name { font-weight: 600; }
        .offer-pos-item .pos-meta { font-size: 11px; color: var(--text-muted); }
        .offer-pos-item input[type="number"] { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid var(--border); text-align: center; }
        .offer-summary-box { background: var(--bg-tertiary); border-radius: var(--radius-md); padding: 18px; margin-top: 16px; }
        .offer-summary-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; color: var(--text-secondary); }
        .offer-summary-row.total { font-size: 20px; font-weight: 800; color: var(--accent); border-top: 1px solid var(--border); margin-top: 8px; padding-top: 12px; }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100vh;
                transition: left 0.3s ease;
            }
            .sidebar.open { left: 0; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .card-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .stats-row { grid-template-columns: 1fr; }
            .modal { width: 95%; padding: 16px; margin: 8px; }
            .topbar { padding: 0 12px; }
            .content-scroll { padding: 16px; }
        }

        /* ============ PRINT ============ */
        @media print {
            .sidebar, .topbar, .toast-container { display: none !important; }
            .main-area { margin: 0; }
            .content-scroll { overflow: visible; padding: 0; }
            .modal-overlay { position: static; }
        }

        /* ============ SPLASH ============ */
        .splash-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 16px;
        }
        .splash-screen .splash-logo {
            font-size: 48px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body data-theme="light">

    <div class="toast-container" id="toastContainer"></div>

    <aside class="sidebar" id="sidebar">

        <nav>
            <div class="nav-section">

    <div id="modalContainer"></div>

    <script>
        // ============================================================
        // ============ SUPABASE & SYNC LOGIK (REALTIME) ==============
        // ============================================================
        const SUPABASE_URL = 'https://byajcepqydkyoegztcgj.supabase.co';

        const REVERSE_MAP = Object.fromEntries(Object.entries(FIELD_MAP).map(([k,v])=>[v,k]));
        
        function toSnake(o) { 
            const r={}; 
            for(const k in o) { 
                if(['id','_synced'].includes(k)) continue; 
                r[FIELD_MAP[k]||k]=o[k]; 
            } 
            return r; 
        }
        function toCamel(o) { 
            const r={}; 
            for(const k in o) r[REVERSE_MAP[k]||k]=o[k]; 
            return r; 
        }

        // ---- Echtzeit-Status UI ----
        function updateSyncStatus(status, text) {
            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = text;
            if (status === 'online') statusEl.style.color = '#059669'; // Grün

        // ---- Realtime Subscription ----
        let realtimeChannel = null;

        function initRealtime() {
            if (realtimeChannel) sb.removeChannel(realtimeChannel);

            realtimeChannel = sb.channel('public-tables-changes')
                .on(
                    'postgres_changes',
                    { event: '*', schema: 'public' },
                    (payload) => handleRemoteChange(payload)
                )
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        updateSyncStatus('online', '🟢 Online & Live');
                    } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
                        updateSyncStatus('offline', '🔴 Getrennt');
                    }
                });
        }

        async function handleRemoteChange(payload) {
            const table = payload.table;
            const eventType = payload.eventType; // INSERT, UPDATE, DELETE
            
            if (eventType === 'DELETE') {
                await db.deleteLocalOnly(table, payload.old.id);
            } else {
                const remoteData = payload.new;
                const localData = toCamel(remoteData);
                localData._synced = true;

                // Konfliktlösung: Existiert der Datensatz lokal und ist neuer?
                const existing = await db.get(table, localData.id);
                if (existing) {
                    const localTime = new Date(existing.updatedAt || 0).getTime();
                    const remoteTime = new Date(localData.updatedAt || 0).getTime();
                    
                    if (localTime > remoteTime && !existing._synced) {
                        // Lokaler Datensatz ist neuer und ungesynct -> Remote überschreiben (Push)
                        backgroundSyncPush();
                        return;
                    }
                }
                await db.putLocalOnly(table, localData);
            }
            
            // UI aktualisieren, ohne die Seite neu zu laden
            app.navigate(app.currentPage, app.currentProjectId);
        }

        // ---- Hintergrund-Synchronisation (Push) ----
        let isSyncing = false;
        async function backgroundSyncPush() {
            if (!navigator.onLine || isSyncing) return;
            isSyncing = true;
            updateSyncStatus('syncing', '☁️ Uploading...');

            try {
                for (const t of ['customers','projects','rooms','images','materials','offers','settings']) { 
                    const all = await db.getAll(t);
                    const unsynced = all.filter(r => !r._synced);
                    
                    for (const rec of unsynced) {
                        const p = toSnake(rec);
                        // Wenn der Datensatz keine ID in der DB hat, mach ein Insert, ansonsten ein Upsert
                        const { data, error } = await sb.from(t).upsert(p).select();
                        if (!error && data?.length) { 
                            // Alte lokale ID löschen, neue von Supabase übernehmen
                            await db.deleteLocalOnly(t, rec.id); 
                            const nr = toCamel(data[0]); 
                            nr._synced = true; 
                            await db.addLocalOnly(t, nr); 
                        }
                    }
                }
                updateSyncStatus('online', '🟢 Online & Live');
            } catch(e) { 
                console.warn('Background Sync Fehler:', e);
                updateSyncStatus('offline', '🔴 Sync-Fehler');
            } finally {
                isSyncing = false;
            }
        }

        // Initiale Synchronisation beim Start oder Wiederverbinden
        async function initialFullSync() {
            if (!navigator.onLine) return;
            updateSyncStatus('syncing', '☁️ Lade Daten...');
            
            // Zuerst Push lokaler Änderungen
            await backgroundSyncPush();

            // Dann Pull aller Tabellen (vereinfacht, holt nur Updates die neuer sind als lokaler Max-Timestamp)
            try {
                for (const t of ['customers','projects','rooms','images','materials','offers','settings']) {
                    const { data, error } = await sb.from(t).select('*');
                    if (!error && data) {
                        for (const row of data) {
                            const rec = toCamel(row);
                            rec._synced = true;
                            
                            const existing = await db.get(t, rec.id);
                            if (!existing || new Date(rec.updatedAt) > new Date(existing.updatedAt)) {
                                await db.putLocalOnly(t, rec);
                            }
                        }
                    }
                }
            } catch(e) { console.warn('Initial Pull Error', e); }
            
            app.navigate(app.currentPage, app.currentProjectId);
            updateSyncStatus('online', '🟢 Online & Live');
        }

        // ============================================================
        // ============ DATENBANK-SCHICHT (IndexedDB) =================
        // ============================================================
        const DB_NAME = 'KTM_DB';
        const DB_VERSION = 2;

        class DatabaseManager {
            constructor() { this.db = null; }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        const tx = e.target.transaction;
                        
                        const stores = ['customers', 'projects', 'rooms', 'images', 'materials', 'offers', 'settings'];
                        const indexedStores = ['rooms', 'images', 'offers'];
                        
                        stores.forEach(s => {
                            let store;
                            if (!db.objectStoreNames.contains(s)) {
                                store = db.createObjectStore(s, { keyPath: s === 'settings' ? 'key' : 'id', autoIncrement: s !== 'settings' });
                            } else {
                                store = tx.objectStore(s);
                            }
                            
                            if (s === 'customers' && !store.indexNames.contains('name')) {
                                store.createIndex('name', 'lastName', { unique: false });
                                store.createIndex('status', 'status', { unique: false });
                            }
                            if (s === 'projects' && !store.indexNames.contains('customerId')) {
                                store.createIndex('customerId', 'customerId', { unique: false });
                                store.createIndex('status', 'status', { unique: false });
                            }
                            if (s === 'materials' && !store.indexNames.contains('category')) {
                                store.createIndex('category', 'category', { unique: false });
                            }
                            if (indexedStores.includes(s) && !store.indexNames.contains('projectId')) {
                                store.createIndex('projectId', 'projectId', { unique: false });
                            }
                        });
                    };
                    request.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
                    request.onerror = (e) => { console.error('DB-Fehler:', e.target.error); reject(e.target.error); };
                });
            }

            // ---- Interne (Local Only) Methoden ----
            // Verhindern Endlosschleifen, wenn Daten von Supabase empfangen werden
            async addLocalOnly(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.add(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async putLocalOnly(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.put(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async deleteLocalOnly(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            // ---- Öffentliche Methoden (Trigger Push) ----
            async add(storeName, data) {
                data._synced = false;
                data.createdAt = data.createdAt || new Date().toISOString();
                data.updatedAt = new Date().toISOString();
                
                // Lokale ID generieren falls nötig, IndexedDB macht das via autoIncrement
                const result = await this.addLocalOnly(storeName, data);
                
                // Wenn auto-increment, holen wir das Objekt nochmal um die ID zu haben
                if (storeName !== 'settings' && !data.id) {
                    data.id = result;
                    await this.putLocalOnly(storeName, data);
                }

                backgroundSyncPush();
                return result;
            }

            async put(storeName, data) {
                data._synced = false;
                data.updatedAt = new Date().toISOString();
                const result = await this.putLocalOnly(storeName, data);
                backgroundSyncPush();
                return result;
            }

            async delete(storeName, id) {
                await this.deleteLocalOnly(storeName, id);
                
                // Supabase Löschung triggern
                if (navigator.onLine) {
                    sb.from(storeName).delete().eq(storeName === 'settings' ? 'key' : 'id', id).then(() => {
                        console.log(`Deleted remote ${storeName} ${id}`);
                    }).catch(console.warn);
                }
                return;
            }

            // ---- Lese-Methoden bleiben unverändert ----
            async get(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const request = tx.objectStore(storeName).get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const request = tx.objectStore(storeName).getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getByIndex(storeName, indexName, value) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const request = tx.objectStore(storeName).index(indexName).getAll(value);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const request = tx.objectStore(storeName).clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            // Spezifische Queries
            async getProjectWithDetails(projectId) {
                const project = await this.get('projects', projectId);
                if (!project) return null;
                const rooms = await this.getByIndex('rooms', 'projectId', projectId);
                const images = await this.getByIndex('images', 'projectId', projectId);
                const offers = await this.getByIndex('offers', 'projectId', projectId);
                return { ...project, rooms, images, offers };
            }

            async getCustomerWithProjects(customerId) {
                const customer = await this.get('customers', customerId);
                if (!customer) return null;
                const projects = await this.getByIndex('projects', 'customerId', customerId);
                return { ...customer, projects };
            }

            async exportAllData() {
                return {
                    customers: await this.getAll('customers'),
                    projects: await this.getAll('projects'),
                    rooms: await this.getAll('rooms'),
                    images: await this.getAll('images'),
                    materials: await this.getAll('materials'),
                    offers: await this.getAll('offers'),
                    settings: await this.getAll('settings'),
                    exportDate: new Date().toISOString(),
                    version: '2.0'
                };
            }

            async importAllData(data) {
                for(const s of ['customers','projects','rooms','images','materials','offers','settings']) await this.clear(s);
                for (const c of data.customers || []) await this.addLocalOnly('customers', c);
                for (const p of data.projects || []) await this.addLocalOnly('projects', p);
                for (const r of data.rooms || []) await this.addLocalOnly('rooms', r);
                for (const i of data.images || []) await this.addLocalOnly('images', i);
                for (const m of data.materials || []) await this.addLocalOnly('materials', m);
                for (const o of data.offers || []) await this.addLocalOnly('offers', o);
                for (const s of data.settings || []) await this.putLocalOnly('settings', s);
                backgroundSyncPush(); // Alles neu hochladen
            }
        }

        // ============================================================
        function calculateCoolingCapacity(rooms) {
            if (!rooms || rooms.length === 0) return { totalKW: 0, recommendation: null, details: [] };

            let totalWatts = 0;
            const details = [];

            for (const room of rooms) {
                const area = (room.length || 0) * (room.width || 0);
                const volume = area * (room.height || 2.5);

                // Faustformel: 60-100 W/m² je nach Raumtyp (konservativ 80 W/m² für Wohnräume)
                let wattsPerSqm = 80;
                if (room.name && (room.name.toLowerCase().includes('dach') || room.name.toLowerCase().includes('wintergarten'))) {
                    wattsPerSqm = 120;
                }
                if (room.name && room.name.toLowerCase().includes('keller')) {
                    wattsPerSqm = 60;
                }

                const roomWatts = area * wattsPerSqm;
                totalWatts += roomWatts;

                details.push({
                    roomName: room.name || 'Unbenannt',
                    area: Math.round(area * 100) / 100,
                    volume: Math.round(volume * 100) / 100,
                    wattsPerSqm,
                    estimatedKW: Math.round(roomWatts / 100) / 10
                });
            }

            const totalKW = Math.round(totalWatts / 100) / 10;
            const availableSizes = [2.0, 2.5, 3.5, 4.2, 5.0, 6.0, 7.1, 8.5, 10.0];

            let recommendation = availableSizes[0];
            for (const size of availableSizes) {
                if (size >= totalKW) {
                    recommendation = size;
                    break;
                }
            }
            if (totalKW > availableSizes[availableSizes.length - 1]) {
                recommendation = availableSizes[availableSizes.length - 1];
            }

            return { totalKW, recommendation, details };
        }

        // ============================================================
        // ============ APP-CONTROLLER ================================
        // ============================================================
       const app = {
            currentPage: 'dashboard',
            currentProjectId: null,

            async init() {
                await db.init();
                updateSyncStatus('offline', 'Initialisiere...');
                
                this.setupNavigation();
                this.setupSearch();
                this.setupTheme();
                this.navigate('dashboard');
                document.getElementById('splash').style.display = 'none';
                this.setupResponsive();

                // Start synchronisation process
                if (navigator.onLine) {
                    await initialFullSync();
                    initRealtime();
                } else {
                    updateSyncStatus('offline', '🔴 Offline');
                }
            },

            setupNavigation() {
                // ...
                document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const page = item.dataset.page;
                        this.navigate(page);
                    });
                });
                document.getElementById('syncBtn').addEventListener('click', initialFullSync);
            },

            navigate(page, param = null) {
                this.currentPage = page;
                this.currentProjectId = param;

                // Aktualisiere aktive Navigation
                document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.page === page) item.classList.add('active');
                });

                // Schließe Sidebar auf Mobile
                document.getElementById('sidebar').classList.remove('open');

                // Rendere Seite
                switch (page) {
                    case 'dashboard': renderDashboard(); break;
                    case 'customers': renderCustomers(); break;
                    case 'projects': renderProjects(param); break;
                    case 'materials': renderMaterials(); break;
                    case 'offers': renderOffers(); break;
                    case 'settings': renderSettings(); break;
                    case 'backup': renderBackup(); break;
                    default: renderDashboard();
                }
            },

            setupSearch() {
                const searchInput = document.getElementById('globalSearch');
                searchInput.addEventListener('input', async (e) => {
                    const query = e.target.value.toLowerCase().trim();
                    if (query.length < 2 && query.length > 0) return;
                    if (query.length === 0) {
                        this.navigate(this.currentPage, this.currentProjectId);
                        return;
                    }
                    // Globale Suche
                    const customers = await db.getAll('customers');
                    const projects = await db.getAll('projects');
                    const materials = await db.getAll('materials');

                    const results = [
                        ...customers.filter(c =>
                            (c.firstName + ' ' + c.lastName).toLowerCase().includes(query) ||
                            (c.phone || '').includes(query) ||
                            (c.city || '').toLowerCase().includes(query) ||
                            (c.street || '').toLowerCase().includes(query)
                        ).map(c => ({ type: 'Kunde', title: `${c.firstName} ${c.lastName}`, id: c.id, link: 'customers' })),
                        ...projects.filter(p =>
                            (p.title || '').toLowerCase().includes(query) ||
                            (p.status || '').toLowerCase().includes(query)
                        ).map(p => ({ type: 'Projekt', title: p.title, id: p.id, link: 'projects' })),
                        ...materials.filter(m =>
                            (m.name || '').toLowerCase().includes(query)
                        ).map(m => ({ type: 'Material', title: m.name, id: m.id, link: 'materials' })),
                    ];

                    contentArea.innerHTML = `
                        <h1 class="page-title">Suchergebnisse für "${escapeHtml(query)}"</h1>
                        <div class="table-container">
                            <table>
                                <thead><tr><th>Typ</th><th>Name</th><th>Aktion</th></tr></thead>
                                <tbody>
                                    ${results.length > 0 ? results.map(r => `
                                        <tr>
                                            <td><span class="status-badge ${r.type === 'Kunde' ? 'status-neu' : r.type === 'Projekt' ? 'status-aktiv' : 'status-offen'}">${r.type}</span></td>
                                            <td><strong>${escapeHtml(r.title)}</strong></td>
                                            <td><button class="btn btn-sm btn-primary" onclick="app.navigate('${r.link}', ${r.id})">Öffnen</button></td>
                                        </tr>
                                    `).join('') : '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);">Keine Ergebnisse</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    `;
                });
            },

            setupTheme() {
                const toggle = document.getElementById('themeToggle');
                const saved = localStorage.getItem('klima-theme') || 'light';
                document.body.dataset.theme = saved;
                toggle.innerHTML = saved === 'dark' ? '<span class="nav-icon">☀️</span> Hellmodus' : '<span class="nav-icon">🌙</span> Dunkelmodus';

                toggle.addEventListener('click', () => {
                    const newTheme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
                    document.body.dataset.theme = newTheme;
                    localStorage.setItem('klima-theme', newTheme);
                    toggle.innerHTML = newTheme === 'dark' ? '<span class="nav-icon">☀️</span> Hellmodus' : '<span class="nav-icon">🌙</span> Dunkelmodus';
                });
            },

            setupResponsive() {
                const menuToggle = document.getElementById('menuToggle');
                const sidebar = document.getElementById('sidebar');
                const checkWidth = () => {
                    if (window.innerWidth <= 900) {
                        menuToggle.style.display = 'flex';
                    } else {
                        menuToggle.style.display = 'none';
                        sidebar.classList.remove('open');
                    }
                };
                checkWidth();
                window.addEventListener('resize', checkWidth);
                menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
                document.addEventListener('click', (e) => {
                    if (window.innerWidth <= 900 && !sidebar.contains(e.target) && e.target !== menuToggle && !menuToggle.contains(e.target)) {
                        sidebar.classList.remove('open');
                    }
                });
            },

                        }

                );
            },

            async deleteCustomer(id) {
                if (!confirm('Kunden wirklich löschen? Alle zugehörigen Projekte bleiben erhalten.')) return;
                await db.delete('customers', id);
                showToast('Kunde gelöscht.', 'info');
                this.navigate('customers');
            },

            async duplicateCustomer(id) {
                const original = await db.get('customers', id);
                if (!original) return;
                const copy = { ...original };
                delete copy.id;
                delete copy.createdAt;
                delete copy._synced; // Damit die Kopie neu synchronisiert wird
                copy.firstName = copy.firstName + ' (Kopie)';
                await db.add('customers', copy);
                showToast('Kunde dupliziert.', 'success');
                this.navigate('customers');
            },
